
---

# 2.5.1 Отключение устаревшего интерфейса vsyscall (только для физических серверов)
- name: 2.5.1 Disabling the outdated vsyscall interface
  ansible.builtin.blockinfile:
    path: /etc/default/grub
    marker: "# {mark} ANSIBLE MANAGED BLOCK - vsyscall settings"
    block: |
      GRUB_CMDLINE_LINUX_DEFAULT="quiet splash vsyscall=none"
  when: not ct_mode
          
# 2.5.2 Ограничение доступа к событиям производительности
- name: 2.5.2. Restrict access to performance events
  ansible.builtin.sysctl:
    name: kernel.perf_event_paranoid
    value: "3"
    state: present
  when: not ct_mode

# 2.5.3 Отключение монтирования виртуальной файловой системы debugfs
- name: 2.5.3. Disable mounting of the debugfs virtual file system
  ansible.builtin.blockinfile:
    path: /etc/default/grub
    marker: "# {mark} ANSIBLE MANAGED BLOCK - debugfs settings"
    block: |
      GRUB_CMDLINE_LINUX_DEFAULT="quiet splash debugfs=no-mount"
  when: not ct_mode
  
# 2.5.4 Отключение системного вызова kexec_load
- name: 2.5.4. Disable the kexec_load system call
  ansible.builtin.sysctl:
    name: kernel.kexec_load_disabled
    value: "1"
    state: present
  when: not ct_mode

# 2.5.5 Ограничение использования пользовательских пространств имен
- name: 2.5.5. Restrict the use of user namespaces
  ansible.builtin.sysctl:
    name: user.max_user_namespaces
    value: "0"
    state: present
  when: not ct_mode

# 2.5.6 Запрет системного вызова bpf для непривилегированных пользователей
- name: 2.5.6. Prohibit the bpf system call for unprivileged users
  ansible.builtin.sysctl:
    name: kernel.unprivileged_bpf_disabled
    value: "1"
    state: present
  when: not ct_mode

# 2.5.7 Запрет системного вызова userfaultfd для непривилегированных пользователей
- name: 2.5.7. Prohibit the userfaultfd system call for unprivileged users
  ansible.builtin.sysctl:
    name: vm.unprivileged_userfaultfd
    value: "0"
    state: present
  when: not ct_mode

# 2.5.8 Запрет автоматической загрузки модулей ядра для дисциплины терминальной линии
- name: 2.5.8. Prohibition of automatic loading of kernel modules for terminal line discipline
  ansible.builtin.sysctl:
    name: dev.tty.ldisc_autoload
    value: "0"
    state: present
  when: not ct_mode

# 2.5.9 Отключение технологии Transactional Synchronization Extensions (TSX)
- name: 2.5.9. Disable Transactional Synchronization Extensions (TSX) technology
  ansible.builtin.blockinfile:
    path: /etc/default/grub
    marker: "# {mark} ANSIBLE MANAGED BLOCK - TSX settings"
    block: |
      GRUB_CMDLINE_LINUX_DEFAULT="quiet splash tsx=off"
  when: not ct_mode

# 2.5.10 Настройка параметра ядра vm.mmap_min_addr
- name: 2.5.10 Configuring the vm.mmap_min_addr kernel parameter
  ansible.builtin.sysctl:
    name: vm.mmap_min_addr
    value: "4096"
    state: present
  when: not ct_mode

# 2.5.11 Реализация рандомизации адресного пространства
- name: 2.5.11. Implement address space randomization
  ansible.builtin.sysctl:
    name: kernel.randomize_va_space
    value: "2"
    state: present
  when: not ct_mode

# Применение изменений sysctl (только для физических серверов)
- name: Applying sysctl change
  ansible.builtin.command: sysctl -p
  when: not ct_mode