---
# Задачи для управления сетевым доступом через PAM
# Контроль доступа пользователей из определенных сетей

- name: Ensure security directory exists
  ansible.builtin.file:
    path: /etc/security
    state: directory
    mode: '0755'
    owner: root
    group: root

# Настройка pam_access для контроля доступа по сетям
- name: Configure pam_access for network access control
  ansible.builtin.blockinfile:
    path: "{{ pam_access_file }}"
    block: |
      # PAM access control configuration
      # Generated by Ansible role configure_pam
      
      # Allow local access
      {% if pam_access_allow_local %}
      + : ALL : LOCAL
      {% endif %}
      
      # Allow console access
      {% if pam_access_allow_console %}
      + : ALL : console
      {% endif %}
      
      # Allow specific users from allowed subnets
      {% for user in pam_users_to_add %}
      {% if user.allowed_subnets is defined %}
        {% for subnet in user.allowed_subnets %}
      + : {{ user.username }} : {{ subnet }}
        {% endfor %}
      {% else %}
        {% for subnet in pam_allowed_ssh_subnets %}
      + : {{ user.username }} : {{ subnet }}
        {% endfor %}
      {% endif %}
      {% endfor %}
      
      # Deny specific subnets
      {% for subnet in pam_denied_ssh_subnets %}
      - : ALL : {{ subnet }}
      {% endfor %}
      
      # Default policy
      {% if pam_access_deny_all_other %}
      - : ALL : ALL
      {% else %}
      + : ALL : ALL
      {% endif %}
    state: present
    backup: yes
    create: yes
    mode: '0644'
    owner: root
    group: root
  when: pam_network_access_enabled

# Создание файла разрешенных SSH пользователей
- name: Create SSH users file
  ansible.builtin.copy:
    dest: "{{ pam_ssh_users_file }}"
    content: |
      # SSH allowed users
      # Generated by Ansible role configure_pam
      {% for user in pam_users_to_add %}
      {{ user.username }}
      {% endfor %}
    mode: '0644'
    owner: root
    group: root
    backup: yes
  when: 
    - pam_network_access_enabled
    - pam_users_to_add | length > 0

# Настройка pam_access в common-auth
- name: Configure pam_access in common-auth
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-auth
    line: "auth required pam_access.so accessfile={{ pam_access_file }}"
    state: present
    insertafter: '^auth.*pam_unix\.so'
    backup: yes
  when: pam_network_access_enabled

# Настройка pam_listfile для контроля пользователей
- name: Configure pam_listfile in common-auth
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-auth
    line: "auth required pam_listfile.so item={{ pam_listfile_item }} sense={{ pam_listfile_sense }} file={{ pam_listfile_file }} onerr={{ pam_listfile_onerr }}"
    state: present
    insertafter: '^auth.*pam_access\.so'
    backup: yes
  when: 
    - pam_network_access_enabled
    - pam_listfile_enabled
    - pam_users_to_add | length > 0

# Настройка pam_access в sshd
- name: Configure pam_access in sshd
  ansible.builtin.lineinfile:
    path: /etc/pam.d/sshd
    line: "auth required pam_access.so accessfile={{ pam_access_file }}"
    state: present
    insertafter: '^auth.*pam_unix\.so'
    backup: yes
    create: yes
  when: pam_network_access_enabled

# Настройка pam_listfile в sshd
- name: Configure pam_listfile in sshd
  ansible.builtin.lineinfile:
    path: /etc/pam.d/sshd
    line: "auth required pam_listfile.so item={{ pam_listfile_item }} sense={{ pam_listfile_sense }} file={{ pam_listfile_file }} onerr={{ pam_listfile_onerr }}"
    state: present
    insertafter: '^auth.*pam_access\.so'
    backup: yes
    create: yes
  when: 
    - pam_network_access_enabled
    - pam_listfile_enabled
    - pam_users_to_add | length > 0

# Проверка существования пользователей
- name: Check if users exist
  ansible.builtin.getent:
    database: passwd
    key: "{{ item.username }}"
  register: user_existence_check
  failed_when: false
  loop: "{{ pam_users_to_add }}"
  when: 
    - pam_network_access_enabled
    - pam_users_to_add | length > 0

- name: Warning about non-existent users
  ansible.builtin.debug:
    msg: "ВНИМАНИЕ: Пользователь '{{ item.item.username }}' не существует в системе"
  loop: "{{ user_existence_check.results }}"
  when: 
    - pam_network_access_enabled
    - pam_users_to_add | length > 0
    - item.ansible_facts.getent_passwd[item.item.username] is not defined
    - debug_mode

# Создание пользователей если они не существуют
- name: Create users if they don't exist
  ansible.builtin.user:
    name: "{{ item.item.username }}"
    password: "{{ item.item.password | default('changeme123!') | password_hash('sha512') }}"
    groups: "{{ item.item.groups | default(['users']) }}"
    shell: "{{ item.item.shell | default('/bin/bash') }}"
    state: present
    create_home: yes
  loop: "{{ user_existence_check.results }}"
  when: 
    - pam_network_access_enabled
    - pam_users_to_add | length > 0
    - item.ansible_facts.getent_passwd[item.item.username] is not defined
    - pam_create_missing_users | default(false)

# Добавление пользователей в группу wheel если нужно
- name: Add users to wheel group
  ansible.builtin.user:
    name: "{{ item.item.username }}"
    groups: "{{ item.item.groups | default([]) + [pam_wheel_group] }}"
    append: yes
  loop: "{{ user_existence_check.results }}"
  when: 
    - pam_network_access_enabled
    - pam_users_to_add | length > 0
    - item.ansible_facts.getent_passwd[item.item.username] is defined
    - (pam_add_users_to_wheel | default(false)) or (item.item.is_sudoers | default(false))

# Проверка конфигурации pam_access
- name: Test pam_access configuration
  ansible.builtin.command: "pam_access -v"
  register: pam_access_test
  changed_when: false
  failed_when: false
  when: pam_network_access_enabled

- name: Display pam_access test results
  ansible.builtin.debug:
    msg: "PAM access test: {{ pam_access_test.stdout | default('не удалось выполнить тест') }}"
  when: 
    - pam_network_access_enabled
    - debug_mode

# Создание скрипта для управления доступом
- name: Create access management script
  ansible.builtin.copy:
    dest: /root/manage_ssh_access.sh
    content: |
      #!/bin/bash
      # Скрипт управления SSH доступом
      
      case "$1" in
        "add")
          if [ -z "$2" ] || [ -z "$3" ]; then
            echo "Использование: $0 add <user> <subnet>"
            exit 1
          fi
          echo "+ : $2 : $3" >> {{ pam_access_file }}
          echo "$2" >> {{ pam_ssh_users_file }}
          echo "Добавлен пользователь $2 с доступом из $3"
          ;;
        "remove")
          if [ -z "$2" ]; then
            echo "Использование: $0 remove <user>"
            exit 1
          fi
          sed -i "/^+ : $2 :/d" {{ pam_access_file }}
          sed -i "/^$2$/d" {{ pam_ssh_users_file }}
          echo "Удален пользователь $2"
          ;;
        "add-user")
          if [ -z "$2" ] || [ -z "$3" ] || [ -z "$4" ]; then
            echo "Использование: $0 add-user <user> <password> <subnet>"
            exit 1
          fi
          useradd -m -s /bin/bash $2
          echo "$2:$3" | chpasswd
          usermod -aG sudo $2
          echo "+ : $2 : $4" >> {{ pam_access_file }}
          echo "$2" >> {{ pam_ssh_users_file }}
          echo "Создан пользователь $2 с доступом из $4"
          ;;
        "list")
          echo "Разрешенные пользователи:"
          cat {{ pam_ssh_users_file }}
          echo ""
          echo "Правила доступа:"
          cat {{ pam_access_file }}
          ;;
        "reload")
          systemctl restart ssh
          echo "SSH перезапущен"
          ;;
        *)
          echo "Использование: $0 {add|remove|add-user|list|reload}"
          echo "  add <user> <subnet>        - добавить пользователя с доступом из подсети"
          echo "  remove <user>              - удалить пользователя"
          echo "  add-user <user> <pass> <subnet> - создать пользователя с доступом"
          echo "  list                       - показать текущие правила"
          echo "  reload                     - перезапустить SSH"
          ;;
      esac
    mode: '0755'
    owner: root
    group: root
  when: pam_network_access_enabled

# Уведомление о перезапуске SSH
- name: Notify SSH restart for network access changes
  ansible.builtin.meta: flush_handlers
  when: pam_network_access_enabled
