---
# =============================================================================
# Debian/Ubuntu Specific Tasks / Специфичные задачи для Debian/Ubuntu
# =============================================================================
# This file contains tasks specific to Debian and Ubuntu systems
# Файл содержит задачи, специфичные для систем Debian и Ubuntu
# =============================================================================

# Install required packages for Debian/Ubuntu / Установка необходимых пакетов для Debian/Ubuntu
- name: "Install required packages for Debian/Ubuntu / Установка необходимых пакетов для Debian/Ubuntu"
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
    update_cache: true
  loop:
    - locales
    - console-setup
    - keyboard-configuration
  register: debian_packages_result
  failed_when: false
  tags:
    - packages
    - debian
    - ubuntu
    - installation

# Display Debian/Ubuntu package installation results / Отображение результатов установки пакетов Debian/Ubuntu
- name: "Display Debian/Ubuntu package installation results / Отображение результатов установки пакетов Debian/Ubuntu"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "Debian/Ubuntu Package Installation Results:"
      - "============================================================================="
      - "Package:                {{ item.item }}"
      - "Installation Status:    {{ 'SUCCESS' if item.changed else 'ALREADY INSTALLED' }}"
      - "Changed:                {{ 'YES' if item.changed else 'NO' }}"
      - "Return Code:            {{ item.rc | default('N/A') }}"
      - "============================================================================="
  loop: "{{ debian_packages_result.results | default([]) }}"
  no_log: true
  when: 
    - debug_mode
    - debian_packages_result is defined
  tags:
    - debug
    - packages
    - debian
    - ubuntu

# Configure keyboard layout for Debian/Ubuntu systems / Настройка раскладки клавиатуры для систем Debian/Ubuntu
- name: "Configure keyboard layout for Debian/Ubuntu / Настройка раскладки клавиатуры для Debian/Ubuntu"
  ansible.builtin.debconf:
    name: keyboard-configuration
    question: "keyboard-configuration/layout"
    value: "{{ keyboard_layout }}"
    vtype: string
  when: keyboard_layout != ""
  register: keyboard_layout_result
  failed_when: false
  tags:
    - keyboard
    - debian
    - ubuntu
    - configuration
    - layout

# Configure keyboard variant for Debian/Ubuntu / Настройка варианта клавиатуры для Debian/Ubuntu
- name: "Configure keyboard variant for Debian/Ubuntu / Настройка варианта клавиатуры для Debian/Ubuntu"
  ansible.builtin.debconf:
    name: keyboard-configuration
    question: "keyboard-configuration/variant"
    value: "{{ keyboard_variant }}"
    vtype: string
  when: keyboard_variant != ""
  register: keyboard_variant_result
  failed_when: false
  tags:
    - keyboard
    - debian
    - ubuntu
    - configuration
    - variant

# Configure keyboard options for Debian/Ubuntu / Настройка опций клавиатуры для Debian/Ubuntu
- name: "Configure keyboard options for Debian/Ubuntu / Настройка опций клавиатуры для Debian/Ubuntu"
  ansible.builtin.debconf:
    name: keyboard-configuration
    question: "keyboard-configuration/optionscode"
    value: "{{ keyboard_options }}"
    vtype: string
  when: keyboard_options != ""
  register: keyboard_options_result
  failed_when: false
  tags:
    - keyboard
    - debian
    - ubuntu
    - configuration
    - options

# Display keyboard configuration results for Debian/Ubuntu / Отображение результатов настройки клавиатуры для Debian/Ubuntu
- name: "Display keyboard configuration results for Debian/Ubuntu / Отображение результатов настройки клавиатуры для Debian/Ubuntu"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "Debian/Ubuntu Keyboard Configuration Results:"
      - "============================================================================="
      - "Layout:                 {{ keyboard_layout }}"
      - "Variant:                {{ keyboard_variant }}"
      - "Options:                {{ keyboard_options }}"
      - "Layout Changed:         {{ 'YES' if keyboard_layout_result.changed else 'NO' }}"
      - "Variant Changed:        {{ 'YES' if keyboard_variant_result.changed else 'NO' }}"
      - "Options Changed:        {{ 'YES' if keyboard_options_result.changed else 'NO' }}"
      - "============================================================================="
  when: debug_mode
  tags:
    - debug
    - keyboard
    - debian
    - ubuntu
    - results

# Configure console font for Debian/Ubuntu / Настройка консольного шрифта для Debian/Ubuntu
- name: "Configure console font for Debian/Ubuntu / Настройка консольного шрифта для Debian/Ubuntu"
  ansible.builtin.lineinfile:
    path: /etc/default/console-setup
    regexp: '^FONTFACE=.*$'
    line: 'FONTFACE="{{ console_font }}"'
    state: present
    create: true
    backup: "{{ backup_enabled }}"
    mode: '0644'
  when: console_font_manage
  register: console_font_result
  notify: reload console
  failed_when: false
  tags:
    - console
    - font
    - debian
    - ubuntu
    - configuration
    - display

# Display console font configuration results for Debian/Ubuntu / Отображение результатов настройки консольного шрифта для Debian/Ubuntu
- name: "Display console font configuration results for Debian/Ubuntu / Отображение результатов настройки консольного шрифта для Debian/Ubuntu"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "Debian/Ubuntu Console Font Configuration Results:"
      - "============================================================================="
      - "Font:                   {{ console_font }}"
      - "Configuration Changed:  {{ 'YES' if console_font_result.changed else 'NO' }}"
      - "File Path:              /etc/default/console-setup"
      - "Operation Status:       {{ 'SUCCESS' if console_font_result.changed else 'NO CHANGE' }}"
      - "============================================================================="
  when: 
    - debug_mode
    - console_font_result is defined
  tags:
    - debug
    - console
    - font
    - debian
    - ubuntu
    - results
