---
# Пример использования роли configure_pam с пользовательскими путями к PAM модулям
# Этот пример показывает, как настроить роль для работы с нестандартными путями

- name: Настройка PAM с пользовательскими путями
  hosts: servers
  become: yes
  
  vars:
    # Включить отладку для просмотра найденных модулей
    debug_mode: true
    pam_check_optional_modules: true
    
    # Пользовательские пути к PAM модулям (например, для кастомной сборки)
    pam_module_paths:
      - "/usr/lib/security/pam_faillock.so"
      - "/usr/lib64/security/pam_faillock.so"
      - "/usr/lib/x86_64-linux-gnu/security/pam_faillock.so"
      - "/usr/lib/security/pam_pwquality.so"
      - "/usr/lib64/security/pam_pwquality.so"
      - "/usr/lib/x86_64-linux-gnu/security/pam_pwquality.so"
      - "/usr/lib/security/pam_limits.so"
      - "/usr/lib64/security/pam_limits.so"
      - "/usr/lib/x86_64-linux-gnu/security/pam_limits.so"
      - "/usr/lib/security/pam_wheel.so"
      - "/usr/lib64/security/pam_wheel.so"
      - "/usr/lib/x86_64-linux-gnu/security/pam_wheel.so"
      - "/usr/lib/security/pam_umask.so"
      - "/usr/lib64/security/pam_umask.so"
      - "/usr/lib/x86_64-linux-gnu/security/pam_umask.so"
      - "/usr/lib/security/pam_time.so"
      - "/usr/lib64/security/pam_time.so"
      - "/usr/lib/x86_64-linux-gnu/security/pam_time.so"
      - "/usr/lib/security/pam_access.so"
      - "/usr/lib64/security/pam_access.so"
      - "/usr/lib/x86_64-linux-gnu/security/pam_access.so"
      - "/usr/lib/security/pam_listfile.so"
      - "/usr/lib64/security/pam_listfile.so"
      - "/usr/lib/x86_64-linux-gnu/security/pam_listfile.so"
      - "/usr/lib/security/pam_keyinit.so"
      - "/usr/lib64/security/pam_keyinit.so"
      - "/usr/lib/x86_64-linux-gnu/security/pam_keyinit.so"
      - "/usr/lib/security/pam_mail.so"
      - "/usr/lib64/security/pam_mail.so"
      - "/usr/lib/x86_64-linux-gnu/security/pam_mail.so"
      - "/usr/lib/security/pam_securetty.so"
      - "/usr/lib64/security/pam_securetty.so"
      - "/usr/lib/x86_64-linux-gnu/security/pam_securetty.so"
    
    # Критические модули (можно изменить список при необходимости)
    pam_critical_modules:
      - "pam_faillock"
      - "pam_pwquality"
      - "pam_limits"
      - "pam_wheel"
    
    # Дополнительные модули (можно добавить свои)
    pam_optional_modules:
      - "pam_umask"
      - "pam_time"
      - "pam_access"
      - "pam_listfile"
      - "pam_keyinit"
      - "pam_mail"
      - "pam_securetty"
      - "pam_motd"  # Добавлен дополнительный модуль
    
    # Настройки безопасности
    pam_faillock_deny: 3
    pam_unlock_time: 1800
    pam_pwquality_minlen: 12
    
  roles:
    - role: base/configure_pam
