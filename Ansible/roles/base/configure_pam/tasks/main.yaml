---
# Роль настройки PAM - Основные задачи
# Эта роль настраивает PAM модули для повышения безопасности системы

- name: Include validate tasks
  include_tasks: validate.yaml

- name: Create backup of PAM configuration files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ item }}{{ pam_backup_suffix }}"
    remote_src: yes
    backup: no
  loop:
    - /etc/pam.d/common-auth
    - /etc/pam.d/common-account
    - /etc/pam.d/common-password
    - /etc/pam.d/common-session
    - /etc/pam.d/su
    - /etc/pam.d/sudo
  when: pam_backup_enabled
  register: pam_backup_result
  failed_when: false
  ignore_errors: yes

- name: Проверить успешность создания резервных копий
  ansible.builtin.fail:
    msg: "Не удалось создать резервные копии для файлов: {{ pam_backup_result.results | selectattr('failed', 'equalto', true) | map(attribute='item') | list }}"
  when: 
    - pam_backup_enabled
    - pam_backup_result.results | selectattr('failed', 'equalto', true) | list | length > 0

- name: Ensure that PAM configuration directory exists
  ansible.builtin.file:
    path: /etc/pam.d
    state: directory
    mode: '0755'
    owner: root
    group: root

# Настроить PAM faillock для защиты от блокировки аккаунтов
- name: Configure PAM faillock - phase preauth
  ansible.builtin.blockinfile:
    path: /etc/pam.d/common-auth
    block: |
      auth required pam_faillock.so preauth audit={{ 'audit' if pam_faillock_audit else '' }} silent={{ 'silent' if pam_faillock_silent else '' }} deny={{ pam_faillock_deny }} unlock_time={{ pam_unlock_time }}
    insertbefore: '^auth.*sufficient.*pam_unix\.so'
    state: present
    backup: yes
  notify: restart ssh

- name: Configure PAM faillock - phase authfail
  ansible.builtin.blockinfile:
    path: /etc/pam.d/common-auth
    block: |
      auth [default=die] pam_faillock.so authfail audit={{ 'audit' if pam_faillock_audit else '' }} deny={{ pam_faillock_deny }} unlock_time={{ pam_unlock_time }}
    insertafter: '^auth.*sufficient.*pam_unix\.so'
    state: present
    backup: yes
  notify: restart ssh

- name: Configure PAM faillock for phase account
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-account
    line: "account required pam_faillock.so"
    state: present
    create: yes
    backup: yes
  notify: restart ssh

# Настроить требования к качеству паролей
- name: Configure PAM pwquality for password security
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-password
    regexp: '^password\s+requisite\s+pam_pwquality\.so'
    line: "password requisite pam_pwquality.so retry={{ pam_pwquality_retry }} minlen={{ pam_pwquality_minlen }} difok={{ pam_pwquality_difok }} ucredit={{ pam_pwquality_ucredit }} lcredit={{ pam_pwquality_lcredit }} dcredit={{ pam_pwquality_dcredit }} ocredit={{ pam_pwquality_ocredit }} minclass={{ pam_pwquality_minclass }} maxrepeat={{ pam_pwquality_maxrepeat }} gecoscheck={{ '1' if pam_pwquality_gecoscheck else '0' }} reject_username={{ '1' if pam_pwquality_reject_username else '0' }}"
    state: present
    backup: yes

# Настроить PAM лимиты для контроля сессий
- name: Configure PAM limits for session control
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-session
    line: "session required pam_limits.so"
    state: present
    create: yes
    backup: yes
  when: pam_limits_enabled

- name: Configure system-wide login limits (soft)
  ansible.builtin.lineinfile:
    path: /etc/security/limits.conf
    line: "* soft nproc {{ pam_limits_maxlogins }}"
    state: present
    backup: yes
  when: pam_limits_enabled

- name: Configure system-wide login limits (hard)
  ansible.builtin.lineinfile:
    path: /etc/security/limits.conf
    line: "* hard nproc {{ pam_limits_maxsyslogins }}"
    state: present
    backup: yes
  when: pam_limits_enabled

# Настроить группу wheel для команды su
- name: Configure PAM wheel for su command
  ansible.builtin.lineinfile:
    path: /etc/pam.d/su
    regexp: '^#?auth\s+required\s+pam_wheel\.so'
    line: "auth required pam_wheel.so use_uid={{ 'use_uid' if pam_wheel_use_uid else '' }} group={{ pam_wheel_group }}"
    state: present
    backup: yes

# Настроить ограничения доступа sudo
- name: Create sudoers.d directory
  ansible.builtin.file:
    path: /etc/sudoers.d
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Configure sudo access for administrative group
  ansible.builtin.copy:
    dest: /etc/sudoers.d/{{ pam_wheel_group }}
    content: "%{{ pam_wheel_group }} ALL=(ALL:ALL) ALL\n"
    owner: root
    group: root
    mode: '0440'
    validate: 'visudo -cf %s'
    backup: yes
  register: sudoers_config_result
  failed_when: false

- name: Проверить корректность sudoers конфигурации
  ansible.builtin.fail:
    msg: "Ошибка в конфигурации sudoers для группы {{ pam_wheel_group }}. Проверьте синтаксис."
  when: sudoers_config_result.failed

# Настроить ограничения доступа root
- name: Configure secure TTY for root login
  ansible.builtin.lineinfile:
    path: /etc/securetty
    line: "{{ item }}"
    state: present
    create: yes
    backup: yes
  loop: "{{ pam_securetty_ttys }}"
  when: pam_root_securetty

- name: Disable root login via SSH
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: "PermitRootLogin no"
    state: present
    backup: yes
  when: pam_root_console_only
  notify: restart ssh

# Настроить дополнительные модули безопасности
- name: Configure PAM umask for sessions
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-session
    line: "session optional pam_umask.so umask={{ pam_umask_value }}"
    state: present
    create: yes
    backup: yes

- name: Configure PAM motd for login banner
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-session
    line: "session optional pam_motd.so motd={{ pam_motd_file }}"
    state: present
    create: yes
    backup: yes

# Включить расширенную конфигурацию PAM
- name: Enable advanced PAM configuration
  include_tasks: advanced.yml
  when: pam_advanced_enabled

# Проверить конфигурацию PAM
- name: Check PAM configuration syntax
  ansible.builtin.command: "faillock --user {{ ansible_user }}"
  register: pam_verify
  changed_when: false
  failed_when: false
  ignore_errors: yes

- name: Display PAM verification results
  ansible.builtin.debug:
    msg: "Проверка конфигурации PAM завершена"
  when: debug_mode