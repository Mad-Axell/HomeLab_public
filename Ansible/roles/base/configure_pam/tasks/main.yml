      - "SSH Service Enabled / SSH служба включена: {{ ansible_facts.services['ssh.service'].status | default('unknown') }}"
      - "==============================================="
  when: debug_mode

- name: "Display active users and sessions / Показать активных пользователей и сессии"
  ansible.builtin.debug:
    msg:
