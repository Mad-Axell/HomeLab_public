      - "SSH Configuration / Конфигурация SSH: /etc/ssh/sshd_config"
      - "PAM Common Auth / PAM Общая Аутентификация: /etc/pam.d/common-auth"
      - "PAM SSHD / PAM SSHD: /etc/pam.d/sshd"
      - "PAM Common Password / PAM Общие Пароли: /etc/pam.d/common-password"
      - "PAM Common Account / PAM Общие Аккаунты: /etc/pam.d/common-account"
      - "PAM Common Session / PAM Общие Сессии: /etc/pam.d/common-session"
      - "PAM SU / PAM SU: /etc/pam.d/su"
      - "PAM Sudo / PAM Sudo: /etc/pam.d/sudo"
      - "PAM Access Control / Контроль доступа PAM: {{ pam_access_file }}"
      - "SSH Allowed Users / Разрешенные SSH пользователи: {{ pam_ssh_users_file }}"
      - "PAM Denied Users / Запрещенные пользователи PAM: {{ pam_denied_users_file }}"
      - "PAM Limits / Лимиты PAM: /etc/security/limits.conf"
      - "PAM Password Quality / Качество паролей PAM: /etc/security/pwquality.conf"
      - "PAM Secure TTY / Безопасный TTY PAM: /etc/securetty"
      - "==============================================="
      - "All configuration files have been displayed above / Все конфигурационные файлы показаны выше"
      - "==============================================="
  when: debug_mode
