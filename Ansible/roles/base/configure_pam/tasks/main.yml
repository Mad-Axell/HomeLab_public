      - "Current SSH connections / Текущие SSH соединения: {{ ansible_facts.ssh_host_keys | length }}"
      - "System uptime / Время работы системы: {{ ansible_uptime_seconds | int // 3600 }} hours / часов"
      - "==============================================="
  when: debug_mode

- name: "Display configuration files summary / Показать сводку конфигурационных файлов"
  ansible.builtin.debug:
    msg:
      - "==============================================="
