    - debug_mode
    - pam_network_access_enabled

- name: "Display SSH allowed users file / Показать файл разрешенных SSH пользователей"
  ansible.builtin.debug:
    msg:
      - "==============================================="
      - "SSH ALLOWED USERS / РАЗРЕШЕННЫЕ SSH ПОЛЬЗОВАТЕЛИ"
      - "File: {{ pam_ssh_users_file }}"
      - "==============================================="
      - "{{ lookup('file', pam_ssh_users_file) }}"
      - "==============================================="
  when: 
    - debug_mode
    - pam_network_access_enabled
    - users_to_add | length > 0

- name: "Display PAM common-password configuration / Показать конфигурацию PAM common-password"
  ansible.builtin.debug:
    msg:
      - "==============================================="
      - "PAM COMMON-PASSWORD CONFIGURATION / КОНФИГУРАЦИЯ PAM COMMON-PASSWORD"
