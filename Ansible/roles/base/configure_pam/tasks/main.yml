  ansible.builtin.debug:
    msg:
      - "==============================================="
      - "PAM SSHD CONFIGURATION / КОНФИГУРАЦИЯ PAM SSHD"
      - "File: /etc/pam.d/sshd"
      - "==============================================="
      - "{{ lookup('file', '/etc/pam.d/sshd') }}"
      - "==============================================="
