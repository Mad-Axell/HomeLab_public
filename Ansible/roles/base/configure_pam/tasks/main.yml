- name: "Display PAM access control file / Показать файл контроля доступа PAM"
  ansible.builtin.debug:
    msg:
      - "==============================================="
      - "PAM ACCESS CONTROL / КОНТРОЛЬ ДОСТУПА PAM"
      - "File: {{ pam_access_file }}"
      - "==============================================="
      - "{{ lookup('file', pam_access_file) }}"
