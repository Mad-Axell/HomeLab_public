---
# Example Playbook for PAM Configuration Role
# Demonstrates various configuration scenarios

- name: Configure PAM with basic security settings
  hosts: servers
  become: yes
  roles:
    - role: base/configure_pam
      vars:
        debug_mode: true
        pam_faillock_deny: 3
        pam_unlock_time: 1800
        pam_pwquality_minlen: 12
        pam_wheel_group: "sudo"

- name: Configure PAM with strict security settings
  hosts: production_servers
  become: yes
  roles:
    - role: base/configure_pam
      vars:
        # Strict account lockout
        pam_faillock_deny: 3
        pam_unlock_time: 3600
        pam_faillock_audit: true
        pam_faillock_silent: false
        
        # Strong password policy
        pam_pwquality_minlen: 16
        pam_pwquality_minclass: 4
        pam_pwquality_maxrepeat: 1
        pam_pwquality_gecoscheck: true
        pam_pwquality_reject_username: true
        
        # Session limits
        pam_limits_maxlogins: 5
        pam_limits_maxsyslogins: 20
        
        # Root restrictions
        pam_root_console_only: true
        pam_root_securetty: true

- name: Configure PAM for development environment
  hosts: dev_servers
  become: yes
  roles:
    - role: base/configure_pam
      vars:
        # Moderate security for development
        pam_faillock_deny: 5
        pam_unlock_time: 900
        pam_pwquality_minlen: 10
        pam_pwquality_minclass: 3
        
        # More permissive session limits
        pam_limits_maxlogins: 15
        pam_limits_maxsyslogins: 50
        
        # Allow root access for development
        pam_root_console_only: false
        pam_root_securetty: false

- name: Cleanup PAM configuration
  hosts: servers
  become: yes
  tasks:
    - name: Include PAM cleanup tasks
      include_role:
        name: base/configure_pam
        tasks_from: cleanup
      vars:
        pam_unlock_user: "admin"
        pam_remove_backups: false
        pam_restore_from_backup: false

- name: Advanced PAM configuration with custom settings
  hosts: high_security_servers
  become: yes
  roles:
    - role: base/configure_pam
      vars:
        # Custom security settings
        pam_faillock_deny: 2
        pam_unlock_time: 7200
        pam_pwquality_minlen: 20
        pam_pwquality_minclass: 4
        pam_pwquality_maxrepeat: 0
        
        # Custom wheel group
        pam_wheel_group: "wheel"
        
        # Strict session limits
        pam_limits_maxlogins: 3
        pam_limits_maxsyslogins: 10
        
        # Enable all security features
        pam_tally2_enabled: true
        pam_limits_enabled: true
        pam_root_console_only: true
        pam_root_securetty: true
        pam_backup_enabled: true
