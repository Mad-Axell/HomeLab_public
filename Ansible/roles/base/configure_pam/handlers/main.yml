---
# PAM Configuration Handlers
# Handlers for restarting services after PAM configuration changes

- name: restart ssh
  ansible.builtin.service:
    name: ssh
    state: restarted
  listen: "restart ssh"

- name: restart sshd
  ansible.builtin.service:
    name: sshd
    state: restarted
  listen: "restart ssh"

- name: reload pam
  ansible.builtin.command: "pam_tally2 --reset"
  changed_when: false
  listen: "reload pam"

- name: flush pam cache
  ansible.builtin.command: "pam_tally2 --reset --user root"
  changed_when: false
  listen: "flush pam cache"
