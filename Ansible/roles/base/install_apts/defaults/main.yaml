---
# Package Installation Role Defaults
# Значения по умолчанию для роли установки пакетов
# This role installs essential packages for Ubuntu/Debian systems
# Эта роль устанавливает основные пакеты для систем Ubuntu/Debian

# Debug mode for verbose output / Режим отладки для подробного вывода
debug_mode: false

# Package cache management / Управление кэшем пакетов
apt_cache_valid_time: 86400  # 24 hours in seconds / 24 часа в секундах
apt_update_cache: true       # Update package cache / Обновлять кэш пакетов
apt_upgrade_packages: true   # Upgrade system packages / Обновлять системные пакеты

# Essential packages list - must be a list of valid package names
# Список основных пакетов - должен быть списком валидных имен пакетов
apt_packages:
  - acl                    # Access Control Lists / Списки контроля доступа
  - sudo                   # Superuser do / Выполнение от имени суперпользователя
  - net-tools              # Network utilities / Сетевые утилиты
  - gnupg                  # GNU Privacy Guard / GNU Privacy Guard
  - auditd                 # System audit daemon / Демон аудита системы
  - libpam-pwquality       # Password quality enforcement / Контроль качества паролей
  - htop                   # Interactive process viewer / Интерактивный просмотрщик процессов
  - curl                   # Command line tool for transferring data / Инструмент командной строки для передачи данных
  - wget                   # Internet file retriever / Загрузчик файлов из интернета
  - python3                # Python 3 interpreter / Интерпретатор Python 3
  - python3-pip            # Python package installer / Установщик пакетов Python
  - python3-requests       # HTTP library for Python / HTTP библиотека для Python
  - build-essential        # Essential build tools / Основные инструменты сборки
  - apt-transport-https    # HTTPS transport for APT / HTTPS транспорт для APT
  - software-properties-common  # Software properties management / Управление свойствами ПО
  - ca-certificates        # Certificate authorities / Центры сертификации
  - openssh-client         # SSH client / SSH клиент
  - iputils-ping           # Network testing tools / Инструменты тестирования сети
  - dnsutils               # DNS utilities / DNS утилиты

# Optional packages that can be added by users
# Дополнительные пакеты, которые могут быть добавлены пользователями
apt_optional_packages: []

# Package installation timeout (in seconds)
# Таймаут установки пакетов (в секундах)
apt_install_timeout: 600

# Whether to install recommended packages
# Устанавливать ли рекомендуемые пакеты
apt_install_recommends: true

# Whether to install suggested packages
# Устанавливать ли предлагаемые пакеты
apt_install_suggests: false
