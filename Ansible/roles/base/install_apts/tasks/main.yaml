---
# Main tasks for install_apts role
# Основные задачи роли install_apts
# This file orchestrates the package installation process
# Этот файл координирует процесс установки пакетов

- name: "Validate role parameters / Валидация параметров роли"
  # Include parameter validation / Подключение валидации параметров
  ansible.builtin.include_tasks: validate.yml
  tags: [validation, always]

- name: "Display role execution information / Отображение информации о выполнении роли"
  # Show role execution details / Показать детали выполнения роли
  ansible.builtin.debug:
    msg:
      - "=== install_apts Role Execution ==="
      - "Host: {{ inventory_hostname }}"
      - "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"
      - "Architecture: {{ ansible_architecture }}"
      - "Debug mode: {{ debug_mode }}"
      - "Packages to install: {{ apt_packages | length }}"
      - "Optional packages: {{ apt_optional_packages | length }}"
  when: debug_mode | bool

- name: "Verify system prerequisites / Проверка системных предварительных условий"
  block:
    - name: "Verify system is Debian/Ubuntu based / Проверка что система основана на Debian/Ubuntu"
      # Check OS family compatibility / Проверка совместимости семейства ОС
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: "This role only supports Debian/Ubuntu systems. Current OS: {{ ansible_os_family }}"
        success_msg: "System OS verification passed"

    - name: "Check if apt package manager is available / Проверка доступности менеджера пакетов apt"
      # Verify apt command exists / Проверка существования команды apt
      ansible.builtin.command: which apt
      register: apt_check
      failed_when: false
      changed_when: false

    - name: "Fail if apt is not available / Завершение с ошибкой если apt недоступен"
      # Stop execution if apt is missing / Остановка выполнения если apt отсутствует
      ansible.builtin.fail:
        msg: "apt package manager is not available on this system"
      when: apt_check.rc != 0

    - name: "Display system information / Отображение системной информации"
      # Show detailed system details / Показать детальную системную информацию
      ansible.builtin.debug:
        msg:
          - "=== System Information ==="
          - "OS Family: {{ ansible_os_family }}"
          - "Distribution: {{ ansible_distribution }}"
          - "Version: {{ ansible_distribution_version }}"
          - "Architecture: {{ ansible_architecture }}"
          - "Kernel: {{ ansible_kernel }}"
          - "APT available: {{ 'Yes' if apt_check.rc == 0 else 'No' }}"
      when: debug_mode | bool

- name: "Update apt package cache / Обновление кэша пакетов apt"
  block:
    - name: "Update apt package cache / Обновление кэша пакетов apt"
      # Refresh package repository information / Обновление информации о репозиториях пакетов
      ansible.builtin.apt:
        update_cache: "{{ apt_update_cache }}"
        cache_valid_time: "{{ apt_cache_valid_time }}"
      register: apt_update_result
      when: apt_update_cache | bool

    - name: "Display apt cache update results / Отображение результатов обновления кэша apt"
      # Show cache update status / Показать статус обновления кэша
      ansible.builtin.debug:
        msg:
          - "=== APT Cache Update Results ==="
          - "Cache updated: {{ apt_update_result.changed | default(false) }}"
          - "Cache valid time: {{ apt_cache_valid_time }} seconds"
          - "Update cache enabled: {{ apt_update_cache }}"
      when: debug_mode | bool and apt_update_cache | bool

- name: "Upgrade system packages / Обновление системных пакетов"
  block:
    - name: "Upgrade all packages / Обновление всех пакетов"
      # Update installed packages to latest versions / Обновление установленных пакетов до последних версий
      ansible.builtin.apt:
        upgrade: "{{ apt_upgrade_packages }}"
      register: apt_upgrade_result
      when: apt_upgrade_packages | bool

    - name: "Display package upgrade results / Отображение результатов обновления пакетов"
      # Show upgrade operation status / Показать статус операции обновления
      ansible.builtin.debug:
        msg:
          - "=== Package Upgrade Results ==="
          - "Packages upgraded: {{ apt_upgrade_result.changed | default(false) }}"
          - "Upgrade enabled: {{ apt_upgrade_packages }}"
      when: debug_mode | bool and apt_upgrade_packages | bool

- name: "Install essential packages / Установка основных пакетов"
  block:
    - name: "Check which packages are already installed / Проверка уже установленных пакетов"
      # Gather information about currently installed packages / Сбор информации о текущих установленных пакетах
      ansible.builtin.package_facts:
        manager: auto
      register: package_facts

    - name: "Display currently installed packages / Отображение текущих установленных пакетов"
      # Show package installation status / Показать статус установки пакетов
      ansible.builtin.debug:
        msg:
          - "=== Currently Installed Packages ==="
          - "Total installed packages: {{ package_facts.ansible_facts.packages | length }}"
          - "Essential packages already installed: {{ apt_packages | intersect(package_facts.ansible_facts.packages.keys()) | list }}"
          - "Essential packages to install: {{ apt_packages | difference(package_facts.ansible_facts.packages.keys()) | list }}"
      when: debug_mode | bool

    - name: "Install essential packages / Установка основных пакетов"
      # Install required packages with retry mechanism / Установка необходимых пакетов с механизмом повтора
      ansible.builtin.apt:
        name: "{{ apt_packages }}"
        state: present
        install_recommends: "{{ apt_install_recommends }}"
      register: essential_packages_result
      retries: 3
      delay: 10
      until: essential_packages_result is succeeded

    - name: "Display essential packages installation results / Отображение результатов установки основных пакетов"
      # Show installation operation details / Показать детали операции установки
      ansible.builtin.debug:
        msg:
          - "=== Essential Packages Installation Results ==="
          - "Packages changed: {{ essential_packages_result.changed | default(false) }}"
          - "Packages installed: {{ essential_packages_result.results | selectattr('changed') | map(attribute='item') | list if essential_packages_result.results is defined else 'N/A' }}"
          - "Failed packages: {{ essential_packages_result.results | selectattr('failed') | map(attribute='item') | list if essential_packages_result.results is defined else 'None' }}"
      when: debug_mode | bool

- name: "Install optional packages / Установка дополнительных пакетов"
  block:
    - name: "Install optional packages / Установка дополнительных пакетов"
      # Install user-defined optional packages / Установка пользовательских дополнительных пакетов
      ansible.builtin.apt:
        name: "{{ apt_optional_packages }}"
        state: present
        install_recommends: "{{ apt_install_recommends }}"
      register: optional_packages_result
      retries: 3
      delay: 10
      until: optional_packages_result is succeeded
      when: apt_optional_packages | length > 0

    - name: "Display optional packages installation results / Отображение результатов установки дополнительных пакетов"
      # Show optional packages installation status / Показать статус установки дополнительных пакетов
      ansible.builtin.debug:
        msg:
          - "=== Optional Packages Installation Results ==="
          - "Packages changed: {{ optional_packages_result.changed | default(false) }}"
          - "Packages installed: {{ optional_packages_result.results | selectattr('changed') | map(attribute='item') | list if optional_packages_result.results is defined else 'N/A' }}"
          - "Failed packages: {{ optional_packages_result.results | selectattr('failed') | map(attribute='item') | list if optional_packages_result.results is defined else 'None' }}"
      when: debug_mode | bool and apt_optional_packages | length > 0

- name: "Verify package installation / Проверка установки пакетов"
  block:
    - name: "Verify essential packages are installed / Проверка установки основных пакетов"
      # Gather final package information for verification / Сбор финальной информации о пакетах для проверки
      ansible.builtin.package_facts:
        manager: auto
      register: final_package_facts

    - name: "Check if all essential packages are installed / Проверка что все основные пакеты установлены"
      # Verify each essential package is present / Проверка присутствия каждого основного пакета
      ansible.builtin.assert:
        that:
          - item in final_package_facts.ansible_facts.packages
        fail_msg: "Package '{{ item }}' was not successfully installed"
        success_msg: "Package '{{ item }}' is installed"
      loop: "{{ apt_packages }}"

    - name: "Display final installation summary / Отображение финальной сводки установки"
      # Show comprehensive installation results / Показать комплексные результаты установки
      ansible.builtin.debug:
        msg:
          - "=== Final Installation Summary ==="
          - "Essential packages installed: {{ apt_packages | length }}"
          - "Optional packages installed: {{ apt_optional_packages | length if apt_optional_packages is defined else 0 }}"
          - "Total packages in system: {{ final_package_facts.ansible_facts.packages | length }}"
          - "All essential packages verified: Yes"
      when: debug_mode | bool

- name: "Role execution completed / Выполнение роли завершено"
  # Final success message / Финальное сообщение об успехе
  ansible.builtin.debug:
    msg:
      - "=== install_apts Role Completed Successfully ==="
      - "Host: {{ inventory_hostname }}"
      - "All tasks completed without errors"
  when: debug_mode | bool