---
# Example Playbook for Package Installation Role
# This playbook demonstrates various usage scenarios

- name: Basic Package Installation
  hosts: servers
  become: true
  roles:
    - role: base/install_apts

- name: Development Server Setup
  hosts: dev_servers
  become: true
  vars:
    essential_packages:
      - acl
      - sudo
      - net-tools
      - gnupg
      - curl
    security_packages:
      - auditd
      - ufw
    admin_packages:
      - htop
      - vim
      - tree
      - git
    dev_packages:
      - python3
      - python3-pip
      - python3-requests
      - build-essential
      - nodejs
      - npm
    network_packages:
      - apt-transport-https
      - software-properties-common
      - ca-certificates
      - openssh-client
    additional_repositories:
      - repo: "ppa:ansible/ansible"
        state: present
      - repo: "ppa:ondrej/php"
        state: present
    apt_upgrade_packages: true
    debug_mode: true
  roles:
    - role: base/install_apts

- name: Production Server Setup
  hosts: production_servers
  become: true
  vars:
    essential_packages:
      - acl
      - sudo
      - net-tools
      - gnupg
    security_packages:
      - auditd
      - ufw
      - fail2ban
      - libpam-pwquality
      - apparmor
      - apparmor-utils
    admin_packages:
      - htop
      - vim
      - logrotate
    dev_packages: []
    network_packages:
      - ca-certificates
      - openssh-server
    packages_to_remove:
      - snapd
      - ubuntu-server
      - cloud-init
    debug_mode: false
    apt_upgrade_packages: false
    package_installation:
      state: present
      force_apt_get: false
      allow_unauthenticated: false
      install_recommends: true
      install_suggests: false
  roles:
    - role: base/install_apts

- name: Minimal Security Server
  hosts: security_servers
  become: true
  vars:
    essential_packages:
      - acl
      - sudo
      - net-tools
      - gnupg
    security_packages:
      - auditd
      - ufw
      - fail2ban
      - libpam-pwquality
      - apparmor
      - apparmor-utils
      - rkhunter
      - chkrootkit
    admin_packages:
      - htop
      - vim
      - logwatch
    dev_packages: []
    network_packages:
      - ca-certificates
      - openssh-server
    additional_repositories:
      - repo: "ppa:security/security-tools"
        state: present
    debug_mode: false
  roles:
    - role: base/install_apts

- name: Web Server Setup
  hosts: web_servers
  become: true
  vars:
    essential_packages:
      - acl
      - sudo
      - net-tools
      - gnupg
    security_packages:
      - auditd
      - ufw
      - fail2ban
    admin_packages:
      - htop
      - vim
      - curl
      - wget
    dev_packages: []
    network_packages:
      - apt-transport-https
      - software-properties-common
      - ca-certificates
    additional_repositories:
      - repo: "ppa:ondrej/nginx"
        state: present
      - repo: "ppa:ondrej/php"
        state: present
    debug_mode: true
  roles:
    - role: base/install_apts

- name: Database Server Setup
  hosts: db_servers
  become: true
  vars:
    essential_packages:
      - acl
      - sudo
      - net-tools
      - gnupg
    security_packages:
      - auditd
      - ufw
      - fail2ban
      - libpam-pwquality
    admin_packages:
      - htop
      - vim
      - monitoring-plugins
    dev_packages: []
    network_packages:
      - ca-certificates
      - openssh-server
    additional_repositories:
      - repo: "deb [arch=amd64] https://repo.mongodb.org/apt/ubuntu focal/mongodb-org/6.0 multiverse"
        state: present
        filename: mongodb
        key_url: "https://www.mongodb.org/static/pgp/server-6.0.asc"
    debug_mode: false
  roles:
    - role: base/install_apts

- name: Docker Host Setup
  hosts: docker_hosts
  become: true
  vars:
    essential_packages:
      - acl
      - sudo
      - net-tools
      - gnupg
    security_packages:
      - auditd
      - ufw
      - fail2ban
    admin_packages:
      - htop
      - vim
      - curl
    dev_packages: []
    network_packages:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    additional_repositories:
      - repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu focal stable"
        state: present
        filename: docker
        key_url: "https://download.docker.com/linux/ubuntu/gpg"
    debug_mode: true
  roles:
    - role: base/install_apts
