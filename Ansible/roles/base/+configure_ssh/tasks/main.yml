# Configure SSH from template (replaces 20+ lineinfile tasks)
# Настроить SSH из шаблона (заменяет 20+ задач lineinfile)
- name: "Configure SSH from template / Настроить SSH из шаблона"
  ansible.builtin.template:
    src: sshd_config.j2
    dest: "{{ ssh_config_file }}"
    backup: true
    owner: root
    group: root
    mode: '0600'
    validate: 'sshd -t -f %s'  # Validate configuration before applying
  become: true
  register: ssh_config_result
  notify: "restart sshd"
  when: config_ssh | default(true)
  tags:
    - configuration
    - ssh
    - template

