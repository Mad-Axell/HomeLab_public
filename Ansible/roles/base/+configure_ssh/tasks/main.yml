      - "Резервная копия создана:    {{ 'ДА' if ssh_banner_result.backup_file is defined else 'НЕТ' }}"
      - "Динамическая информация:    FQDN, ОС, Порт SSH (статично в баннере)"
      - "============================================================================="
  when: 
    - debug_mode | bool
    - debug_lang | default('both') in ['russian', 'both']
  tags:
    - debug
    - banner
    - template
    - russian


- name: "Create greeting profile script / Создать профильный скрипт приветствия"
  ansible.builtin.copy:
    src: dynamic_greeting.sh
    dest: "{{ ssh_greeting_file }}"
    mode: '0755'
    owner: root
    group: root
    backup: true
  become: true
  register: greeting_profile_result
  tags:
    - configuration
    - ssh
    - script
    - greeting

