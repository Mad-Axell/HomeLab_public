      - "============================================================================="
      - "Порт SSH:                      {{ ssh_port }}"
      - "Протокол SSH:                  {{ ssh_security.protocol }}"
      - "Аутентификация по паролю:      {{ ssh_security.password_authentication }}"
      - "Аутентификация по ключу:       {{ ssh_security.pubkey_authentication }}"
      - "Разрешить пустые пароли:       {{ ssh_security.permit_empty_passwords }}"
      - "Разрешить вход root:           {{ ssh_security.permit_root_login }}"
      - "Макс. попыток аутентификации:  {{ ssh_security.max_auth_tries }}"
      - "Время ожидания входа:          {{ ssh_security.login_grace_time }}с"
      - "Интервал активности клиента:   {{ ssh_security.client_alive_interval }}с"
      - "Макс. проверок активности:     {{ ssh_security.client_alive_count_max }}"
      - "Уровень логирования:           {{ ssh_security.log_level }}"
      - "Удобство Syslog:               {{ ssh_security.syslog_facility }}"
      - "Выводить последний вход:       {{ ssh_security.print_last_log }}"
      - "============================================================================="
      - "Расширенные настройки:"
      - "============================================================================="
      - "Сжатие:                        {{ ssh_advanced.compression }}"
      - "Переадресация X11:             {{ 'да' if ssh_advanced.x11_forwarding else 'нет' }}"
      - "Разрешить переадресацию TCP:   {{ 'да' if ssh_advanced.allow_tcp_forwarding else 'нет' }}"
      - "Шлюзовые порты:                {{ 'да' if ssh_advanced.gateway_ports else 'нет' }}"
      - "Разрешить переадресацию агента: {{ 'да' if ssh_advanced.allow_agent_forwarding else 'нет' }}"
      - "Использовать блоки Match:      {{ 'да' if ssh_advanced.use_match_blocks else 'нет' }}"
      - "============================================================================="
      - "Контроль доступа к сети:"
      - "============================================================================="
      - "Пароль для доверенных сетей:   {{ 'да' if ssh_access_control.trusted_networks_password_auth else 'нет' }}"
      - "Требовать оба для недоверенных: {{ 'да' if ssh_access_control.untrusted_networks_require_both else 'нет' }}"
      - "Поведение по умолчанию:        {{ ssh_access_control.default_network_behavior }}"
      - "Разрешенные подсети:           {{ final_allowed_subnets | length if final_allowed_subnets is defined else '0' }} настроено"
      - "Запрещенные подсети:           {{ final_denied_subnets | length if final_denied_subnets is defined else '0' }} настроено"
      - "Пользователи настроены:        {{ users_to_add | length if (users_to_add is defined and users_to_add | length > 0) else '0' }}"
      - "============================================================================="
      - "Криптографические настройки:"
      - "============================================================================="
      - "Алгоритмы ключей хоста:        {{ ssh_security.host_key_algorithms | truncate(60) }}..."
      - "Алгоритмы KEX:                 {{ ssh_security.kex_algorithms | truncate(60) }}..."
      - "Шифры:                         {{ ssh_security.ciphers | truncate(60) }}..."
      - "MAC:                           {{ ssh_security.macs | truncate(60) }}..."
      - "============================================================================="
      - "Настройки ОС:"
      - "============================================================================="
      - "Семейство ОС:                  {{ ansible_os_family }}"
      - "Имя службы SSH:                {{ ssh_os_vars.service_name }}"
      - "Пакет сервера:                 {{ ssh_os_vars.server_package }}"
      - "Пакет клиента:                 {{ ssh_os_vars.client_package }}"
      - "Менеджер пакетов:              {{ ssh_os_vars.package_manager }}"
      - "============================================================================="
  when: 
    - debug_mode | bool
    - debug_lang | default('both') in ['russian', 'both']
  tags:
    - debug
    - configuration
    - template
    - preview
    - russian

# Ensure SSH service is enabled and started
# Обеспечить запуск и автозапуск службы SSH
- name: "Ensure SSH service is enabled and started / Обеспечить запуск и автозапуск службы SSH"
  ansible.builtin.service:
    name: "{{ ssh_os_vars.service_name }}"
    state: started
    enabled: true
  register: ssh_service_result
  become: true
  tags:
    - service
    - ssh

# Test SSH configuration
# Тестировать конфигурацию SSH
- name: "Test SSH configuration / Тестировать конфигурацию SSH"
  ansible.builtin.command: sshd -t
  register: ssh_config_test_result
  changed_when: false
  become: true
  tags:
    - testing
    - ssh

- name: "Display SSH configuration test results / Отобразить результаты тестирования конфигурации SSH"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "SSH Configuration Test Results:"
      - "============================================================================="
      - "Configuration Test:      {{ 'PASSED' if ssh_config_test_result.rc == 0 else 'FAILED' }}"
      - "Return Code:             {{ ssh_config_test_result.rc }}"
      - "Output:                  {{ ssh_config_test_result.stdout }}"
      - "Errors:                  {{ ssh_config_test_result.stderr }}"
      - "============================================================================="
  when: debug_mode | bool
  tags:
    - debug
    - testing
    - ssh

# Restart SSH service if configuration was changed
# Перезапустить службу SSH если конфигурация была изменена
- name: "Restart SSH service if configuration was changed / Перезапустить службу SSH если конфигурация была изменена"
  ansible.builtin.service:
    name: "{{ ssh_os_vars.service_name }}"
    state: restarted
  become: true
  register: ssh_restart_result
  when: 
    - ssh_config_result is changed or
      ssh_banner_result is changed or
      greeting_profile_result is changed
  tags:
    - service
    - ssh
    - restart

# Display comprehensive final configuration summary
# Отображение комплексного итогового сводного отчета конфигурации
- name: "Display comprehensive final configuration summary / Отображение комплексного итогового сводного отчета конфигурации"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "SSH CONFIGURATION COMPLETED SUCCESSFULLY!"
      - "============================================================================="
      - "Operating System:          {{ ansible_distribution }} {{ ansible_distribution_version }}"
      - "OS Family:                 {{ ansible_os_family }}"
      - "SSH Port:                  {{ ssh_port }}"
      - "SSH Protocol:              {{ ssh_protocol }}"
      - "SSH Service Name:          {{ ssh_os_vars.service_name }}"
      - "SSH Config File:           {{ ssh_config_file }}"
      - "SSH Banner File:           {{ ssh_banner_file }}"
      - "Password Authentication:   {{ ssh_security.password_authentication }}"
      - "Pubkey Authentication:     {{ ssh_security.pubkey_authentication }}"
      - "Permit Root Login:         {{ ssh_security.permit_root_login }}"
      - "Max Auth Tries:            {{ ssh_security.max_auth_tries }}"
      - "Login Grace Time:          {{ ssh_security.login_grace_time }}s"
      - "Client Alive Interval:     {{ ssh_security.client_alive_interval }}s"
      - "Client Alive Count Max:    {{ ssh_security.client_alive_count_max }}"
      - "SSH Protocol Version:      {{ ssh_security.protocol }}"
      - "Log Level:                 {{ ssh_security.log_level }}"
      - "Syslog Facility:           {{ ssh_security.syslog_facility }}"
      - "Trusted Networks Password Auth: {{ ssh_access_control.trusted_networks_password_auth }}"
      - "Untrusted Networks Require Both: {{ ssh_access_control.untrusted_networks_require_both }}"
      - "Default Network Behavior:  {{ ssh_access_control.default_network_behavior }}"
      - "Configuration Mode:        {{ 'Direct subnets' if (allowed_subnets is defined and allowed_subnets | length > 0) else 'Users-based' }}"
      - "Allowed Subnets:           {{ final_allowed_subnets | length }} configured"
      - "Denied Subnets:            {{ final_denied_subnets | length }} configured"
      - "Users Configured:          {{ users_to_add | length if (users_to_add is defined and users_to_add | length > 0) else '0' }}"
      - "Backup Enabled:            {{ ssh_backup_enabled }}"
      - "Validation Enabled:        {{ validate_configuration }}"
      - "Debug Mode:                {{ debug_mode }}"
      - "============================================================================="
      - "Operation Results Summary:"
      - "- SSH Configuration:       {{ 'SUCCESS' if ssh_config_result is defined and ssh_config_result.changed else 'UNCHANGED' }}"
      - "- Service Configuration:   {{ 'SUCCESS' if ssh_service_result is defined and ssh_service_result.changed else 'SKIPPED' }}"
      - "- Configuration Test:      {{ 'PASSED' if ssh_config_test_result is defined and ssh_config_test_result.rc == 0 else 'FAILED' }}"
      - "- Service Restart:         {{ 'SUCCESS' if ssh_restart_result is defined and ssh_restart_result.changed else 'SKIPPED' }}"
      - "- Backup Operations:       {{ 'SUCCESS' if backup_result is defined else 'SKIPPED' }}"
      - "============================================================================="
      - "Configuration files modified:"
      - "- {{ ssh_config_file }}"
      - "- {{ ssh_banner_file }}"
      - "============================================================================="
  when: debug_mode | bool
  tags:
    - summary
    - ssh
    - completion
    - final
