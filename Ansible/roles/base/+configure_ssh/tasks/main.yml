---
# =============================================================================
# SSH Configuration Role - Main Tasks / Роль конфигурации SSH - Основные задачи
# =============================================================================
# This role configures SSH server with security best practices and network-based access control
# Эта роль настраивает SSH сервер с лучшими практиками безопасности и контролем доступа на основе сети
# =============================================================================

# Validate input parameters before configuration
# Валидация входных параметров перед конфигурацией
- name: "Include parameter validation tasks / Включить задачи валидации параметров"
  include_tasks: validate.yml
  when: validate_configuration | bool
  tags:
    - validation
    - ssh

# Display comprehensive system information for debugging
# Отображение полной системной информации для отладки
- name: "Display comprehensive system information for SSH configuration / Отображение полной системной информации для конфигурации SSH"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "System Information for SSH Configuration:"
      - "============================================================================="
      - "Distribution:                        {{ ansible_distribution }}"
      - "Version:                             {{ ansible_distribution_version }}"
      - "Architecture:                        {{ ansible_architecture }}"
      - "Kernel:                              {{ ansible_kernel }}"
      - "Hostname:                            {{ ansible_hostname }}"
      - "FQDN:                                {{ ansible_fqdn }}"
      - "OS Family:                           {{ ansible_os_family }}"
      - "SSH Port:                            {{ ssh_port }}"
      - "SSH Protocol:                        {{ ssh_protocol }}"
      - "SSH Service Name:                    {{ ssh_os_vars.service_name }}"
      - "SSH Config File:                     {{ ssh_config_file }}"
      - "SSH Banner File:                     {{ ssh_banner_file }}"
      - "Password Auth:                       {{ ssh_security.password_authentication }}"
      - "Pubkey Auth:                         {{ ssh_security.pubkey_authentication }}"
      - "Permit Root Login:                   {{ ssh_security.permit_root_login }}"
      - "Max Auth Tries:                      {{ ssh_security.max_auth_tries }}"
      - "Login Grace Time:                    {{ ssh_security.login_grace_time }}s"
      - "Client Alive Interval:               {{ ssh_security.client_alive_interval }}s"
      - "Client Alive Count Max:              {{ ssh_security.client_alive_count_max }}"
      - "SSH Protocol Version:                {{ ssh_security.protocol }}"
      - "Log Level:                           {{ ssh_security.log_level }}"
      - "Syslog Facility:                     {{ ssh_security.syslog_facility }}"
      - "Trusted Networks Password Auth:      {{ ssh_access_control.trusted_networks_password_auth }}"
      - "Untrusted Networks Require Both:     {{ ssh_access_control.untrusted_networks_require_both }}"
      - "Default Network Behavior:            {{ ssh_access_control.default_network_behavior }}"
      - "Configuration Mode:                  {{ 'Direct subnets' if (allowed_subnets is defined and allowed_subnets | length > 0) else 'Users-based' }}"
      - "Backup Enabled:                      {{ ssh_backup_enabled }}"
      - "Validation Enabled:                  {{ validate_configuration }}"
      - "Debug Mode:                          {{ debug_mode }}"
      - "============================================================================="
  when: debug_mode
  tags:
    - debug
    - ssh
    - system
    - information

# Check if SSH package is installed
# Проверить установлен ли пакет SSH
- name: "Check if SSH package is installed / Проверить установлен ли пакет SSH"
  ansible.builtin.package_facts:
    manager: "{{ ssh_os_vars.package_manager }}"
  failed_when: false
  tags:
    - installation
    - ssh

# Universal SSH package installation (replaces OS-specific files)
# Универсальная установка пакетов SSH (заменяет OS-специфичные файлы)
- name: "Install SSH server package universally / Установить пакет SSH сервера универсально"
  ansible.builtin.package:
    name: "{{ ssh_os_vars.server_package }}"
    state: present
    update_cache: "{{ ssh_os_vars.update_cache }}"
  register: ssh_server_install_result
  become: true
  tags:
    - installation
    - ssh
    - server
    - cross_platform

- name: "Install SSH client package universally / Установить пакет SSH клиента универсально"
  ansible.builtin.package:
    name: "{{ ssh_os_vars.client_package }}"
    state: present
  register: ssh_client_install_result
  become: true
  tags:
    - installation
    - ssh
    - client
    - cross_platform

- name: "Enable and start SSH service universally / Включить и запустить службу SSH универсально"
  ansible.builtin.service:
    name: "{{ ssh_os_vars.service_name }}"
    state: started
    enabled: true
  register: ssh_service_install_result
  become: true
  tags:
    - service
    - installation
    - ssh
    - server
    - cross_platform

- name: "Display universal SSH installation results (English) / Отображение универсальных результатов установки SSH (английский)"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "Universal SSH Installation Results:"
      - "============================================================================="
      - "OS Family:                    {{ ansible_os_family }}"
      - "Distribution:                 {{ ansible_distribution }} {{ ansible_distribution_version }}"
      - "SSH Server Package:           {{ ssh_os_vars.server_package }}"
      - "SSH Client Package:           {{ ssh_os_vars.client_package }}"
      - "Service Name:                 {{ ssh_os_vars.service_name }}"
      - "Server Installed:             {{ 'YES' if ssh_service_install_result.changed else 'NO' }}"
      - "============================================================================="
  when: 
    - debug_mode | bool
    - debug_lang | default('both') in ['english', 'both']
  tags:
    - debug
    - installation
    - results
    - english

- name: "Display universal SSH installation results (Russian) / Отображение универсальных результатов установки SSH (русский)"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "Результаты универсальной установки SSH:"
      - "============================================================================="
      - "Семейство ОС:                 {{ ansible_os_family }}"
      - "Дистрибутив:                  {{ ansible_distribution }} {{ ansible_distribution_version }}"
      - "SSH Сервер:                   {{ ssh_os_vars.server_package }}"
      - "SSH Клиент:                   {{ ssh_os_vars.client_package }}"
      - "Имя службы:                   {{ ssh_os_vars.service_name }}"
      - "Сервер установлен:            {{ 'ДА' if ssh_server_install_result.changed else 'НЕТ' }}"
      - "============================================================================="
  when: 
    - debug_mode | bool
    - debug_lang | default('both') in ['russian', 'both']
  tags:
    - debug
    - installation
    - results
    - russian

# Create backup copies of existing SSH configuration files
# Создание резервных копий существующих файлов конфигурации SSH
- name: "Create backup copies of existing SSH configuration files / Создание резервных копий существующих файлов конфигурации SSH"
  block:
    - name: "Create SSH backup directory / Создать директорию для резервных копий SSH"
      ansible.builtin.file:
        path: "{{ ssh_backup_dir }}"
        state: directory
        mode: '0700'
        owner: root
        group: root
      tags:
        - backup
        - ssh
        - directory
    
    - name: "Backup SSH configuration files / Резервное копирование файлов конфигурации SSH"
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ ssh_backup_dir }}/{{ item | basename }}{{ ssh_backup_suffix }}"
        remote_src: true
        backup: no
        mode: '0644'
      loop:
        - "{{ ssh_config_file }}"
        - "{{ ssh_banner_file }}"
        - "{{ ssh_greeting_file }}"
      register: backup_result
      tags:
        - backup
        - ssh
        - files
        - safety
  rescue:
    - name: "Backup operation failed - continuing without backup / Операция резервного копирования не удалась - продолжаем без резервного копирования"
      ansible.builtin.debug:
        msg: "Warning: Could not create backup copies. Continuing with configuration. / Предупреждение: Не удалось создать резервные копии. Продолжаем с конфигурацией."
      register: backup_result
      failed_when: false
  when: ssh_backup_enabled | bool
  become: true
  tags:
    - backup
    - ssh
    - files
    - safety

# Extract and process allowed and denied subnets
# Извлечение и обработка разрешенных и запрещенных подсетей

# Process allowed subnets / Обработка разрешенных подсетей
- name: "Process allowed subnets / Обработка разрешенных подсетей"
  include_tasks: process_allowed_subnets.yml
  tags:
    - allowed_subnets
    - extraction
    - subnets

# Process denied subnets / Обработка запрещенных подсетей
- name: "Process denied subnets / Обработка запрещенных подсетей"
  include_tasks: process_denied_subnets.yml
  tags:
    - denied_subnets
    - extraction
    - subnets

# Process not trusted subnets / Обработка недоверенных подсетей
- name: "Process not trusted subnets / Обработка недоверенных подсетей"
  include_tasks: process_not_trusted_subnets.yml
  tags:
    - not_trusted_subnets
    - extraction
    - subnets

# Resolve subnet conflicts - prioritize denied and not trusted over allowed
# Разрешение конфликтов подсетей - приоритет запрещенных и недоверенных над разрешенными
- name: "Resolve subnet conflicts - prioritize denied over allowed / Разрешить конфликты подсетей - приоритет запрещенных над разрешенными"
  ansible.builtin.set_fact:
    final_allowed_subnets: "{{ final_allowed_subnets | difference(final_denied_subnets | default([])) }}"
  when: 
    - final_allowed_subnets is defined
    - final_denied_subnets is defined
    - final_denied_subnets | length > 0
  tags:
    - subnets
    - conflict_resolution
    - priority

- name: "Resolve subnet conflicts - prioritize not trusted over allowed / Разрешить конфликты подсетей - приоритет недоверенных над разрешенными"
  ansible.builtin.set_fact:
    final_allowed_subnets: "{{ final_allowed_subnets | difference(final_not_trusted_subnets | default([])) }}"
  when: 
    - final_allowed_subnets is defined
    - final_not_trusted_subnets is defined
    - final_not_trusted_subnets | length > 0
  tags:
    - subnets
    - conflict_resolution
    - priority

- name: "Display subnet conflict resolution results (English) / Отображение результатов разрешения конфликтов подсетей (английский)"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "Subnet Conflict Resolution Results:"
      - "============================================================================="
      - "Original Allowed Subnets:     {{ (final_allowed_subnets | default([]) + final_denied_subnets | default([]) + final_not_trusted_subnets | default([])) | unique | length }}"
      - "Final Allowed Subnets:        {{ final_allowed_subnets | length if final_allowed_subnets is defined else '0' }}"
      - "Final Denied Subnets:         {{ final_denied_subnets | length if final_denied_subnets is defined else '0' }}"
      - "Final Not Trusted Subnets:    {{ final_not_trusted_subnets | length if final_not_trusted_subnets is defined else '0' }}"
      - "Conflicts Resolved:           {{ 'YES' if (final_allowed_subnets | default([]) + final_denied_subnets | default([]) + final_not_trusted_subnets | default([])) | unique | length != (final_allowed_subnets | default([]) | length + final_denied_subnets | default([]) | length + final_not_trusted_subnets | default([]) | length) else 'NO' }}"
      - "============================================================================="
  when: 
    - debug_mode | bool
    - debug_lang | default('both') in ['english', 'both']
  tags:
    - debug
    - subnets
    - conflict_resolution
    - english

- name: "Display subnet conflict resolution results (Russian) / Отображение результатов разрешения конфликтов подсетей (русский)"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "Результаты разрешения конфликтов подсетей:"
      - "============================================================================="
      - "Исходные разрешенные подсети:  {{ (final_allowed_subnets | default([]) + final_denied_subnets | default([]) + final_not_trusted_subnets | default([])) | unique | length }}"
      - "Финальные разрешенные подсети: {{ final_allowed_subnets | length if final_allowed_subnets is defined else '0' }}"
      - "Финальные запрещенные подсети: {{ final_denied_subnets | length if final_denied_subnets is defined else '0' }}"
      - "Финальные недоверенные подсети: {{ final_not_trusted_subnets | length if final_not_trusted_subnets is defined else '0' }}"
      - "Конфликты разрешены:           {{ 'ДА' if (final_allowed_subnets | default([]) + final_denied_subnets | default([]) + final_not_trusted_subnets | default([])) | unique | length != (final_allowed_subnets | default([]) | length + final_denied_subnets | default([]) | length + final_not_trusted_subnets | default([]) | length) else 'НЕТ' }}"
      - "============================================================================="
  when: 
    - debug_mode | bool
    - debug_lang | default('both') in ['russian', 'both']
  tags:
    - debug
    - subnets
    - conflict_resolution
    - russian

# Create SSH banner file from template
# Создать файл баннера SSH из шаблона
- name: "Create SSH banner file from template / Создать файл баннера SSH из шаблона"
  ansible.builtin.template:
    src: ssh_banner.j2
    dest: "{{ ssh_banner_file }}"
    mode: '0644'
    owner: root
    group: root
    backup: true
  become: true
  register: ssh_banner_result
  tags:
    - configuration
    - ssh
    - banner
    - template

# Display SSH banner creation results
# Отображение результатов создания баннера SSH
- name: "Display SSH banner creation results (English) / Отображение результатов создания баннера SSH (английский)"
  ansible.builtin.debug:
