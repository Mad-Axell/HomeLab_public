- name: "Display SSH configuration template preview (Russian) / Отображение предварительного просмотра шаблона конфигурации SSH (русский)"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "Предварительный просмотр шаблона конфигурации SSH:"
