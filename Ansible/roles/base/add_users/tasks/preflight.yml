---
# Preflight checks before role execution
# Предварительные проверки перед выполнением роли

- name: Check Ansible version
  ansible.builtin.assert:
    that:
      - ansible_version.full is version('2.14', '>=')
    fail_msg: |
      EN: This role requires Ansible 2.14 or higher. Current version: {{ ansible_version.full }}
      RU: Эта роль требует Ansible 2.14 или выше. Текущая версия: {{ ansible_version.full }}
    success_msg: |
      EN: Ansible version check passed: {{ ansible_version.full }}
      RU: Проверка версии Ansible пройдена: {{ ansible_version.full }}
  tags: ['preflight']

- name: Check OS compatibility
  ansible.builtin.assert:
    that:
      - ansible_facts.os_family == 'Debian'
      - ansible_facts.distribution_version is version(min_os_version, '>=')
    fail_msg: |
      EN: Unsupported OS: {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }}. Only Debian family distributions are supported.
      RU: Неподдерживаемая ОС: {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }}. Поддерживаются только дистрибутивы семейства Debian.
    success_msg: |
      EN: OS compatibility check passed: {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }}
      RU: Проверка совместимости ОС пройдена: {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }}
  vars:
    min_os_version: "11"
  tags: ['preflight']

- name: Check required Python modules
  ansible.builtin.assert:
    that:
      - ansible_facts.python_version is version('3.8', '>=')
    fail_msg: |
      EN: Python 3.8+ is required. Current version: {{ ansible_facts.python_version }}
      RU: Требуется Python 3.8+. Текущая версия: {{ ansible_facts.python_version }}
    success_msg: |
      EN: Python version check passed: {{ ansible_facts.python_version }}
      RU: Проверка версии Python пройдена: {{ ansible_facts.python_version }}
  tags: ['preflight']

- name: Display preflight check results
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "Preflight Checks Summary:"
      - "============================================================================="
      - "Ansible Version:          {{ ansible_version.full }}"
      - "Python Version:           {{ ansible_facts.python_version }}"
      - "Operating System:         {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }}"
      - "OS Family:                {{ ansible_facts.os_family }}"
      - "System Architecture:      {{ ansible_facts.architecture }}"
      - "Hostname:                 {{ ansible_facts.hostname }}"
      - "All Checks:               PASSED"
      - "============================================================================="
  when: debug_mode | default(false)
  tags: ['preflight', 'debug']

