---
# Internal variables for add_users role
# Внутренние переменные для роли add_users

# Default shell for users
# Оболочка по умолчанию для пользователей
default_shell: /bin/bash

# Default home directory prefix
# Префикс домашней директории по умолчанию
home_prefix: /home

# Sudo group name (may vary by OS)
# Имя группы sudo (может отличаться в зависимости от ОС)
sudo_group: sudo

# Valid shells allowed for user creation
# Допустимые оболочки для создания пользователей
valid_shells:
  - /bin/bash
  - /bin/sh
  - /bin/zsh
  - /bin/fish
  - /usr/bin/bash
  - /usr/bin/sh
  - /usr/bin/zsh
  - /usr/bin/fish

# Minimum UID for regular users
# Минимальный UID для обычных пользователей
min_uid: 1000

# Maximum UID for regular users
# Максимальный UID для обычных пользователей
max_uid: 65534

# Reserved usernames that should not be created
# Зарезервированные имена пользователей, которые не должны создаваться
reserved_usernames:
  - root
  - daemon
  - bin
  - sys
  - sync
  - games
  - man
  - lp
  - mail
  - news
  - uucp
  - proxy
  - www-data
  - backup
  - list
  - irc
  - gnats
  - nobody
  - systemd-network
  - systemd-resolve
  - systemd-timesync
  - messagebus
  - syslog
  - _apt
  - tss
  - uuidd
  - tcpdump
  - tty
  - sshd
  - systemd-coredump
  - systemd-network
  - systemd-resolve
  - systemd-timesync
  - messagebus
  - syslog
  - _apt
  - tss
  - uuidd
  - tcpdump
  - tty
  - sshd
