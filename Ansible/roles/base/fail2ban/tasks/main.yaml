---
# Fail2Ban Configuration Tasks / Задачи конфигурации Fail2Ban
# This role configures Fail2Ban with security best practices
# Данная роль настраивает Fail2Ban с соблюдением лучших практик безопасности

- name: "Validate Fail2Ban configuration parameters / Валидация параметров конфигурации Fail2Ban"
  include_tasks: validate.yaml
  when: validate_configuration | bool
  tags:
    - validation
    - fail2ban

- name: "Gather system package information for Fail2Ban validation / Сбор системной информации о пакетах для валидации Fail2Ban"
  ansible.builtin.package_facts:
    manager: apt
  register: package_facts
  when: validate_packages | default(true) | bool
  tags:
    - packages
    - validation
    - fail2ban

- name: "Display current system package status for debugging / Отображение текущего статуса системных пакетов для отладки"
  ansible.builtin.debug:
    msg: "Current packages: {{ package_facts.packages.keys() | list }}"
  when: debug_mode | bool and package_facts.packages is defined
  tags:
    - packages
    - debug
    - fail2ban

- name: "Install Fail2Ban intrusion prevention system and dependencies / Установка системы предотвращения вторжений Fail2Ban и зависимостей"
  ansible.builtin.apt:
    name: "{{ fail2ban_packages }}"
    state: present
    install_recommends: true
    update_cache: true
  register: package_install_result
  retries: 3
  delay: 10
  when: fail2ban_install | bool
  tags:
    - packages
    - installation
    - fail2ban

- name: "Display package installation details / Отображение деталей установки пакетов"
  ansible.builtin.debug:
    msg: |
      Package installation completed:
      Установка пакетов завершена:
      - Packages requested: {{ fail2ban_packages | join(', ') }}
      - Installation result: {{ package_install_result.changed | ternary('changed', 'no changes') }}
      - Installed packages: {{ package_install_result.results | map(attribute='item') | list if package_install_result.results is defined else 'N/A' }}
  when: debug_mode | bool and package_install_result is defined
  tags:
    - packages
    - debug
    - fail2ban

- name: "Create timestamped backup of existing Fail2Ban jail configuration / Создание резервной копии с временной меткой существующей конфигурации тюрем Fail2Ban"
  ansible.builtin.copy:
    src: /etc/fail2ban/jail.conf
    dest: /etc/fail2ban/jail.conf.backup.{{ ansible_date_time.epoch }}
    remote_src: true
    backup: false
  when: backup_configuration | bool
  ignore_errors: true
  register: backup_result
  tags:
    - backup
    - configuration
    - fail2ban

- name: "Display backup creation status / Отображение статуса создания резервной копии"
  ansible.builtin.debug:
    msg: "Backup creation result: {{ backup_result }}"
  when: debug_mode | bool and backup_result is defined
  tags:
    - backup
    - debug
    - fail2ban

- name: "Configure SSH daemon logging for Fail2Ban integration / Настройка логирования SSH демона для интеграции с Fail2Ban"
  include_tasks: configure_ssh_logging.yaml
  when: ssh_logging.enabled | bool
  tags:
    - ssh
    - logging
    - fail2ban

- name: "Create Fail2Ban main configuration directory with proper permissions / Создание основной директории конфигурации Fail2Ban с правильными правами доступа"
  ansible.builtin.file:
    path: /etc/fail2ban
    state: directory
    mode: '0755'
    owner: root
    group: root
  register: config_dir_result
  tags:
    - configuration
    - directories
    - fail2ban

- name: "Display configuration directory creation status / Отображение статуса создания директории конфигурации"
  ansible.builtin.debug:
    msg: "Configuration directory creation result: {{ config_dir_result }}"
  when: debug_mode | bool and config_dir_result is defined
  tags:
    - configuration
    - debug
    - fail2ban

- name: "Configure Fail2Ban global jail settings and security policies / Настройка глобальных параметров тюрем Fail2Ban и политик безопасности"
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: '0644'
    backup: "{{ backup_configuration | bool }}"
  register: jail_config_result
  notify:
    - Restart fail2ban
  tags:
    - configuration
    - jails
    - fail2ban

- name: "Display jail configuration status / Отображение статуса конфигурации тюрем"
  ansible.builtin.debug:
    msg: "Jail configuration result: {{ jail_config_result }}"
  when: debug_mode | bool and jail_config_result is defined
  tags:
    - configuration
    - debug
    - fail2ban

- name: "Configure Fail2Ban system logging and monitoring settings / Настройка системного логирования и мониторинга Fail2Ban"
  ansible.builtin.template:
    src: fail2ban.conf.j2
    dest: /etc/fail2ban/fail2ban.conf
    owner: root
    group: root
    mode: '0644'
    backup: "{{ backup_configuration | bool }}"
  register: logging_config_result
  notify:
    - Restart fail2ban
  tags:
    - configuration
    - logging
    - fail2ban

- name: "Display logging configuration status / Отображение статуса конфигурации логирования"
  ansible.builtin.debug:
    msg: "Logging configuration result: {{ logging_config_result }}"
  when: debug_mode | bool and logging_config_result is defined
  tags:
    - configuration
    - debug
    - fail2ban

- name: "Create Fail2Ban custom filters directory for user-defined rules / Создание директории пользовательских фильтров Fail2Ban для пользовательских правил"
  ansible.builtin.file:
    path: /etc/fail2ban/filter.d
    state: directory
    mode: '0755'
    owner: root
    group: root
  register: filters_dir_result
  tags:
    - configuration
    - directories
    - fail2ban

- name: "Create Fail2Ban custom actions directory for user-defined responses / Создание директории пользовательских действий Fail2Ban для пользовательских ответов"
  ansible.builtin.file:
    path: /etc/fail2ban/action.d
    state: directory
    mode: '0755'
    owner: root
    group: root
  register: actions_dir_result
  tags:
    - configuration
    - directories
    - fail2ban

- name: "Display custom directories creation status / Отображение статуса создания пользовательских директорий"
  ansible.builtin.debug:
    msg: "Custom directories creation - Filters: {{ filters_dir_result }}, Actions: {{ actions_dir_result }}"
  when: debug_mode | bool and (filters_dir_result is defined or actions_dir_result is defined)
  tags:
    - configuration
    - debug
    - fail2ban

- name: "Deploy custom Fail2Ban filters from templates if configured / Развертывание пользовательских фильтров Fail2Ban из шаблонов при настройке"
  ansible.builtin.template:
    src: "{{ item.key }}.conf.j2"
    dest: "/etc/fail2ban/filter.d/{{ item.key }}.conf"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ fail2ban_custom_filters | dict2items }}"
  when: fail2ban_custom_filters | length > 0
  register: custom_filters_result
  notify:
    - Restart fail2ban
  tags:
    - configuration
    - filters
    - fail2ban

- name: "Display custom filters configuration status / Отображение статуса конфигурации пользовательских фильтров"
  ansible.builtin.debug:
    msg: "Custom filters configuration result: {{ custom_filters_result }}"
  when: debug_mode | bool and custom_filters_result is defined
  tags:
    - configuration
    - debug
    - fail2ban

- name: "Deploy custom Fail2Ban actions from templates if configured / Развертывание пользовательских действий Fail2Ban из шаблонов при настройке"
  ansible.builtin.template:
    src: "{{ item.key }}.conf.j2"
    dest: "/etc/fail2ban/action.d/{{ item.key }}.conf"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ fail2ban_custom_actions | dict2items }}"
  when: fail2ban_custom_actions | length > 0
  register: custom_actions_result
  notify:
    - Restart fail2ban
  tags:
    - configuration
    - actions
    - fail2ban

- name: "Display custom actions configuration status / Отображение статуса конфигурации пользовательских действий"
  ansible.builtin.debug:
    msg: "Custom actions configuration result: {{ custom_actions_result }}"
  when: debug_mode | bool and custom_actions_result is defined
  tags:
    - configuration
    - debug
    - fail2ban

- name: "Ensure Fail2Ban intrusion prevention service is enabled and running / Обеспечение включения и запуска службы предотвращения вторжений Fail2Ban"
  ansible.builtin.service:
    name: fail2ban
    state: "{{ fail2ban_service_state }}"
    enabled: "{{ fail2ban_service_enabled }}"
  register: fail2ban_service_result
  tags:
    - service
    - fail2ban

- name: "Wait for Fail2Ban service socket to be ready after restart / Ожидание готовности сокета службы Fail2Ban после перезапуска"
  ansible.builtin.wait_for:
    path: /var/run/fail2ban/fail2ban.sock
    timeout: 30
  when: fail2ban_service_result is changed
  tags:
    - service
    - fail2ban

- name: "Verify Fail2Ban configuration syntax and reload settings / Проверка синтаксиса конфигурации Fail2Ban и перезагрузка настроек"
  ansible.builtin.command: fail2ban-client reload
  register: fail2ban_reload_result
  changed_when: false
  failed_when: false
  tags:
    - validation
    - fail2ban

- name: "Display Fail2Ban configuration verification result / Отображение результата проверки конфигурации Fail2Ban"
  ansible.builtin.debug:
    msg: |
      Fail2Ban configuration verification:
      Проверка конфигурации Fail2Ban:
      - Reload command result: {{ fail2ban_reload_result.rc | ternary('failed', 'success') }}
      - Return code: {{ fail2ban_reload_result.rc }}
      - Output: {{ fail2ban_reload_result.stdout | default('No output') }}
      - Error: {{ fail2ban_reload_result.stderr | default('No errors') }}
  when: debug_mode | bool and fail2ban_reload_result is defined
  tags:
    - validation
    - debug
    - fail2ban

- name: "Check Fail2Ban service active status using systemctl / Проверка активного статуса службы Fail2Ban через systemctl"
  ansible.builtin.command: systemctl is-active fail2ban
  register: fail2ban_active_check
  changed_when: false
  failed_when: false
  tags:
    - service
    - fail2ban

- name: "Check if Fail2Ban service is enabled for autostart / Проверка включения службы Fail2Ban для автозапуска"
  ansible.builtin.command: systemctl is-enabled fail2ban
  register: fail2ban_enabled_check
  changed_when: false
  failed_when: false
  tags:
    - service
    - fail2ban

- name: "Display systemctl status / Отображение статуса systemctl"
  ansible.builtin.debug:
    msg: |
      Fail2Ban systemctl status:
      - Active: {{ fail2ban_active_check.stdout }}
      - Enabled: {{ fail2ban_enabled_check.stdout }}
  when: debug_mode | bool
  tags:
    - service
    - debug
    - fail2ban

- name: "Ensure Fail2Ban service is properly configured and operational / Обеспечение правильной конфигурации и работоспособности службы Fail2Ban"
  ansible.builtin.assert:
    that:
      - fail2ban_enabled_check is defined
      - fail2ban_enabled_check.stdout == "enabled"
    fail_msg: "Fail2Ban service is not properly configured / Служба Fail2Ban неправильно настроена"
    success_msg: "Fail2Ban service is properly configured and enabled / Служба Fail2Ban правильно настроена и включена"
  tags:
    - service
    - validation
    - fail2ban

- name: "Query and display currently banned IP addresses in SSH jail / Запрос и отображение текущих заблокированных IP адресов в SSH тюрьме"
  ansible.builtin.command: fail2ban-client get sshd banned
  register: fail2ban_banned_ips
  changed_when: false
  when: debug_mode | bool
  tags:
    - service
    - debug
    - fail2ban

- name: "Display banned IPs / Отображение заблокированных IP"
  ansible.builtin.debug:
    var: fail2ban_banned_ips.stdout_lines
  when: debug_mode | bool and fail2ban_banned_ips.stdout_lines is defined
  tags:
    - service
    - debug
    - fail2ban