---
# SSH Logging Configuration Tasks / Задачи конфигурации логирования SSH
# This file configures SSH logging for Fail2Ban integration
# Данный файл настраивает логирование SSH для интеграции с Fail2Ban

- name: "Display SSH logging configuration start / Отображение начала конфигурации логирования SSH"
  ansible.builtin.debug:
    msg: |
      Starting SSH logging configuration:
      Начало конфигурации логирования SSH:
      - Log directory: {{ ssh_logging.log_directory }}
      - Log file: {{ ssh_logging.log_file }}
      - Log level: {{ ssh_logging.log_level }}
  when: debug_mode | bool
  tags:
    - ssh
    - logging
    - debug
    - fail2ban

- name: "Create SSH log directory with proper permissions for Fail2Ban monitoring / Создание директории логов SSH с правильными правами для мониторинга Fail2Ban"
  ansible.builtin.file:
    path: "{{ ssh_logging.log_directory }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  register: ssh_log_dir_result
  tags:
    - ssh
    - logging
    - directories
    - fail2ban

- name: "Display SSH log directory creation result / Отображение результата создания директории логов SSH"
  ansible.builtin.debug:
    msg: "SSH log directory creation result: {{ ssh_log_dir_result }}"
  when: debug_mode | bool and ssh_log_dir_result is defined
  tags:
    - ssh
    - logging
    - debug
    - fail2ban

- name: "Create SSH log file with appropriate ownership and permissions / Создание файла логов SSH с соответствующим владельцем и правами доступа"
  ansible.builtin.file:
    path: "{{ ssh_logging.log_directory }}/{{ ssh_logging.log_file }}"
    state: touch
    owner: root
    group: adm
    mode: '0640'
  register: ssh_log_file_result
  tags:
    - ssh
    - logging
    - fail2ban

- name: "Display SSH log file creation result / Отображение результата создания файла логов SSH"
  ansible.builtin.debug:
    msg: "SSH log file creation result: {{ ssh_log_file_result }}"
  when: debug_mode | bool and ssh_log_file_result is defined
  tags:
    - ssh
    - logging
    - debug
    - fail2ban

- name: "Configure rsyslog to route SSH daemon logs to dedicated file for Fail2Ban / Настройка rsyslog для маршрутизации логов SSH демона в отдельный файл для Fail2Ban"
  ansible.builtin.copy:
    dest: /etc/rsyslog.d/50-ssh.conf
    content: |
      # SSH logging configuration / Конфигурация логирования SSH
      if $programname == 'sshd' then {{ ssh_logging.log_directory }}/{{ ssh_logging.log_file }}
      & stop
    owner: root
    group: root
    mode: '0644'
  register: rsyslog_config_result
  notify:
    - restart rsyslog
  tags:
    - ssh
    - logging
    - rsyslog
    - fail2ban

- name: "Display rsyslog configuration result / Отображение результата конфигурации rsyslog"
  ansible.builtin.debug:
    msg: "rsyslog configuration result: {{ rsyslog_config_result }}"
  when: debug_mode | bool and rsyslog_config_result is defined
  tags:
    - ssh
    - logging
    - debug
    - fail2ban

- name: "Configure SSH daemon syslog facility for proper log routing / Настройка syslog facility для SSH демона для правильной маршрутизации логов"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?SyslogFacility'
    line: 'SyslogFacility {{ ssh_logging.syslog_facility }}'
    state: present
  register: ssh_syslog_facility_result
  notify:
    - restart sshd
  tags:
    - ssh
    - configuration
    - fail2ban

- name: "Display SSH syslog facility configuration result / Отображение результата конфигурации syslog facility SSH"
  ansible.builtin.debug:
    msg: "SSH syslog facility configuration result: {{ ssh_syslog_facility_result }}"
  when: debug_mode | bool and ssh_syslog_facility_result is defined
  tags:
    - ssh
    - configuration
    - debug
    - fail2ban

- name: "Configure SSH daemon log level for detailed authentication logging / Настройка уровня логирования SSH демона для детального логирования аутентификации"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?LogLevel'
    line: 'LogLevel {{ ssh_logging.log_level }}'
    state: present
  register: ssh_log_level_result
  notify:
    - restart sshd
  tags:
    - ssh
    - configuration
    - fail2ban

- name: "Display SSH log level configuration result / Отображение результата конфигурации уровня логирования SSH"
  ansible.builtin.debug:
    msg: "SSH log level configuration result: {{ ssh_log_level_result }}"
  when: debug_mode | bool and ssh_log_level_result is defined
  tags:
    - ssh
    - configuration
    - debug
    - fail2ban


- name: "Display SSH logging configuration completion / Отображение завершения конфигурации логирования SSH"
  ansible.builtin.debug:
    msg: |
      SSH logging configuration completed successfully!
      Конфигурация логирования SSH успешно завершена!
      - Log directory: {{ ssh_logging.log_directory }}
      - Log file: {{ ssh_logging.log_file }}
      - Log level: {{ ssh_logging.log_level }}
      - Syslog facility: {{ ssh_logging.syslog_facility }}
      - Full log path: {{ ssh_logging.log_directory }}/{{ ssh_logging.log_file }}
      - Configuration timestamp: {{ ansible_date_time.iso8601 }}
  when: debug_mode | bool
  tags:
    - ssh
    - logging
    - debug
    - fail2ban

- name: "Verify SSH log file permissions and ownership / Проверка прав доступа и владельца файла логов SSH"
  ansible.builtin.stat:
    path: "{{ ssh_logging.log_directory }}/{{ ssh_logging.log_file }}"
  register: ssh_log_file_stat
  when: debug_mode | bool
  tags:
    - ssh
    - logging
    - debug
    - fail2ban

- name: "Display SSH log file verification / Отображение проверки файла логов SSH"
  ansible.builtin.debug:
    msg: |
      SSH log file verification:
      Проверка файла логов SSH:
      - File exists: {{ ssh_log_file_stat.stat.exists | default('unknown') }}
      - File size: {{ ssh_log_file_stat.stat.size | default('unknown') }} bytes
      - File permissions: {{ ssh_log_file_stat.stat.mode | default('unknown') }}
      - File owner: {{ ssh_log_file_stat.stat.pw_name | default('unknown') }}
      - File group: {{ ssh_log_file_stat.stat.gr_name | default('unknown') }}
  when: debug_mode | bool and ssh_log_file_stat is defined
  tags:
    - ssh
    - logging
    - debug
    - fail2ban
