---
# Fail2Ban Role Handlers

- name: Restart fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: restarted
  listen: "restart fail2ban"

- name: Restart rsyslog
  ansible.builtin.service:
    name: rsyslog
    state: restarted
  listen: "restart rsyslog"

- name: Restart sshd
  ansible.builtin.service:
    name: sshd
    state: restarted
  listen: "restart sshd"

- name: Reload fail2ban
  ansible.builtin.command: fail2ban-client reload
  listen: "reload fail2ban"

- name: Restart all services
  ansible.builtin.service:
    name: "{{ item }}"
    state: restarted
  loop:
    - fail2ban
    - rsyslog
    - sshd
  listen: "restart all services"
