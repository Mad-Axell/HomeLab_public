---
# Fail2Ban Role Handlers / Обработчики роли Fail2Ban
# This file contains handlers for Fail2Ban role
# Данный файл содержит обработчики для роли Fail2Ban

- name: "Restart fail2ban"
  ansible.builtin.service:
    name: fail2ban
    state: restarted
  register: fail2ban_restart_result
  tags:
    - service
    - fail2ban

- name: "Display Fail2Ban restart result / Отображение результата перезапуска Fail2Ban"
  ansible.builtin.debug:
    msg: "Fail2Ban service restart result: {{ fail2ban_restart_result }}"
  when: debug_mode | bool and fail2ban_restart_result is defined
  tags:
    - service
    - debug
    - fail2ban

- name: "Restart rsyslog service / Перезапуск службы rsyslog"
  ansible.builtin.service:
    name: rsyslog
    state: restarted
  listen: "restart rsyslog"
  register: rsyslog_restart_result
  tags:
    - service
    - rsyslog
    - fail2ban

- name: "Display rsyslog restart result / Отображение результата перезапуска rsyslog"
  ansible.builtin.debug:
    msg: "rsyslog service restart result: {{ rsyslog_restart_result }}"
  when: debug_mode | bool and rsyslog_restart_result is defined
  tags:
    - service
    - debug
    - fail2ban

- name: "Restart SSH service / Перезапуск службы SSH"
  ansible.builtin.service:
    name: sshd
    state: restarted
  listen: "restart sshd"
  register: sshd_restart_result
  tags:
    - service
    - ssh
    - fail2ban

- name: "Display SSH restart result / Отображение результата перезапуска SSH"
  ansible.builtin.debug:
    msg: "SSH service restart result: {{ sshd_restart_result }}"
  when: debug_mode | bool and sshd_restart_result is defined
  tags:
    - service
    - debug
    - fail2ban

- name: "Reload Fail2Ban configuration / Перезагрузка конфигурации Fail2Ban"
  ansible.builtin.command: fail2ban-client reload
  listen: "reload fail2ban"
  register: fail2ban_reload_result
  tags:
    - service
    - configuration
    - fail2ban

- name: "Display Fail2Ban reload result / Отображение результата перезагрузки Fail2Ban"
  ansible.builtin.debug:
    msg: "Fail2Ban configuration reload result: {{ fail2ban_reload_result }}"
  when: debug_mode | bool and fail2ban_reload_result is defined
  tags:
    - service
    - debug
    - fail2ban

- name: "Restart all related services / Перезапуск всех связанных служб"
  ansible.builtin.service:
    name: "{{ item }}"
    state: restarted
  loop:
    - fail2ban
    - rsyslog
    - sshd
  listen: "restart all services"
  register: all_services_restart_result
  tags:
    - service
    - fail2ban

- name: "Display all services restart result / Отображение результата перезапуска всех служб"
  ansible.builtin.debug:
    msg: |
      All services restart result:
      Результат перезапуска всех служб:
      - Services restarted: {{ all_services_restart_result.results | map(attribute='item') | list if all_services_restart_result.results is defined else 'N/A' }}
      - Restart status: {{ all_services_restart_result.changed | ternary('changed', 'no changes') }}
      - Restart timestamp: {{ ansible_date_time.iso8601 }}
  when: debug_mode | bool and all_services_restart_result is defined
  tags:
    - service
    - debug
    - fail2ban

- name: "Verify all services are running after restart / Проверка работы всех служб после перезапуска"
  ansible.builtin.service_facts:
  register: services_status_after_restart
  when: debug_mode | bool
  tags:
    - service
    - debug
    - fail2ban

- name: "Display services status after restart / Отображение статуса служб после перезапуска"
  ansible.builtin.debug:
    msg: |
      Services status after restart:
      Статус служб после перезапуска:
      - fail2ban: {{ services_status_after_restart.ansible_facts.services['fail2ban.service'].state | default('unknown') }}
      - rsyslog: {{ services_status_after_restart.ansible_facts.services['rsyslog.service'].state | default('unknown') }}
      - ssh: {{ services_status_after_restart.ansible_facts.services['ssh.service'].state | default('unknown') }}
  when: debug_mode | bool and services_status_after_restart is defined
  tags:
    - service
    - debug
    - fail2ban
