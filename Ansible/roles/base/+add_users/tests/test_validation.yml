---
# Test playbook for validation scenarios
- name: Test validation scenarios
  hosts: localhost
  connection: local
  gather_facts: false
  
  tasks:
    - name: Test missing users_to_add
      ansible.builtin.include_role:
        name: base/add_users
      vars:
        users_to_add: []
      register: result
      failed_when: false
      
    - name: Verify validation failed for empty users list
      ansible.builtin.assert:
        that:
          - result.failed == true
          - "'users_to_add variable must be defined and not empty' in result.msg"
        success_msg: "Validation correctly failed for empty users list"
        fail_msg: "Validation should have failed for empty users list"

    - name: Test reserved username
      ansible.builtin.include_role:
        name: base/add_users
      vars:
        users_to_add:
          - username: root
            password: "test123"
      register: result
      failed_when: false
      
    - name: Verify validation failed for reserved username
      ansible.builtin.assert:
        that:
          - result.failed == true
          - "'is reserved and cannot be used' in result.msg"
        success_msg: "Validation correctly failed for reserved username"
        fail_msg: "Validation should have failed for reserved username"

    - name: Test short password
      ansible.builtin.include_role:
        name: base/add_users
      vars:
        add_users_validate_passwords: true
        add_users_min_password_length: 8
        users_to_add:
          - username: testuser
            password: "123"
      register: result
      failed_when: false
      
    - name: Verify validation failed for short password
      ansible.builtin.assert:
        that:
          - result.failed == true
          - "'is too short' in result.msg"
        success_msg: "Validation correctly failed for short password"
        fail_msg: "Validation should have failed for short password"

    - name: Test invalid shell
      ansible.builtin.include_role:
        name: base/add_users
      vars:
        users_to_add:
          - username: testuser
            password: "validpassword123"
            shell: "/invalid/shell"
      register: result
      failed_when: false
      
    - name: Verify validation failed for invalid shell
      ansible.builtin.assert:
        that:
          - result.failed == true
          - "'is not in the list of valid shells' in result.msg"
        success_msg: "Validation correctly failed for invalid shell"
        fail_msg: "Validation should have failed for invalid shell"

    - name: Test invalid UID
      ansible.builtin.include_role:
        name: base/add_users
      vars:
        users_to_add:
          - username: testuser
            password: "validpassword123"
            uid: 50
      register: result
      failed_when: false
      
    - name: Verify validation failed for invalid UID
      ansible.builtin.assert:
        that:
          - result.failed == true
          - "'is outside valid range' in result.msg"
        success_msg: "Validation correctly failed for invalid UID"
        fail_msg: "Validation should have failed for invalid UID"
