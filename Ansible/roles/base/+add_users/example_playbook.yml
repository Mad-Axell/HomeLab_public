---
# Example playbook for add_users role
- name: Add users to servers
  hosts: all
  become: true
  gather_facts: true
  
  vars:
    # Enable debug mode for demonstration
    debug_mode: true
    
    # Configure password validation
    add_users_validate_passwords: true
    add_users_min_password_length: 8
    
    # Define users to add
    users_to_add:
      - username: admin
        password: "SecurePassword123"
        groups: ["docker", "wheel"]
        is_sudoers: true
        shell: /bin/bash
        create_home: true
        
      - username: developer
        password: "DevPassword456"
        groups: ["docker", "git"]
        is_sudoers: true
        shell: /bin/zsh
        create_home: true
        
      - username: readonly
        password: "ReadOnly789"
        groups: ["users"]
        is_sudoers: false
        shell: /bin/bash
        create_home: true

  roles:
    - role: base/add_users
      tags:
        - users
        - setup

  post_tasks:
    - name: Display summary
      ansible.builtin.debug:
        msg: "User setup completed successfully"
      tags:
        - summary
