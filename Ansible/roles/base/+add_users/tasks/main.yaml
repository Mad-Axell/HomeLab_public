---
# Main tasks for add_users role
# Основные задачи роли add_users

# Include validation tasks
# Подключение задач валидации
- name: "Validate input parameters and user data | Валидация входных параметров и данных пользователей"
  ansible.builtin.include_tasks: validate.yml
  tags:
    - validation
    - always

# Display detailed user information in debug mode - English
# Отображение подробной информации о пользователях в режиме отладки - Английский
- name: "Display user configuration details (English) | Отображение деталей конфигурации пользователей (Английский)"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "User Configuration Details (English):"
      - "============================================================================="
      - "Username:               {{ item.username }}"
      - "Groups:                 {{ item.groups | default([]) | join(', ') }}"
      - "Sudo Privileges:        {{ 'Yes' if item.is_sudoers | default(false) else 'No' }}"
      - "Shell:                  {{ item.shell | default(add_users_default_shell) }}"
      - "UID:                    {{ item.uid | default('auto') }}"
      - "Create Home:            {{ 'Yes' if item.create_home | default(add_users_create_home) else 'No' }}"
      - "Home Directory:         {{ item.home | default(add_users_home_prefix + '/' + item.username) }}"
      - "============================================================================="
  loop: "{{ users_to_add }}"
  when: debug_mode
  tags:
    - debug
    - always

# Display detailed user information in debug mode - Russian
# Отображение подробной информации о пользователях в режиме отладки - Русский
- name: "Display user configuration details (Russian) | Отображение деталей конфигурации пользователей (Русский)"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "Детали конфигурации пользователя (Русский):"
      - "============================================================================="
      - "Имя пользователя:        {{ item.username }}"
      - "Группы:                  {{ item.groups | default([]) | join(', ') }}"
      - "Sudo привилегии:         {{ 'Да' if item.is_sudoers | default(false) else 'Нет' }}"
      - "Оболочка:                {{ item.shell | default(add_users_default_shell) }}"
      - "UID:                     {{ item.uid | default('авто') }}"
      - "Создать домашнюю папку:  {{ 'Да' if item.create_home | default(add_users_create_home) else 'Нет' }}"
      - "Домашняя директория:     {{ item.home | default(add_users_home_prefix + '/' + item.username) }}"
      - "============================================================================="
  loop: "{{ users_to_add }}"
  when: debug_mode
  tags:
    - debug
    - always

# Gather system information about existing users and groups
# Сбор системной информации о существующих пользователях и группах
- name: "Collect existing system users information | Сбор информации о существующих системных пользователях"
  ansible.builtin.getent:
    database: passwd
  register: existing_users
  tags:
    - facts
    - always

- name: "Collect existing system groups information | Сбор информации о существующих системных группах"
  ansible.builtin.getent:
    database: group
  register: existing_groups
  tags:
    - facts
    - always

# Display system information in debug mode
# Отображение системной информации в режиме отладки
- name: "Display system users and groups count | Отображение количества системных пользователей и групп"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "System Information Summary:"
      - "============================================================================="
      - "Existing Users:          {{ existing_users.ansible_facts.getent_passwd | default({}) | length }}"
      - "Existing Groups:         {{ existing_groups.ansible_facts.getent_group | default({}) | length }}"
      - "Users to Process:        {{ users_to_add | length }}"
      - "============================================================================="
  when: debug_mode
  tags:
    - debug
    - always

# Process and create required groups
# Обработка и создание необходимых групп
- name: "Extract unique groups from user configuration | Извлечение уникальных групп из конфигурации пользователей"
  ansible.builtin.set_fact:
    unique_groups: "{{ users_to_add | map(attribute='groups') | default([]) | flatten() | unique }}"
  tags:
    - facts
    - groups

- name: "Display groups to be created | Отображение групп для создания"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "Groups Creation Plan:"
      - "============================================================================="
      - "Groups to Create:         {{ unique_groups | join(', ') }}"
      - "Total Groups:             {{ unique_groups | length }}"
      - "============================================================================="
  when: debug_mode and unique_groups | length > 0
  tags:
    - debug
    - groups

# Create required user groups with comprehensive error handling and logging
# Создание необходимых пользовательских групп с комплексной обработкой ошибок и логированием
- name: "Create required user groups | Создание необходимых пользовательских групп"
  block:
    - name: "Create user groups | Создание пользовательских групп"
      ansible.builtin.group:
        name: "{{ item }}"
        state: present
      loop: "{{ unique_groups }}"
      when: unique_groups | length > 0
      register: group_creation_result
      tags:
        - groups
        - create
  rescue:
    - name: "Group creation failed - continuing with available groups | Создание групп не удалось - продолжаем с доступными группами"
      ansible.builtin.debug:
        msg: "Warning: Could not create some groups. Continuing with available groups. | Предупреждение: Не удалось создать некоторые группы. Продолжаем с доступными группами."
      register: group_creation_result
      failed_when: false
  tags:
    - groups
    - create

# Display detailed group creation results
# Отображение детальных результатов создания групп
- name: "Display detailed group creation results | Отображение детальных результатов создания групп"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "Group Creation Results:"
      - "============================================================================="
      - "Group Name:               {{ item.item }}"
      - "Operation Status:         {{ 'SUCCESS' if item.changed else 'ALREADY EXISTS' }}"
      - "Group Created:            {{ 'YES' if item.changed else 'NO' }}"
      - "Group Exists:             {{ 'YES' if not item.changed else 'NO' }}"
      - "============================================================================="
  loop: "{{ group_creation_result.results | default([]) }}"
  no_log: true
  when: 
    - debug_mode
    - group_creation_result is defined
  tags:
    - debug
    - groups
    - results

# Setup sudo configuration
# Настройка конфигурации sudo
- name: "Create sudo group for privileged users | Создание группы sudo для привилегированных пользователей"
  ansible.builtin.group:
    name: "{{ sudo_group }}"
    state: present
  when: users_to_add | selectattr('is_sudoers', 'equalto', true) | list | length > 0
  tags:
    - groups
    - sudo
    - create

- name: "Display sudo users information | Отображение информации о пользователях sudo"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "Sudo Configuration Summary:"
      - "============================================================================="
      - "Users with Sudo:          {{ users_to_add | selectattr('is_sudoers', 'equalto', true) | map(attribute='username') | list | join(', ') }}"
      - "Sudo Group:               {{ sudo_group }}"
      - "Total Sudo Users:         {{ users_to_add | selectattr('is_sudoers', 'equalto', true) | list | length }}"
      - "============================================================================="
  when: debug_mode and users_to_add | selectattr('is_sudoers', 'equalto', true) | list | length > 0
  tags:
    - debug
    - sudo

- name: "Ensure sudoers.d directory exists with proper permissions | Обеспечение существования директории sudoers.d с правильными правами"
  ansible.builtin.file:
    path: /etc/sudoers.d
    state: directory
    mode: '0755'
    owner: root
    group: root
  when: users_to_add | selectattr('is_sudoers', 'equalto', true) | list | length > 0
  tags:
    - sudo
    - create

# User management operations with comprehensive logging
# Операции управления пользователями с комплексным логированием
- name: "Identify existing system users | Определение существующих системных пользователей"
  ansible.builtin.set_fact:
    existing_usernames: "{{ existing_users.ansible_facts.getent_passwd | default({}) | list }}"
  tags:
    - facts
    - users

- name: "Display user creation plan | Отображение плана создания пользователей"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "User Management Plan:"
      - "============================================================================="
      - "Users to Create:          {{ users_to_add | rejectattr('username', 'in', existing_usernames) | map(attribute='username') | list | join(', ') }}"
      - "Users to Update:          {{ users_to_add | selectattr('username', 'in', existing_usernames) | map(attribute='username') | list | join(', ') }}"
      - "Total New Users:          {{ users_to_add | rejectattr('username', 'in', existing_usernames) | list | length }}"
      - "Total Updated Users:      {{ users_to_add | selectattr('username', 'in', existing_usernames) | list | length }}"
      - "============================================================================="
  when: debug_mode
  tags:
    - debug
    - users

# Create new system users with comprehensive error handling and logging
# Создание новых системных пользователей с комплексной обработкой ошибок и логированием
- name: "Create new system users with full configuration | Создание новых системных пользователей с полной конфигурацией"
  block:
    - name: "Create new system users | Создание новых системных пользователей"
      ansible.builtin.user:
        name: "{{ item.username }}"
        shell: "{{ item.shell | default(add_users_default_shell) }}"
        groups: "{{ item.groups | default([]) }}"
        append: true
        password: "{{ item.password | ansible.builtin.password_hash('sha512') }}"
        update_password: always
        createhome: "{{ item.create_home | default(add_users_create_home) }}"
        home: "{{ item.home | default(add_users_home_prefix + '/' + item.username) }}"
        system: false
        state: present
        uid: "{{ item.uid | default(omit) }}"
        gid: "{{ item.gid | default(omit) }}"
      loop: "{{ users_to_add }}"
      when: item.username not in existing_usernames
      register: user_creation_result
      notify: "notify user creation"
      tags:
        - users
        - create
  rescue:
    - name: "User creation failed - continuing with available users | Создание пользователей не удалось - продолжаем с доступными пользователями"
      ansible.builtin.debug:
        msg: "Warning: Could not create some users. Continuing with available users. | Предупреждение: Не удалось создать некоторых пользователей. Продолжаем с доступными пользователями."
      register: user_creation_result
      failed_when: false
  tags:
    - users
    - create

# Display detailed user creation results
# Отображение детальных результатов создания пользователей
- name: "Display detailed user creation results | Отображение детальных результатов создания пользователей"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "User Creation Results:"
      - "============================================================================="
      - "Username:                {{ item.item.username }}"
      - "Operation Status:        {{ 'SUCCESS' if item.changed else 'SKIPPED' }}"
      - "User Created:            {{ 'YES' if item.changed else 'NO' }}"
      - "Shell:                   {{ item.item.shell | default(add_users_default_shell) }}"
      - "Groups:                  {{ item.item.groups | default([]) | join(', ') }}"
      - "Home Directory:          {{ item.item.home | default(add_users_home_prefix + '/' + item.item.username) }}"
      - "UID:                     {{ item.item.uid | default('auto') }}"
      - "============================================================================="
  loop: "{{ user_creation_result.results | default([]) }}"
  no_log: true
  when: 
    - debug_mode
    - user_creation_result is defined
  tags:
    - debug
    - users
    - results

# Update existing users with comprehensive error handling and logging
# Обновление существующих пользователей с комплексной обработкой ошибок и логированием
- name: "Update existing users with new password and group membership | Обновление существующих пользователей новым паролем и членством в группах"
  block:
    - name: "Update existing users | Обновление существующих пользователей"
      ansible.builtin.user:
        name: "{{ item.username }}"
        groups: "{{ item.groups | default([]) }}"
        append: true
        password: "{{ item.password | ansible.builtin.password_hash('sha512') }}"
        update_password: always
      loop: "{{ users_to_add }}"
      when: item.username in existing_usernames
      register: user_update_result
      tags:
        - users
        - update
  rescue:
    - name: "User update failed - continuing with available users | Обновление пользователей не удалось - продолжаем с доступными пользователями"
      ansible.builtin.debug:
        msg: "Warning: Could not update some users. Continuing with available users. | Предупреждение: Не удалось обновить некоторых пользователей. Продолжаем с доступными пользователями."
      register: user_update_result
      failed_when: false
  tags:
    - users
    - update

# Display detailed user update results
# Отображение детальных результатов обновления пользователей
- name: "Display detailed user update results | Отображение детальных результатов обновления пользователей"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "User Update Results:"
      - "============================================================================="
      - "Username:                {{ item.item.username }}"
      - "Operation Status:        {{ 'SUCCESS' if item.changed else 'NO CHANGE' }}"
      - "Password Updated:        {{ 'YES' if item.changed else 'NO' }}"
      - "Groups Updated:          {{ 'YES' if item.changed else 'NO' }}"
      - "New Groups:              {{ item.item.groups | default([]) | join(', ') }}"
      - "============================================================================="
  loop: "{{ user_update_result.results | default([]) }}"
  no_log: true
  when: 
    - debug_mode
    - user_update_result is defined
  tags:
    - debug
    - users
    - results

# Sudo group management with comprehensive error handling and logging
# Управление группой sudo с комплексной обработкой ошибок и логированием
- name: "Add users to sudo group for administrative privileges | Добавление пользователей в группу sudo для административных привилегий"
  block:
    - name: "Add users to sudo group | Добавление пользователей в группу sudo"
      ansible.builtin.user:
        name: "{{ item.username }}"
        groups: "{{ sudo_group }}"
        append: true
      when: item.is_sudoers | default(false)
      loop: "{{ users_to_add }}"
      register: sudo_group_result
      tags:
        - users
        - sudo
        - update
  rescue:
    - name: "Sudo group assignment failed - continuing with available users | Назначение группы sudo не удалось - продолжаем с доступными пользователями"
      ansible.builtin.debug:
        msg: "Warning: Could not add some users to sudo group. Continuing with available users. | Предупреждение: Не удалось добавить некоторых пользователей в группу sudo. Продолжаем с доступными пользователями."
      register: sudo_group_result
      failed_when: false
  tags:
    - users
    - sudo
    - update

# Display detailed sudo group assignment results
# Отображение детальных результатов назначения группы sudo
- name: "Display detailed sudo group assignment results | Отображение детальных результатов назначения группы sudo"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "Sudo Group Assignment Results:"
      - "============================================================================="
      - "Username:                {{ item.item.username }}"
      - "Sudo Privileges:         {{ 'YES' if item.item.is_sudoers | default(false) else 'NO' }}"
      - "Operation Status:        {{ 'SUCCESS' if item.changed else 'NO CHANGE' }}"
      - "Added to Sudo Group:     {{ 'YES' if item.changed else 'NO' }}"
      - "Sudo Group:              {{ sudo_group }}"
      - "============================================================================="
  loop: "{{ sudo_group_result.results | default([]) }}"
  no_log: true
  when: 
    - debug_mode
    - sudo_group_result is defined
  tags:
    - debug
    - sudo
    - results

# Sudo configuration file management with comprehensive error handling and logging
# Управление файлами конфигурации sudo с комплексной обработкой ошибок и логированием
- name: "Create individual sudoers configuration files | Создание индивидуальных файлов конфигурации sudoers"
  block:
    - name: "Create sudoers configuration files | Создание файлов конфигурации sudoers"
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ item.username }}"
        content: "{{ item.username }} ALL=(ALL:ALL) ALL"
        mode: '0440'
        owner: root
        group: root
        validate: 'visudo -cf %s'
        backup: true
      when: item.is_sudoers | default(false)
      loop: "{{ users_to_add }}"
      register: sudoers_creation_result
      tags:
        - sudo
        - create
  rescue:
    - name: "Sudoers file creation failed - continuing with available users | Создание файлов sudoers не удалось - продолжаем с доступными пользователями"
      ansible.builtin.debug:
        msg: "Warning: Could not create some sudoers files. Continuing with available users. | Предупреждение: Не удалось создать некоторые файлы sudoers. Продолжаем с доступными пользователями."
      register: sudoers_creation_result
      failed_when: false
  tags:
    - sudo
    - create

# Display detailed sudoers file creation results
# Отображение детальных результатов создания файлов sudoers
- name: "Display detailed sudoers file creation results | Отображение детальных результатов создания файлов sudoers"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "Sudoers File Creation Results:"
      - "============================================================================="
      - "Username:                {{ item.item.username }}"
      - "Sudo Privileges:         {{ 'YES' if item.item.is_sudoers | default(false) else 'NO' }}"
      - "Operation Status:        {{ 'SUCCESS' if item.changed else 'NO CHANGE' }}"
      - "File Created:            {{ 'YES' if item.changed else 'NO' }}"
      - "File Path:               /etc/sudoers.d/{{ item.item.username }}"
      - "File Permissions:        0440"
      - "Validation:              visudo -cf"
      - "============================================================================="
  loop: "{{ sudoers_creation_result.results | default([]) }}"
  no_log: true
  when: 
    - debug_mode
    - sudoers_creation_result is defined
  tags:
    - debug
    - sudo
    - results

- name: "Remove sudoers files for users without sudo privileges | Удаление файлов sudoers для пользователей без привилегий sudo"
  block:
    - name: "Remove sudoers files | Удаление файлов sudoers"
      ansible.builtin.file:
        path: "/etc/sudoers.d/{{ item.username }}"
        state: absent
      when: not (item.is_sudoers | default(false))
      loop: "{{ users_to_add }}"
      register: sudoers_cleanup_result
      tags:
        - sudo
        - cleanup
  rescue:
    - name: "Sudoers file cleanup failed - continuing with available users | Очистка файлов sudoers не удалась - продолжаем с доступными пользователями"
      ansible.builtin.debug:
        msg: "Warning: Could not remove some sudoers files. Continuing with available users. | Предупреждение: Не удалось удалить некоторые файлы sudoers. Продолжаем с доступными пользователями."
      register: sudoers_cleanup_result
      failed_when: false
  tags:
    - sudo
    - cleanup

# Display detailed sudoers file cleanup results
# Отображение детальных результатов очистки файлов sudoers
- name: "Display detailed sudoers file cleanup results | Отображение детальных результатов очистки файлов sudoers"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "Sudoers File Cleanup Results:"
      - "============================================================================="
      - "Username:                {{ item.item.username }}"
      - "Sudo Privileges:         {{ 'NO' if not (item.item.is_sudoers | default(false)) else 'YES' }}"
      - "Operation Status:        {{ 'SUCCESS' if item.changed else 'NO CHANGE' }}"
      - "File Removed:            {{ 'YES' if item.changed else 'NO' }}"
      - "File Path:               /etc/sudoers.d/{{ item.item.username }}"
      - "============================================================================="
  loop: "{{ sudoers_cleanup_result.results | default([]) }}"
  no_log: true
  when: 
    - debug_mode
    - sudoers_cleanup_result is defined
  tags:
    - debug
    - sudo
    - results

# Final summary and completion status with comprehensive operation results - English
# Финальная сводка и статус завершения с комплексными результатами операций - Английский
- name: "Display comprehensive user management summary (English) | Отображение комплексной сводки управления пользователями (Английский)"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "USER MANAGEMENT COMPLETED SUCCESSFULLY!"
      - "============================================================================="
      - "Operating System:              {{ ansible_distribution }} {{ ansible_distribution_version }}"
      - "Total Users Processed:         {{ users_to_add | length }}"
      - "Users with Sudo:               {{ users_to_add | selectattr('is_sudoers', 'equalto', true) | list | length }}"
      - "Groups Created:                {{ unique_groups | length if unique_groups is defined else 0 }}"
      - "New Users Created:             {{ users_to_add | rejectattr('username', 'in', existing_usernames) | list | length if existing_usernames is defined else users_to_add | length }}"
      - "Existing Users Updated:        {{ users_to_add | selectattr('username', 'in', existing_usernames) | list | length if existing_usernames is defined else 0 }}"
      - "Debug Mode:                    {{ debug_mode }}"
      - "Validation Enabled:            {{ add_users_validate_passwords }}"
      - "============================================================================="
      - "Operation Results Summary:"
      - "- Group Creation:              {{ 'SUCCESS' if group_creation_result is defined else 'SKIPPED' }}"
      - "- User Creation:               {{ 'SUCCESS' if user_creation_result is defined else 'SKIPPED' }}"
      - "- User Updates:                {{ 'SUCCESS' if user_update_result is defined else 'SKIPPED' }}"
      - "- Sudo Group Assignment:       {{ 'SUCCESS' if sudo_group_result is defined else 'SKIPPED' }}"
      - "- Sudoers File Creation:       {{ 'SUCCESS' if sudoers_creation_result is defined else 'SKIPPED' }}"
      - "- Sudoers File Cleanup:        {{ 'SUCCESS' if sudoers_cleanup_result is defined else 'SKIPPED' }}"
      - "============================================================================="
      - "Configuration files modified:"
      - "- /etc/passwd (user accounts)"
      - "- /etc/group (group memberships)"
      - "- /etc/sudoers.d/ (sudo privileges)"
      - "============================================================================="
  when: debug_mode
  tags:
    - summary
    - debug
    - always

# Final summary and completion status with comprehensive operation results - Russian
# Финальная сводка и статус завершения с комплексными результатами операций - Русский
- name: "Display comprehensive user management summary (Russian) | Отображение комплексной сводки управления пользователями (Русский)"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "УПРАВЛЕНИЕ ПОЛЬЗОВАТЕЛЯМИ ЗАВЕРШЕНО УСПЕШНО!"
      - "============================================================================="
      - "Операционная система:            {{ ansible_distribution }} {{ ansible_distribution_version }}"
      - "Всего пользователей:             {{ users_to_add | length }}"
      - "Пользователей с sudo:            {{ users_to_add | selectattr('is_sudoers', 'equalto', true) | list | length }}"
      - "Групп создано:                   {{ unique_groups | length if unique_groups is defined else 0 }}"
      - "Новых пользователей:             {{ users_to_add | rejectattr('username', 'in', existing_usernames) | list | length if existing_usernames is defined else users_to_add | length }}"
      - "Обновлено пользователей:         {{ users_to_add | selectattr('username', 'in', existing_usernames) | list | length if existing_usernames is defined else 0 }}"
      - "Режим отладки:                   {{ debug_mode }}"
      - "Валидация включена:              {{ add_users_validate_passwords }}"
      - "============================================================================="
      - "Сводка результатов операций:"
      - "- Создание групп:                {{ 'УСПЕШНО' if group_creation_result is defined else 'ПРОПУЩЕНО' }}"
      - "- Создание пользователей:        {{ 'УСПЕШНО' if user_creation_result is defined else 'ПРОПУЩЕНО' }}"
      - "- Обновление пользователей:      {{ 'УСПЕШНО' if user_update_result is defined else 'ПРОПУЩЕНО' }}"
      - "- Назначение группы sudo:        {{ 'УСПЕШНО' if sudo_group_result is defined else 'ПРОПУЩЕНО' }}"
      - "- Создание файлов sudoers:       {{ 'УСПЕШНО' if sudoers_creation_result is defined else 'ПРОПУЩЕНО' }}"
      - "- Очистка файлов sudoers:        {{ 'УСПЕШНО' if sudoers_cleanup_result is defined else 'ПРОПУЩЕНО' }}"
      - "============================================================================="
      - "Измененные конфигурационные файлы:"
      - "- /etc/passwd (учетные записи пользователей)"
      - "- /etc/group (членство в группах)"
      - "- /etc/sudoers.d/ (привилегии sudo)"
      - "============================================================================="
  when: debug_mode
  tags:
    - summary
    - debug
    - always