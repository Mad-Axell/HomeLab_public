---
# Handlers for add_users role
# Обработчики для роли add_users

# Restart SSH service on RedHat-based systems
# Перезапуск службы SSH на системах RedHat
- name: "Restart SSH daemon on RedHat-based systems | Перезапуск демона SSH на системах RedHat"
  ansible.builtin.systemd:
    name: sshd
    state: restarted
  when: ansible_os_family == "RedHat"
  listen: "restart sshd"

# Restart SSH service on Debian-based systems
# Перезапуск службы SSH на системах Debian
- name: "Restart SSH service on Debian-based systems | Перезапуск службы SSH на системах Debian"
  ansible.builtin.systemd:
    name: ssh
    state: restarted
  when: ansible_os_family == "Debian"
  listen: "restart ssh"

# Notification handler for successful user creation
# Обработчик уведомлений об успешном создании пользователя
- name: "Notify successful user creation | Уведомление об успешном создании пользователя"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "User Creation Notification:"
      - "============================================================================="
      - "User:                     {{ item.username }}"
      - "Status:                   Created Successfully"
      - "Groups:                   {{ item.groups | default([]) | join(', ') }}"
      - "Sudo Privileges:          {{ 'Yes' if item.is_sudoers | default(false) else 'No' }}"
      - "============================================================================="
  loop: "{{ users_to_add }}"
  listen: "notify user creation"
  tags:
    - notification
