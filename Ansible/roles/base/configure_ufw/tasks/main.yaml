---
# UFW Configuration Tasks / Задачи конфигурации UFW
# This role configures Uncomplicated Firewall with security best practices
# Эта роль настраивает простой файрвол с лучшими практиками безопасности

- name: "Include parameter validation tasks / Включить задачи валидации параметров"
  include_tasks: validate.yaml
  when: validate_configuration | bool
  tags:
    - validation
    - ufw

- name: "Check if UFW package is installed / Проверить установлен ли пакет UFW"
  ansible.builtin.package_facts:
    manager: apt
  register: package_facts
  failed_when: false
  tags:
    - installation
    - ufw

- name: "Create UFW backup directory / Создать директорию для резервных копий UFW"
  ansible.builtin.file:
    path: "{{ ufw_backup_dir }}"
    state: directory
    mode: '0700'
    owner: root
    group: root
  when: ufw_backup_enabled | bool
  become: true
  tags:
    - backup
    - ufw

- name: "Install UFW package if not present / Установить пакет UFW если не установлен"
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true
  when: "package_facts.packages is not defined or 'ufw' not in package_facts.packages"
  register: ufw_install_result
  tags:
    - installation
    - ufw

- name: "Log UFW package installation / Логировать установку пакета UFW"
  ansible.builtin.debug:
    msg: "UFW package installed successfully / Пакет UFW успешно установлен"
  when: ufw_install_result is changed and debug_mode | bool
  tags:
    - debug
    - ufw

- name: "Ensure UFW service is enabled and started / Обеспечить запуск и автозапуск службы UFW"
  ansible.builtin.service:
    name: ufw
    state: started
    enabled: true
  when: ufw_install_result is changed or ufw_install_result is not defined
  tags:
    - service
    - ufw

- name: "Backup current UFW configuration before reset / Создать резервную копию конфигурации UFW перед сбросом"
  ansible.builtin.copy:
    src: "/etc/ufw/ufw.conf"
    dest: "{{ ufw_backup_dir }}/ufw.conf{{ ufw_backup_suffix }}"
    remote_src: true
    backup: true
  when: ufw_state == "reset" and ufw_backup_enabled | bool
  become: true
  failed_when: false
  tags:
    - backup
    - ufw

- name: "Reset UFW to default state (if requested) / Сбросить UFW к состоянию по умолчанию (если запрошено)"
  community.general.ufw:
    state: reset
  when: ufw_state == "reset"
  become: true
  register: ufw_reset_result
  tags:
    - configuration
    - ufw

- name: "Log UFW reset / Логировать сброс UFW"
  ansible.builtin.debug:
    msg: "UFW configuration has been reset to defaults / Конфигурация UFW сброшена к значениям по умолчанию"
  when: ufw_reset_result is changed and debug_mode | bool
  tags:
    - debug
    - ufw

- name: "Configure UFW logging level / Настроить уровень логирования UFW"
  community.general.ufw:
    logging: "{{ ufw_logging }}"
  become: true
  register: ufw_logging_result
  tags:
    - configuration
    - ufw

- name: "Log UFW logging configuration / Логировать настройку логирования UFW"
  ansible.builtin.debug:
    msg: "UFW logging level set to {{ ufw_logging }} / Уровень логирования UFW установлен в {{ ufw_logging }}"
  when: ufw_logging_result is changed and debug_mode | bool
  tags:
    - debug
    - ufw

- name: "Set UFW default incoming policy / Установить политику по умолчанию для входящих соединений UFW"
  community.general.ufw:
    direction: incoming
    policy: "{{ ufw_default_incoming }}"
  become: true
  register: ufw_incoming_result
  tags:
    - configuration
    - ufw

- name: "Set UFW default outgoing policy / Установить политику по умолчанию для исходящих соединений UFW"
  community.general.ufw:
    direction: outgoing
    policy: "{{ ufw_default_outgoing }}"
  become: true
  register: ufw_outgoing_result
  tags:
    - configuration
    - ufw

- name: "Log UFW default policies / Логировать политики по умолчанию UFW"
  ansible.builtin.debug:
    msg: "UFW default policies set: incoming={{ ufw_default_incoming }}, outgoing={{ ufw_default_outgoing }} / Политики UFW по умолчанию установлены: входящие={{ ufw_default_incoming }}, исходящие={{ ufw_default_outgoing }}"
  when: (ufw_incoming_result is changed or ufw_outgoing_result is changed) and debug_mode | bool
  tags:
    - debug
    - ufw

- name: "Extract allowed subnets from users_to_add / Извлечь разрешенные подсети из users_to_add"
  ansible.builtin.set_fact:
    extracted_allowed_subnets: "{{ extracted_allowed_subnets | default([]) + item.allowed_subnets }}"
  loop: "{{ users_to_add }}"
  when: 
    - users_to_add is defined
    - users_to_add | length > 0
    - allowed_subnets is not defined or allowed_subnets | length == 0
  tags:
    - extraction
    - subnets

- name: "Deduplicate extracted allowed subnets / Дедуплицировать извлеченные разрешенные подсети"
  ansible.builtin.set_fact:
    extracted_allowed_subnets: "{{ extracted_allowed_subnets | unique }}"
  when: 
    - users_to_add is defined
    - users_to_add | length > 0
    - allowed_subnets is not defined or allowed_subnets | length == 0
  tags:
    - extraction
    - subnets
    - deduplication

- name: "Extract denied subnets from users_to_add / Извлечь запрещенные подсети из users_to_add"
  ansible.builtin.set_fact:
    extracted_denied_subnets: "{{ extracted_denied_subnets | default([]) + item.denied_subnets }}"
  loop: "{{ users_to_add }}"
  when: 
    - users_to_add is defined
    - users_to_add | length > 0
    - denied_subnets is not defined or denied_subnets | length == 0
  tags:
    - extraction
    - subnets

- name: "Deduplicate extracted denied subnets / Дедуплицировать извлеченные запрещенные подсети"
  ansible.builtin.set_fact:
    extracted_denied_subnets: "{{ extracted_denied_subnets | unique }}"
  when: 
    - users_to_add is defined
    - users_to_add | length > 0
    - denied_subnets is not defined or denied_subnets | length == 0
  tags:
    - extraction
    - subnets
    - deduplication

- name: "Set final allowed subnets list / Установить финальный список разрешенных подсетей"
  ansible.builtin.set_fact:
    final_allowed_subnets: "{{ (allowed_subnets if (allowed_subnets is defined and allowed_subnets | length > 0) else extracted_allowed_subnets | default([])) | unique }}"
  tags:
    - extraction
    - subnets
    - deduplication

- name: "Set final denied subnets list / Установить финальный список запрещенных подсетей"
  ansible.builtin.set_fact:
    final_denied_subnets: "{{ (denied_subnets if (denied_subnets is defined and denied_subnets | length > 0) else extracted_denied_subnets | default([])) | unique }}"
  tags:
    - extraction
    - subnets
    - deduplication

- name: "Debug final allowed subnets list / Отладка финального списка разрешенных подсетей"
  ansible.builtin.debug:
    msg: |
      Final allowed subnets list (deduplicated) / Финальный список разрешенных подсетей (дедуплицированный):
      - Count / Количество: {{ final_allowed_subnets | length }}
      - Subnets / Подсети: {{ final_allowed_subnets | join(', ') }}
  when: debug_mode | bool
  tags:
    - debug
    - subnets
    - deduplication

- name: "Debug final denied subnets list / Отладка финального списка запрещенных подсетей"
  ansible.builtin.debug:
    msg: |
      Final denied subnets list (deduplicated) / Финальный список запрещенных подсетей (дедуплицированный):
      - Count / Количество: {{ final_denied_subnets | length }}
      - Subnets / Подсети: {{ final_denied_subnets | join(', ') }}
  when: debug_mode | bool
  tags:
    - debug
    - subnets
    - deduplication

- name: "Log final subnet configuration / Логировать финальную конфигурацию подсетей"
  ansible.builtin.debug:
    msg: |
      Final subnet configuration / Финальная конфигурация подсетей:
      - Allowed subnets / Разрешенные подсети: {{ final_allowed_subnets | join(', ') }}
      - Denied subnets / Запрещенные подсети: {{ final_denied_subnets | join(', ') }}
      - Configuration mode / Режим конфигурации: {{ 'Direct subnets' if (allowed_subnets is defined and allowed_subnets | length > 0) else 'Users-based' }}
  when: debug_mode | bool
  tags:
    - debug
    - subnets

- name: "Allow SSH access from allowed subnets / Разрешить SSH доступ с разрешенных подсетей"
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: "{{ ssh_protocol }}"
    from_ip: "{{ item }}"
    comment: "SSH access from {{ item }}"
  loop: "{{ final_allowed_subnets }}"
  become: true
  register: ssh_rules_result
  when: final_allowed_subnets | length > 0
  tags:
    - ssh
    - ufw
    - subnets

- name: "Log SSH allow rules configuration / Логировать конфигурацию правил разрешения SSH"
  ansible.builtin.debug:
    msg: "SSH access allowed from subnets: {{ final_allowed_subnets | join(', ') }} / SSH доступ разрешен с подсетей: {{ final_allowed_subnets | join(', ') }}"
  when: debug_mode | bool and final_allowed_subnets | length > 0
  tags:
    - debug
    - ssh
    - ufw
    - subnets

- name: "Deny SSH access from denied subnets / Запретить SSH доступ с запрещенных подсетей"
  community.general.ufw:
    rule: deny
    port: "{{ ssh_port }}"
    proto: "{{ ssh_protocol }}"
    from_ip: "{{ item }}"
    comment: "SSH access denied from {{ item }}"
  loop: "{{ final_denied_subnets }}"
  become: true
  register: ssh_deny_rules_result
  when: final_denied_subnets | length > 0
  tags:
    - ssh
    - ufw
    - subnets
    - deny

- name: "Log SSH deny rules configuration / Логировать конфигурацию правил запрета SSH"
  ansible.builtin.debug:
    msg: "SSH access denied from subnets: {{ final_denied_subnets | join(', ') }} / SSH доступ запрещен с подсетей: {{ final_denied_subnets | join(', ') }}"
  when: debug_mode | bool and final_denied_subnets | length > 0
  tags:
    - debug
    - ssh
    - ufw
    - subnets
    - deny

- name: "Add custom UFW rules / Добавить пользовательские правила UFW"
  community.general.ufw:
    rule: "{{ item.rule }}"
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    from_ip: "{{ item.from_ip | default(omit) }}"
    comment: "{{ item.comment | default(omit) }}"
  loop: "{{ ufw_rules }}"
  become: true
  register: custom_rules_result
  tags:
    - custom_rules
    - ufw

- name: "Log custom UFW rules / Логировать пользовательские правила UFW"
  ansible.builtin.debug:
    msg: "Custom UFW rule added: {{ item.rule }} {{ item.port }}/{{ item.proto }}{% if item.comment is defined %} ({{ item.comment }}){% endif %} / Добавлено пользовательское правило UFW: {{ item.rule }} {{ item.port }}/{{ item.proto }}{% if item.comment is defined %} ({{ item.comment }}){% endif %}"
  loop: "{{ ufw_rules }}"
  when: debug_mode | bool
  tags:
    - debug
    - custom_rules
    - ufw

- name: "Configure SSH rate limiting (if enabled) / Настроить ограничение скорости SSH (если включено)"
  community.general.ufw:
    rule: limit
    port: "{{ ssh_port }}"
    proto: "{{ ssh_protocol }}"
    comment: "SSH rate limiting ({{ ssh_rate_limit_attempts }} attempts per {{ ssh_rate_limit_time }}s) / Ограничение скорости SSH ({{ ssh_rate_limit_attempts }} попыток за {{ ssh_rate_limit_time }}с)"
  when: ssh_rate_limit | bool
  become: true
  register: ssh_rate_limit_result
  tags:
    - ssh
    - rate_limiting
    - ufw

- name: "Log SSH rate limiting configuration / Логировать настройку ограничения скорости SSH"
  ansible.builtin.debug:
    msg: "SSH rate limiting enabled: {{ ssh_rate_limit_attempts }} attempts per {{ ssh_rate_limit_time }} seconds / Ограничение скорости SSH включено: {{ ssh_rate_limit_attempts }} попыток за {{ ssh_rate_limit_time }} секунд"
  when: ssh_rate_limit_result is changed and debug_mode | bool
  tags:
    - debug
    - ssh
    - rate_limiting
    - ufw

- name: "Disable IPv6 in UFW (if requested) / Отключить IPv6 в UFW (если запрошено)"
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: '^IPV6='
    line: 'IPV6=no'
    backup: true
  when: not ufw_ipv6 | bool
  become: true
  register: ufw_ipv6_disable_result
  tags:
    - ipv6
    - ufw

- name: "Log IPv6 configuration / Логировать конфигурацию IPv6"
  ansible.builtin.debug:
    msg: "IPv6 support {{ 'enabled' if ufw_ipv6 | bool else 'disabled' }} in UFW / Поддержка IPv6 {{ 'включена' if ufw_ipv6 | bool else 'отключена' }} в UFW"
  when: ufw_ipv6_disable_result is changed and debug_mode | bool
  tags:
    - debug
    - ipv6
    - ufw

- name: "Enable UFW (final step) / Включить UFW (финальный шаг)"
  community.general.ufw:
    state: enabled
  become: true
  register: ufw_enable_result
  tags:
    - enable
    - ufw

- name: "Log UFW enablement / Логировать включение UFW"
  ansible.builtin.debug:
    msg: "UFW has been enabled successfully / UFW успешно включен"
  when: ufw_enable_result is changed and debug_mode | bool
  tags:
    - debug
    - enable
    - ufw

- name: "Display UFW status / Отобразить статус UFW"
  ansible.builtin.command: ufw status verbose
  register: ufw_status
  changed_when: false
  when: debug_mode | bool
  tags:
    - debug
    - status
    - ufw

- name: "Show UFW status output / Показать вывод статуса UFW"
  ansible.builtin.debug:
    var: ufw_status.stdout_lines
  when: debug_mode | bool and ufw_status.stdout_lines is defined
  tags:
    - debug
    - status
    - ufw

- name: "Ensure UFW service is enabled and started (final check) / Обеспечить запуск и автозапуск службы UFW (финальная проверка)"
  ansible.builtin.service:
    name: ufw
    state: started
    enabled: true
  become: true
  tags:
    - service
    - ufw

- name: "Check UFW service status via systemctl / Проверить статус службы UFW через systemctl"
  ansible.builtin.command: systemctl is-active ufw
  register: ufw_service_active
  changed_when: false
  tags:
    - service
    - ufw

- name: "Check UFW service enabled status via systemctl / Проверить статус автозапуска службы UFW через systemctl"
  ansible.builtin.command: systemctl is-enabled ufw
  register: ufw_service_enabled
  changed_when: false
  tags:
    - service
    - ufw

- name: "Get UFW service detailed status / Получить детальный статус службы UFW"
  ansible.builtin.command: systemctl show ufw --property=ActiveState,SubState,LoadState
  register: ufw_service_details
  changed_when: false
  tags:
    - service
    - ufw

- name: "Debug UFW service status / Отладка статуса службы UFW"
  ansible.builtin.debug:
    msg: |
      UFW service status / Статус службы UFW:
      - Active / Активна: {{ ufw_service_active.stdout }}
      - Enabled / Автозапуск: {{ ufw_service_enabled.stdout }}
      - Details / Детали: {{ ufw_service_details.stdout }}
  when: debug_mode | bool
  tags:
    - debug
    - service
    - ufw

- name: "Show UFW service logs if not active / Показать логи службы UFW если не активна"
  ansible.builtin.command: journalctl -u ufw.service --no-pager -n 20
  register: ufw_service_logs
  changed_when: false
  when: 
    - debug_mode | bool
    - ufw_service_active.stdout != "active"
  tags:
    - debug
    - service
    - ufw

- name: "Display UFW service logs / Отобразить логи службы UFW"
  ansible.builtin.debug:
    msg: "UFW service logs (last 20 lines) / Логи службы UFW (последние 20 строк):\n{{ ufw_service_logs.stdout_lines | join('\n') }}"
  when: 
    - debug_mode | bool
    - ufw_service_active.stdout != "active"
    - ufw_service_logs.stdout_lines is defined
  tags:
    - debug
    - service
    - ufw

- name: "Ensure UFW service is running / Обеспечить работу службы UFW"
  ansible.builtin.assert:
    that:
      - ufw_service_active.stdout == "active"
      - ufw_service_enabled.stdout in ["enabled", "static"]
    fail_msg: "UFW service is not properly configured. Active: {{ ufw_service_active.stdout }}, Enabled: {{ ufw_service_enabled.stdout }} / Служба UFW неправильно настроена. Активна: {{ ufw_service_active.stdout }}, Автозапуск: {{ ufw_service_enabled.stdout }}"
    success_msg: "UFW service is properly configured and running / Служба UFW правильно настроена и работает"
  tags:
    - service
    - ufw

- name: "Final UFW configuration summary / Итоговая сводка конфигурации UFW"
  ansible.builtin.debug:
    msg: |
      UFW Configuration Summary / Сводка конфигурации UFW:
      - Default incoming policy / Политика входящих по умолчанию: {{ ufw_default_incoming }}
      - Default outgoing policy / Политика исходящих по умолчанию: {{ ufw_default_outgoing }}
      - Logging level / Уровень логирования: {{ ufw_logging }}
      - IPv6 support / Поддержка IPv6: {{ 'enabled' if ufw_ipv6 | bool else 'disabled' }}
      - SSH rate limiting / Ограничение скорости SSH: {{ 'enabled' if ssh_rate_limit | bool else 'disabled' }}
      - Configuration mode / Режим конфигурации: {{ 'Direct subnets' if (allowed_subnets is defined and allowed_subnets | length > 0) else 'Users-based' }}
      - Allowed subnets / Разрешенные подсети: {{ final_allowed_subnets | join(', ') }}
      - Denied subnets / Запрещенные подсети: {{ final_denied_subnets | join(', ') }}
      - Custom rules count / Количество пользовательских правил: {{ ufw_rules | length }}
      {% if users_to_add is defined and users_to_add | length > 0 %}
      - Users configured / Настроено пользователей: {{ users_to_add | length }}
      {% endif %}
  when: debug_mode | bool
  tags:
    - debug
    - summary
    - ufw