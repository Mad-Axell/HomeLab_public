---
# UFW Configuration Validation Tasks / Задачи валидации конфигурации UFW
# Validates input parameters before applying UFW configuration
# Валидирует входные параметры перед применением конфигурации UFW

- name: "Validate SSH port number / Валидировать номер порта SSH"
  ansible.builtin.assert:
    that:
      - ssh_port is number
      - ssh_port >= 1
      - ssh_port <= 65535
    fail_msg: "SSH port must be a number between 1 and 65535 / Порт SSH должен быть числом от 1 до 65535"
    success_msg: "SSH port validation passed / Валидация порта SSH прошла успешно"
  tags:
    - validation
    - ssh

- name: "Validate SSH protocol / Валидировать протокол SSH"
  ansible.builtin.assert:
    that:
      - ssh_protocol in ['tcp', 'udp']
    fail_msg: "SSH protocol must be either 'tcp' or 'udp' / Протокол SSH должен быть 'tcp' или 'udp'"
    success_msg: "SSH protocol validation passed / Валидация протокола SSH прошла успешно"
  tags:
    - validation
    - ssh

- name: "Validate configuration mode / Валидировать режим конфигурации"
  ansible.builtin.assert:
    that:
      - (allowed_subnets is defined and allowed_subnets | length > 0) or (users_to_add is defined and users_to_add | length > 0)
    fail_msg: "Either allowed_subnets or users_to_add must be defined and non-empty / Либо allowed_subnets, либо users_to_add должны быть определены и не пусты"
    success_msg: "Configuration mode validation passed / Валидация режима конфигурации прошла успешно"
  tags:
    - validation
    - configuration

- name: "Validate direct subnet configuration / Валидировать прямую конфигурацию подсетей"
  ansible.builtin.assert:
    that:
      - allowed_subnets is sequence
      - denied_subnets is sequence
    fail_msg: "allowed_subnets and denied_subnets must be lists / allowed_subnets и denied_subnets должны быть списками"
    success_msg: "Direct subnet configuration validation passed / Валидация прямой конфигурации подсетей прошла успешно"
  when: allowed_subnets is defined and allowed_subnets | length > 0
  tags:
    - validation
    - subnets

- name: "Validate direct allowed subnets format / Валидировать формат прямых разрешенных подсетей"
  ansible.builtin.assert:
    that:
      - item is match('^[0-9]{1,3}.[0-9]{1,3}.[0-9]{1,3}.[0-9]{1,3}/[0-9]{1,2}$')
    fail_msg: "Invalid allowed subnet format: {{ item }}. Must be in CIDR notation (e.g., 192.168.1.0/24) / Неверный формат разрешенной подсети: {{ item }}. Должен быть в нотации CIDR (например, 192.168.1.0/24)"
    success_msg: "Allowed subnet {{ item }} format is valid / Формат разрешенной подсети {{ item }} корректен"
  loop: "{{ allowed_subnets }}"
  when: allowed_subnets is defined and allowed_subnets | length > 0
  tags:
    - validation
    - subnets

- name: "Validate direct denied subnets format / Валидировать формат прямых запрещенных подсетей"
  ansible.builtin.assert:
    that:
      - item is match('^[0-9]{1,3}.[0-9]{1,3}.[0-9]{1,3}.[0-9]{1,3}/[0-9]{1,2}$')
    fail_msg: "Invalid denied subnet format: {{ item }}. Must be in CIDR notation (e.g., 192.168.1.0/24) / Неверный формат запрещенной подсети: {{ item }}. Должен быть в нотации CIDR (например, 192.168.1.0/24)"
    success_msg: "Denied subnet {{ item }} format is valid / Формат запрещенной подсети {{ item }} корректен"
  loop: "{{ denied_subnets }}"
  when: denied_subnets is defined and denied_subnets | length > 0
  tags:
    - validation
    - subnets

- name: "Validate users_to_add structure / Валидировать структуру users_to_add"
  ansible.builtin.assert:
    that:
      - users_to_add is sequence
    fail_msg: "users_to_add must be a list / users_to_add должен быть списком"
    success_msg: "Users list validation passed / Валидация списка пользователей прошла успешно"
  when: users_to_add is defined and users_to_add | length > 0
  tags:
    - validation
    - users

- name: "Validate individual user structure / Валидировать структуру отдельных пользователей"
  ansible.builtin.assert:
    that:
      - item.username is defined
      - item.username is string
      - item.username | length > 0
      - item.password is defined
      - item.password is string
      - item.password | length > 0
      - item.groups is defined
      - item.groups is sequence
      - item.is_sudoers is defined
      - item.is_sudoers is boolean
      - item.shell is defined
      - item.shell is string
      - item.allowed_subnets is defined
      - item.allowed_subnets is sequence
      - item.denied_subnets is defined
      - item.denied_subnets is sequence
    fail_msg: "Invalid user structure: {{ item }}. Each user must have username, password, groups, is_sudoers, shell, allowed_subnets, and denied_subnets / Неверная структура пользователя: {{ item }}. Каждый пользователь должен иметь username, password, groups, is_sudoers, shell, allowed_subnets и denied_subnets"
    success_msg: "User {{ item.username }} structure is valid / Структура пользователя {{ item.username }} корректна"
  loop: "{{ users_to_add }}"
  when: users_to_add | length > 0
  tags:
    - validation
    - users

- name: "Validate allowed subnets for each user / Валидировать разрешенные подсети для каждого пользователя"
  ansible.builtin.assert:
    that:
      - item.1 is match('^[0-9]{1,3}.[0-9]{1,3}.[0-9]{1,3}.[0-9]{1,3}/[0-9]{1,2}$')
    fail_msg: "Invalid allowed subnet format for user {{ item.0.username }}: {{ item.1 }}. Must be in CIDR notation (e.g., 192.168.1.0/24) / Неверный формат разрешенной подсети для пользователя {{ item.0.username }}: {{ item.1 }}. Должен быть в нотации CIDR (например, 192.168.1.0/24)"
    success_msg: "Allowed subnet {{ item.1 }} for user {{ item.0.username }} format is valid / Формат разрешенной подсети {{ item.1 }} для пользователя {{ item.0.username }} корректен"
  with_subelements:
    - "{{ users_to_add }}"
    - allowed_subnets
    - flags:
        skip_missing: true
  when: users_to_add | length > 0
  tags:
    - validation
    - users

- name: "Validate denied subnets for each user / Валидировать запрещенные подсети для каждого пользователя"
  ansible.builtin.assert:
    that:
      - item.1 is match('^[0-9]{1,3}.[0-9]{1,3}.[0-9]{1,3}.[0-9]{1,3}/[0-9]{1,2}$')
    fail_msg: "Invalid denied subnet format for user {{ item.0.username }}: {{ item.1 }}. Must be in CIDR notation (e.g., 192.168.1.0/24) / Неверный формат запрещенной подсети для пользователя {{ item.0.username }}: {{ item.1 }}. Должен быть в нотации CIDR (например, 192.168.1.0/24)"
    success_msg: "Denied subnet {{ item.1 }} for user {{ item.0.username }} format is valid / Формат запрещенной подсети {{ item.1 }} для пользователя {{ item.0.username }} корректен"
  with_subelements:
    - "{{ users_to_add }}"
    - denied_subnets
    - flags:
        skip_missing: true
  when: users_to_add | length > 0
  tags:
    - validation
    - users

- name: "Validate UFW default policies / Валидировать политики UFW по умолчанию"
  ansible.builtin.assert:
    that:
      - ufw_default_incoming in ['allow', 'deny', 'reject']
      - ufw_default_outgoing in ['allow', 'deny', 'reject']
    fail_msg: "UFW default policies must be 'allow', 'deny', or 'reject' / Политики UFW по умолчанию должны быть 'allow', 'deny' или 'reject'"
    success_msg: "UFW default policies validation passed / Валидация политик UFW по умолчанию прошла успешно"
  tags:
    - validation
    - ufw

- name: "Validate UFW logging level / Валидировать уровень логирования UFW"
  ansible.builtin.assert:
    that:
      - ufw_logging in ['off', 'low', 'medium', 'high', 'full']
    fail_msg: "UFW logging level must be one of: off, low, medium, high, full / Уровень логирования UFW должен быть одним из: off, low, medium, high, full"
    success_msg: "UFW logging level validation passed / Валидация уровня логирования UFW прошла успешно"
  tags:
    - validation
    - ufw

- name: "Validate UFW state / Валидировать состояние UFW"
  ansible.builtin.assert:
    that:
      - ufw_state in ['enabled', 'disabled', 'reset']
    fail_msg: "UFW state must be 'enabled', 'disabled', or 'reset' / Состояние UFW должно быть 'enabled', 'disabled' или 'reset'"
    success_msg: "UFW state validation passed / Валидация состояния UFW прошла успешно"
  tags:
    - validation
    - ufw

- name: "Validate custom UFW rules structure / Валидировать структуру пользовательских правил UFW"
  ansible.builtin.assert:
    that:
      - ufw_rules is sequence
    fail_msg: "ufw_rules must be a list / ufw_rules должен быть списком"
    success_msg: "Custom UFW rules list validation passed / Валидация списка пользовательских правил UFW прошла успешно"
  tags:
    - validation
    - ufw

- name: "Validate individual UFW rule structure / Валидировать структуру отдельных правил UFW"
  ansible.builtin.assert:
    that:
      - item.rule is defined
      - item.port is defined
      - item.proto is defined
      - item.rule in ['allow', 'deny', 'reject', 'limit']
      - item.proto in ['tcp', 'udp']
      - item.port is string or item.port is number
    fail_msg: "Invalid UFW rule structure: {{ item }}. Each rule must have 'rule', 'port', and 'proto' fields / Неверная структура правила UFW: {{ item }}. Каждое правило должно иметь поля 'rule', 'port' и 'proto'"
    success_msg: "UFW rule {{ item }} structure is valid / Структура правила UFW {{ item }} корректна"
  loop: "{{ ufw_rules }}"
  when: ufw_rules | length > 0
  tags:
    - validation
    - ufw

- name: "Validate SSH rate limiting parameters / Валидировать параметры ограничения скорости SSH"
  ansible.builtin.assert:
    that:
      - ssh_rate_limit_attempts is number
      - ssh_rate_limit_attempts > 0
      - ssh_rate_limit_attempts <= 10
      - ssh_rate_limit_time is number
      - ssh_rate_limit_time > 0
      - ssh_rate_limit_time <= 300
    fail_msg: "SSH rate limiting parameters must be positive numbers (attempts: 1-10, time: 1-300 seconds) / Параметры ограничения скорости SSH должны быть положительными числами (попытки: 1-10, время: 1-300 секунд)"
    success_msg: "SSH rate limiting parameters validation passed / Валидация параметров ограничения скорости SSH прошла успешно"
  when: ssh_rate_limit | bool
  tags:
    - validation
    - ssh

- name: "Validate boolean parameters / Валидировать булевы параметры"
  ansible.builtin.assert:
    that:
      - debug_mode is boolean
      - ssh_rate_limit is boolean
      - validate_configuration is boolean
      - fail_on_validation_error is boolean
      - ufw_ipv6 is boolean
      - ufw_backup_enabled is boolean
    fail_msg: "Boolean parameters must be true or false / Булевы параметры должны быть true или false"
    success_msg: "Boolean parameters validation passed / Валидация булевых параметров прошла успешно"
  tags:
    - validation

- name: "Validate backup configuration / Валидировать конфигурацию резервного копирования"
  ansible.builtin.assert:
    that:
      - ufw_backup_dir is string
      - ufw_backup_dir | length > 0
      - ufw_backup_suffix is string
      - ufw_backup_count is number
      - ufw_backup_count > 0
      - ufw_backup_count <= 10
    fail_msg: "Backup configuration parameters are invalid / Параметры конфигурации резервного копирования неверны"
    success_msg: "Backup configuration validation passed / Валидация конфигурации резервного копирования прошла успешно"
  when: ufw_backup_enabled | bool
  tags:
    - validation
    - backup
