---
# UFW Configuration Handlers / Обработчики конфигурации UFW
# Handlers for UFW service management
# Обработчики для управления службой UFW

- name: "Reload UFW service"
  ansible.builtin.service:
    name: ufw
    state: reloaded
  listen: "reload ufw"
  tags:
    - handlers
    - ufw

- name: "Restart UFW service"
  ansible.builtin.service:
    name: ufw
    state: restarted
  listen: "restart ufw"
  tags:
    - handlers
    - ufw

- name: "Enable UFW"
  community.general.ufw:
    state: enabled
  listen: "enable ufw"
  tags:
    - handlers
    - ufw
