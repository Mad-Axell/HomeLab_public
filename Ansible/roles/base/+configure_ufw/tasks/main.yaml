---
# =============================================================================
# UFW Configuration Role - Main Tasks / Роль конфигурации UFW - Основные задачи
# =============================================================================
# This role configures firewall with security best practices for cross-platform
# Linux systems. Supports UFW (Debian/Ubuntu) and firewalld (RedHat/SUSE).
#
# Эта роль настраивает файрвол с применением лучших практик безопасности
# для кроссплатформенных Linux систем. Поддерживает UFW (Debian/Ubuntu) 
# и firewalld (RedHat/SUSE).
# =============================================================================

# Gather comprehensive system information for platform-specific configuration
# Сбор полной системной информации для платформо-специфичной конфигурации
- name: "Gather comprehensive system facts for firewall configuration / Сбор полной системной информации для конфигурации файрвола"
  ansible.builtin.setup:
    gather_subset:
      - distribution
      - os_family
      - architecture
      - kernel
      - system
      - hardware
      - network
  register: system_facts
  when: debug_mode
  failed_when: false
  changed_when: false
  tags:
    - debug
    - system
    - facts
    - gather

# Validate input parameters before configuration
# Валидация входных параметров перед конфигурацией
- name: "Include parameter validation tasks / Включить задачи валидации параметров"
  include_tasks: validate.yaml
  when: validate_configuration | bool
  register: validation_result
  tags:
    - validation
    - ufw

# Display comprehensive system information for debugging
# Отображение полной системной информации для отладки
- name: "Display comprehensive system information for firewall configuration / Отображение полной системной информации для конфигурации файрвола"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "System Information for Firewall Configuration:"
      - "============================================================================="
      - "Distribution:          {{ ansible_distribution }}"
      - "Version:               {{ ansible_distribution_version }}"
      - "Architecture:          {{ ansible_architecture }}"
      - "Kernel:                {{ ansible_kernel }}"
      - "Hostname:              {{ ansible_hostname }}"
      - "FQDN:                  {{ ansible_fqdn }}"
      - "OS Family:             {{ ansible_os_family }}"
      - "Firewall Type:         {{ 'UFW' if ansible_os_family == 'Debian' else ('firewalld' if ansible_os_family == 'RedHat' else 'UFW') }}"
      - "SSH Port:              {{ ssh_port }}"
      - "SSH Protocol:          {{ ssh_protocol }}"
      - "Default Incoming:      {{ ufw_default_incoming }}"
      - "Default Outgoing:      {{ ufw_default_outgoing }}"
      - "Logging Level:         {{ ufw_logging }}"
      - "IPv6 Support:          {{ 'enabled' if ufw_ipv6 | bool else 'disabled' }}"
      - "Rate Limiting:         {{ 'enabled' if ssh_rate_limit | bool else 'disabled' }}"
      - "Auto Reset:            {{ 'enabled' if ufw_auto_reset | bool else 'disabled' }}"
      - "Backup Enabled:        {{ ufw_backup_enabled }}"
      - "Validation Enabled:    {{ validate_configuration }}"
      - "Debug Mode:            {{ debug_mode }}"
      - "============================================================================="
  when: debug_mode
  register: system_info_display
  tags:
    - debug
    - ufw
    - system
    - information

- name: "Check if UFW package is installed / Проверить установлен ли пакет UFW"
  ansible.builtin.package_facts:
    manager: "{{ 'apt' if ansible_os_family == 'Debian' else ('yum' if ansible_os_family == 'RedHat' else 'zypper') }}"
  register: package_facts
  failed_when: false
  when: ansible_os_family in supported_os_families
  tags:
    - installation
    - ufw

# Create backup copies of existing firewall configuration files
# Создание резервных копий существующих файлов конфигурации файрвола
- name: "Create backup copies of existing firewall configuration files / Создание резервных копий существующих файлов конфигурации файрвола"
  block:
    - name: "Create UFW backup directory / Создать директорию для резервных копий UFW"
      ansible.builtin.file:
        path: "{{ ufw_backup_dir }}"
        state: directory
        mode: '0700'
        owner: root
        group: root
      register: backup_dir_result
      tags:
        - backup
        - ufw
        - directory
    
    - name: "Backup UFW configuration files / Резервное копирование файлов конфигурации UFW"
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ ufw_backup_dir }}/{{ item | basename }}{{ ufw_backup_suffix }}"
        remote_src: true
        backup: no
        mode: '0644'
      loop:
        - /etc/ufw/ufw.conf
        - /etc/ufw/user.rules
        - /etc/ufw/user6.rules
        - /etc/default/ufw
      register: backup_result
      tags:
        - backup
        - ufw
        - files
        - safety
  rescue:
    - name: "Backup operation failed - continuing without backup / Операция резервного копирования не удалась - продолжаем без резервного копирования"
      ansible.builtin.debug:
        msg: "Warning: Could not create backup copies. Continuing with configuration. / Предупреждение: Не удалось создать резервные копии. Продолжаем с конфигурацией."
      register: backup_result
      failed_when: false
  when: ufw_backup_enabled | bool
  become: true
  tags:
    - backup
    - ufw
    - files
    - safety

# Display detailed backup operation results
# Отображение детальных результатов операции резервного копирования
- name: "Display detailed backup operation results / Отображение детальных результатов операции резервного копирования"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "Backup Operation Results:"
      - "============================================================================="
      - "Backup Directory:       {{ ufw_backup_dir }}"
      - "Directory Created:      {{ 'YES' if backup_dir_result is defined and backup_dir_result.changed else 'NO' }}"
      - "Source File:            {{ item.src }}"
      - "Backup File:            {{ item.dest }}"
      - "Operation Status:       {{ 'SUCCESS' if item.changed else 'SKIPPED' }}"
      - "File Exists:            {{ 'YES' if item.src is file else 'NO' }}"
      - "Backup Created:         {{ 'YES' if item.changed else 'NO' }}"
      - "============================================================================="
  loop: "{{ backup_result.results | default([]) }}"
  no_log: true
  when: 
    - debug_mode
    - ufw_backup_enabled | bool
    - backup_result is defined
  tags:
    - debug
    - backup
    - results

# Install firewall packages based on OS family
# Установка пакетов файрвола в зависимости от семейства ОС
- name: "Install firewall packages based on OS family / Установка пакетов файрвола в зависимости от семейства ОС"
  block:
    - name: "Install UFW on Debian/Ubuntu / Установить UFW на Debian/Ubuntu"
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"
      register: ufw_install_result
      tags:
        - installation
        - ufw
        - debian
    
    - name: "Install UFW on RedHat/CentOS / Установить UFW на RedHat/CentOS"
      ansible.builtin.yum:
        name: ufw
        state: present
      when: ansible_os_family == "RedHat"
      register: ufw_install_result
      tags:
        - installation
        - ufw
        - redhat
    
    - name: "Install UFW on SUSE / Установить UFW на SUSE"
      ansible.builtin.zypper:
        name: ufw
        state: present
      when: ansible_os_family == "Suse"
      register: ufw_install_result
      tags:
        - installation
        - ufw
        - suse
  rescue:
    - name: "Firewall package installation failed / Установка пакета файрвола не удалась"
      ansible.builtin.debug:
        msg: "Error: Could not install firewall package. Check package availability and permissions. / Ошибка: Не удалось установить пакет файрвола. Проверьте доступность пакета и права доступа."
      register: ufw_install_result
      failed_when: false
  when: 
    - ansible_os_family in supported_os_families
    - "package_facts.packages is not defined or 'ufw' not in package_facts.packages"
  tags:
    - installation
    - ufw

- name: "Log UFW package installation / Логировать установку пакета UFW"
  ansible.builtin.debug:
    msg: "UFW package installed successfully / Пакет UFW успешно установлен"
  when: ufw_install_result is changed and debug_mode | bool
  tags:
    - debug
    - ufw

- name: "Ensure UFW service is enabled and started / Обеспечить запуск и автозапуск службы UFW"
  ansible.builtin.service:
    name: ufw
    state: started
    enabled: true
  when: 
    - ansible_os_family == "Debian"
    - (ufw_install_result is changed or ufw_install_result is not defined)
  tags:
    - service
    - ufw

# Reset UFW to ensure idempotency (automatic reset for clean state)
# Сброс UFW для обеспечения идемпотентности (автоматический сброс для чистого состояния)
- name: "Reset UFW to ensure idempotency / Сбросить UFW для обеспечения идемпотентности"
  community.general.ufw:
    state: reset
  when: 
    - ansible_os_family == "Debian"
    - ufw_auto_reset | bool
    - ufw_state != "disabled"  # Don't reset if explicitly disabled
  become: true
  register: ufw_auto_reset_result
  tags:
    - configuration
    - ufw
    - reset
    - idempotency

- name: "Log UFW automatic reset / Логировать автоматический сброс UFW"
  ansible.builtin.debug:
    msg: "UFW has been automatically reset for idempotency / UFW автоматически сброшен для обеспечения идемпотентности"
  when: ufw_auto_reset_result is changed and debug_mode | bool
  tags:
    - debug
    - ufw
    - reset

# Configure firewalld for RedHat family systems
# Настройка firewalld для систем семейства RedHat
- name: "Configure firewalld for RedHat family / Настроить firewalld для семейства RedHat"
  block:
    - name: "Install firewalld on RedHat/CentOS / Установить firewalld на RedHat/CentOS"
      ansible.builtin.yum:
        name: firewalld
        state: present
      when: ansible_os_family == "RedHat"
      register: firewalld_install_result
      tags:
        - firewalld
        - redhat
        - installation
    
    - name: "Start and enable firewalld service / Запустить и включить службу firewalld"
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true
      when: ansible_os_family == "RedHat"
      register: firewalld_service_result
      tags:
        - firewalld
        - redhat
        - service
    
    - name: "Configure firewalld default zone / Настроить зону по умолчанию firewalld"
      ansible.posix.firewalld:
        zone: "{{ firewalld_default_zone }}"
        state: enabled
        permanent: true
        immediate: true
      when: ansible_os_family == "RedHat"
      register: firewalld_zone_result
      tags:
        - firewalld
        - redhat
        - configuration
    
    - name: "Allow SSH service in firewalld / Разрешить SSH сервис в firewalld"
      ansible.posix.firewalld:
        service: "{{ firewalld_ssh_service }}"
        permanent: true
        state: enabled
        immediate: true
      when: ansible_os_family == "RedHat"
      register: firewalld_ssh_service_result
      tags:
        - firewalld
        - redhat
        - ssh
    
    - name: "Allow SSH from allowed subnets in firewalld / Разрешить SSH с разрешенных подсетей в firewalld"
      ansible.posix.firewalld:
        port: "{{ ssh_port }}/{{ ssh_protocol }}"
        source: "{{ item }}"
        permanent: true
        state: enabled
        immediate: true
      loop: "{{ final_allowed_subnets }}"
      when: 
        - ansible_os_family == "RedHat"
        - final_allowed_subnets | length > 0
      register: firewalld_ssh_allow_result
      tags:
        - firewalld
        - redhat
        - ssh
        - subnets
    
    - name: "Deny SSH from denied subnets in firewalld / Запретить SSH с запрещенных подсетей в firewalld"
      ansible.posix.firewalld:
        port: "{{ ssh_port }}/{{ ssh_protocol }}"
        source: "{{ item }}"
        permanent: true
        state: disabled
        immediate: true
      loop: "{{ final_denied_subnets }}"
      when: 
        - ansible_os_family == "RedHat"
        - final_denied_subnets | length > 0
      register: firewalld_ssh_deny_result
      tags:
        - firewalld
        - redhat
        - ssh
        - subnets
        - deny
    
    - name: "Add custom rules to firewalld / Добавить пользовательские правила в firewalld"
      ansible.posix.firewalld:
        port: "{{ item.port }}/{{ item.proto }}"
        permanent: true
        state: enabled
        immediate: true
      loop: "{{ ufw_rules }}"
      when: ansible_os_family == "RedHat"
      register: firewalld_custom_rules_result
      tags:
        - firewalld
        - redhat
        - custom_rules
  rescue:
    - name: "Firewalld configuration failed / Конфигурация firewalld не удалась"
      ansible.builtin.debug:
        msg: "Error: Could not configure firewalld. Check service status and permissions. / Ошибка: Не удалось настроить firewalld. Проверьте состояние службы и права доступа."
      failed_when: false
  when: ansible_os_family == "RedHat"
  tags:
    - firewalld
    - redhat

# Display detailed firewalld configuration results
# Отображение детальных результатов конфигурации firewalld
- name: "Display detailed firewalld configuration results / Отображение детальных результатов конфигурации firewalld"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "Firewalld Configuration Results:"
      - "============================================================================="
      - "Package Installation:   {{ 'SUCCESS' if firewalld_install_result is defined and firewalld_install_result.changed else 'SKIPPED' }}"
      - "Service Status:         {{ 'SUCCESS' if firewalld_service_result is defined and firewalld_service_result.changed else 'SKIPPED' }}"
      - "Default Zone:           {{ firewalld_default_zone }} {{ 'SUCCESS' if firewalld_zone_result is defined and firewalld_zone_result.changed else 'SKIPPED' }}"
      - "SSH Service:            {{ firewalld_ssh_service }} {{ 'SUCCESS' if firewalld_ssh_service_result is defined and firewalld_ssh_service_result.changed else 'SKIPPED' }}"
      - "SSH Allowed Subnets:    {{ final_allowed_subnets | length }} configured {{ 'SUCCESS' if firewalld_ssh_allow_result is defined else 'SKIPPED' }}"
      - "SSH Denied Subnets:     {{ final_denied_subnets | length }} configured {{ 'SUCCESS' if firewalld_ssh_deny_result is defined else 'SKIPPED' }}"
      - "Custom Rules:           {{ ufw_rules | length }} configured {{ 'SUCCESS' if firewalld_custom_rules_result is defined else 'SKIPPED' }}"
      - "============================================================================="
  when: 
    - debug_mode
    - ansible_os_family == "RedHat"
  tags:
    - debug
    - firewalld
    - results

- name: "Backup current UFW configuration before reset / Создать резервную копию конфигурации UFW перед сбросом"
  ansible.builtin.copy:
    src: "/etc/ufw/ufw.conf"
    dest: "{{ ufw_backup_dir }}/ufw.conf{{ ufw_backup_suffix }}"
    remote_src: true
    backup: true
  when: 
    - ansible_os_family == "Debian"
    - ufw_state == "reset" 
    - ufw_backup_enabled | bool
  become: true
  failed_when: false
  tags:
    - backup
    - ufw

- name: "Reset UFW to default state (if explicitly requested) / Сбросить UFW к состоянию по умолчанию (если явно запрошено)"
  community.general.ufw:
    state: reset
  when: 
    - ansible_os_family == "Debian"
    - ufw_state == "reset"
    - not ufw_auto_reset | bool  # Don't run if auto-reset is enabled
  become: true
  register: ufw_reset_result
  tags:
    - configuration
    - ufw

- name: "Log UFW reset / Логировать сброс UFW"
  ansible.builtin.debug:
    msg: "UFW configuration has been reset to defaults / Конфигурация UFW сброшена к значениям по умолчанию"
  when: ufw_reset_result is changed and debug_mode | bool
  tags:
    - debug
    - ufw

- name: "Configure UFW logging level / Настроить уровень логирования UFW"
  community.general.ufw:
    logging: "{{ ufw_logging }}"
  when: ansible_os_family == "Debian"
  become: true
  register: ufw_logging_result
  tags:
    - configuration
    - ufw

- name: "Log UFW logging configuration / Логировать настройку логирования UFW"
  ansible.builtin.debug:
    msg: "UFW logging level set to {{ ufw_logging }} / Уровень логирования UFW установлен в {{ ufw_logging }}"
  when: ufw_logging_result is changed and debug_mode | bool
  tags:
    - debug
    - ufw

- name: "Set UFW default incoming policy / Установить политику по умолчанию для входящих соединений UFW"
  community.general.ufw:
    direction: incoming
    policy: "{{ ufw_default_incoming }}"
  when: ansible_os_family == "Debian"
  become: true
  register: ufw_incoming_result
  tags:
    - configuration
    - ufw

- name: "Set UFW default outgoing policy / Установить политику по умолчанию для исходящих соединений UFW"
  community.general.ufw:
    direction: outgoing
    policy: "{{ ufw_default_outgoing }}"
  when: ansible_os_family == "Debian"
  become: true
  register: ufw_outgoing_result
  tags:
    - configuration
    - ufw

- name: "Log UFW default policies / Логировать политики по умолчанию UFW"
  ansible.builtin.debug:
    msg: "UFW default policies set: incoming={{ ufw_default_incoming }}, outgoing={{ ufw_default_outgoing }} / Политики UFW по умолчанию установлены: входящие={{ ufw_default_incoming }}, исходящие={{ ufw_default_outgoing }}"
  when: (ufw_incoming_result is changed or ufw_outgoing_result is changed) and debug_mode | bool
  tags:
    - debug
    - ufw

- name: "Extract allowed subnets from users_to_add / Извлечь разрешенные подсети из users_to_add"
  ansible.builtin.set_fact:
    extracted_allowed_subnets: "{{ extracted_allowed_subnets | default([]) + item.allowed_subnets }}"
  loop: "{{ users_to_add }}"
  when: 
    - users_to_add is defined
    - users_to_add | length > 0
    - allowed_subnets is not defined or allowed_subnets | length == 0
  tags:
    - extraction
    - subnets

- name: "Deduplicate extracted allowed subnets / Дедуплицировать извлеченные разрешенные подсети"
  ansible.builtin.set_fact:
    extracted_allowed_subnets: "{{ extracted_allowed_subnets | unique }}"
  when: 
    - users_to_add is defined
    - users_to_add | length > 0
    - allowed_subnets is not defined or allowed_subnets | length == 0
  tags:
    - extraction
    - subnets
    - deduplication

- name: "Extract denied subnets from users_to_add / Извлечь запрещенные подсети из users_to_add"
  ansible.builtin.set_fact:
    extracted_denied_subnets: "{{ extracted_denied_subnets | default([]) + item.denied_subnets }}"
  loop: "{{ users_to_add }}"
  when: 
    - users_to_add is defined
    - users_to_add | length > 0
    - denied_subnets is not defined or denied_subnets | length == 0
  tags:
    - extraction
    - subnets

- name: "Deduplicate extracted denied subnets / Дедуплицировать извлеченные запрещенные подсети"
  ansible.builtin.set_fact:
    extracted_denied_subnets: "{{ extracted_denied_subnets | unique }}"
  when: 
    - users_to_add is defined
    - users_to_add | length > 0
    - denied_subnets is not defined or denied_subnets | length == 0
  tags:
    - extraction
    - subnets
    - deduplication

- name: "Set final allowed subnets list / Установить финальный список разрешенных подсетей"
  ansible.builtin.set_fact:
    final_allowed_subnets: "{{ (allowed_subnets if (allowed_subnets is defined and allowed_subnets | length > 0) else extracted_allowed_subnets | default([])) | unique }}"
  tags:
    - extraction
    - subnets
    - deduplication

- name: "Set final denied subnets list / Установить финальный список запрещенных подсетей"
  ansible.builtin.set_fact:
    final_denied_subnets: "{{ (denied_subnets if (denied_subnets is defined and denied_subnets | length > 0) else extracted_denied_subnets | default([])) | unique }}"
  tags:
    - extraction
    - subnets
    - deduplication

- name: "Debug final allowed subnets list / Отладка финального списка разрешенных подсетей"
  ansible.builtin.debug:
    msg: |
      Final allowed subnets list (deduplicated) / Финальный список разрешенных подсетей (дедуплицированный):
      - Count / Количество: {{ final_allowed_subnets | length }}
      - Subnets / Подсети: {{ final_allowed_subnets | join(', ') }}
  when: debug_mode | bool
  tags:
    - debug
    - subnets
    - deduplication

- name: "Debug final denied subnets list / Отладка финального списка запрещенных подсетей"
  ansible.builtin.debug:
    msg: |
      Final denied subnets list (deduplicated) / Финальный список запрещенных подсетей (дедуплицированный):
      - Count / Количество: {{ final_denied_subnets | length }}
      - Subnets / Подсети: {{ final_denied_subnets | join(', ') }}
  when: debug_mode | bool
  tags:
    - debug
    - subnets
    - deduplication

- name: "Log final subnet configuration / Логировать финальную конфигурацию подсетей"
  ansible.builtin.debug:
    msg: |
      Final subnet configuration / Финальная конфигурация подсетей:
      - Allowed subnets / Разрешенные подсети: {{ final_allowed_subnets | join(', ') }}
      - Denied subnets / Запрещенные подсети: {{ final_denied_subnets | join(', ') }}
      - Configuration mode / Режим конфигурации: {{ 'Direct subnets' if (allowed_subnets is defined and allowed_subnets | length > 0) else 'Users-based' }}
  when: debug_mode | bool
  tags:
    - debug
    - subnets

- name: "Allow SSH access from allowed subnets / Разрешить SSH доступ с разрешенных подсетей"
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: "{{ ssh_protocol }}"
    from_ip: "{{ item }}"
    comment: "SSH access from {{ item }}"
  loop: "{{ final_allowed_subnets }}"
  when: 
    - ansible_os_family == "Debian"
    - final_allowed_subnets | length > 0
  become: true
  register: ssh_rules_result
  tags:
    - ssh
    - ufw
    - subnets

- name: "Log SSH allow rules configuration / Логировать конфигурацию правил разрешения SSH"
  ansible.builtin.debug:
    msg: "SSH access allowed from subnets: {{ final_allowed_subnets | join(', ') }} / SSH доступ разрешен с подсетей: {{ final_allowed_subnets | join(', ') }}"
  when: debug_mode | bool and final_allowed_subnets | length > 0
  tags:
    - debug
    - ssh
    - ufw
    - subnets

- name: "Deny SSH access from denied subnets / Запретить SSH доступ с запрещенных подсетей"
  community.general.ufw:
    rule: deny
    port: "{{ ssh_port }}"
    proto: "{{ ssh_protocol }}"
    from_ip: "{{ item }}"
    comment: "SSH access denied from {{ item }}"
  loop: "{{ final_denied_subnets }}"
  when: 
    - ansible_os_family == "Debian"
    - final_denied_subnets | length > 0
  become: true
  register: ssh_deny_rules_result
  tags:
    - ssh
    - ufw
    - subnets
    - deny

- name: "Log SSH deny rules configuration / Логировать конфигурацию правил запрета SSH"
  ansible.builtin.debug:
    msg: "SSH access denied from subnets: {{ final_denied_subnets | join(', ') }} / SSH доступ запрещен с подсетей: {{ final_denied_subnets | join(', ') }}"
  when: debug_mode | bool and final_denied_subnets | length > 0
  tags:
    - debug
    - ssh
    - ufw
    - subnets
    - deny

- name: "Add custom UFW rules / Добавить пользовательские правила UFW"
  community.general.ufw:
    rule: "{{ item.rule }}"
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    from_ip: "{{ item.from_ip | default(omit) }}"
    comment: "{{ item.comment | default(omit) }}"
  loop: "{{ ufw_rules }}"
  when: ansible_os_family == "Debian"
  become: true
  register: custom_rules_result
  tags:
    - custom_rules
    - ufw

- name: "Log custom UFW rules / Логировать пользовательские правила UFW"
  ansible.builtin.debug:
    msg: "Custom UFW rule added: {{ item.rule }} {{ item.port }}/{{ item.proto }}{% if item.comment is defined %} ({{ item.comment }}){% endif %} / Добавлено пользовательское правило UFW: {{ item.rule }} {{ item.port }}/{{ item.proto }}{% if item.comment is defined %} ({{ item.comment }}){% endif %}"
  loop: "{{ ufw_rules }}"
  when: debug_mode | bool
  tags:
    - debug
    - custom_rules
    - ufw

- name: "Configure SSH rate limiting (if enabled). This rule ignores SSH access restrictions. / Настроить ограничение скорости SSH (если включено). Данное правило ингнорирует запрет доступа по SSH"
  community.general.ufw:
    rule: limit
    port: "{{ ssh_port }}"
    proto: "{{ ssh_protocol }}"
    comment: "SSH rate limiting ({{ ssh_rate_limit_attempts }} attempts per {{ ssh_rate_limit_time }}s) / Ограничение скорости SSH ({{ ssh_rate_limit_attempts }} попыток за {{ ssh_rate_limit_time }}с)"
  when: 
    - ansible_os_family == "Debian"
    - ssh_rate_limit | bool
  become: true
  register: ssh_rate_limit_result
  tags:
    - ssh
    - rate_limiting
    - ufw

- name: "Log SSH rate limiting configuration / Логировать настройку ограничения скорости SSH"
  ansible.builtin.debug:
    msg: "SSH rate limiting enabled: {{ ssh_rate_limit_attempts }} attempts per {{ ssh_rate_limit_time }} seconds / Ограничение скорости SSH включено: {{ ssh_rate_limit_attempts }} попыток за {{ ssh_rate_limit_time }} секунд"
  when: ssh_rate_limit_result is changed and debug_mode | bool
  tags:
    - debug
    - ssh
    - rate_limiting
    - ufw

- name: "Disable IPv6 in UFW (if requested) / Отключить IPv6 в UFW (если запрошено)"
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: '^IPV6='
    line: 'IPV6=no'
    backup: true
  when: 
    - ansible_os_family == "Debian"
    - not ufw_ipv6 | bool
  become: true
  register: ufw_ipv6_disable_result
  tags:
    - ipv6
    - ufw

- name: "Log IPv6 configuration / Логировать конфигурацию IPv6"
  ansible.builtin.debug:
    msg: "IPv6 support {{ 'enabled' if ufw_ipv6 | bool else 'disabled' }} in UFW / Поддержка IPv6 {{ 'включена' if ufw_ipv6 | bool else 'отключена' }} в UFW"
  when: ufw_ipv6_disable_result is changed and debug_mode | bool
  tags:
    - debug
    - ipv6
    - ufw

- name: "Enable UFW (final step) / Включить UFW (финальный шаг)"
  community.general.ufw:
    state: enabled
  when: ansible_os_family == "Debian"
  become: true
  register: ufw_enable_result
  tags:
    - enable
    - ufw

- name: "Log UFW enablement / Логировать включение UFW"
  ansible.builtin.debug:
    msg: "UFW has been enabled successfully / UFW успешно включен"
  when: ufw_enable_result is changed and debug_mode | bool
  tags:
    - debug
    - enable
    - ufw

- name: "Display UFW status / Отобразить статус UFW"
  ansible.builtin.command: ufw status verbose
  register: ufw_status
  changed_when: false
  when: 
    - ansible_os_family == "Debian"
    - debug_mode | bool
  tags:
    - debug
    - status
    - ufw

- name: "Show UFW status output / Показать вывод статуса UFW"
  ansible.builtin.debug:
    var: ufw_status.stdout_lines
  when: 
    - ansible_os_family == "Debian"
    - debug_mode | bool 
    - ufw_status.stdout_lines is defined
  tags:
    - debug
    - status
    - ufw

- name: "Ensure UFW service is enabled and started (final check) / Обеспечить запуск и автозапуск службы UFW (финальная проверка)"
  ansible.builtin.service:
    name: ufw
    state: started
    enabled: true
  when: ansible_os_family == "Debian"
  become: true
  tags:
    - service
    - ufw

- name: "Check UFW service status via systemctl / Проверить статус службы UFW через systemctl"
  ansible.builtin.command: systemctl is-active ufw
  register: ufw_service_active
  changed_when: false
  when: ansible_os_family == "Debian"
  tags:
    - service
    - ufw

- name: "Check UFW service enabled status via systemctl / Проверить статус автозапуска службы UFW через systemctl"
  ansible.builtin.command: systemctl is-enabled ufw
  register: ufw_service_enabled
  changed_when: false
  when: ansible_os_family == "Debian"
  tags:
    - service
    - ufw

- name: "Get UFW service detailed status / Получить детальный статус службы UFW"
  ansible.builtin.command: systemctl show ufw --property=ActiveState,SubState,LoadState
  register: ufw_service_details
  changed_when: false
  when: ansible_os_family == "Debian"
  tags:
    - service
    - ufw

- name: "Debug UFW service status / Отладка статуса службы UFW"
  ansible.builtin.debug:
    msg: |
      UFW service status / Статус службы UFW:
      - Active / Активна: {{ ufw_service_active.stdout }}
      - Enabled / Автозапуск: {{ ufw_service_enabled.stdout }}
      - Details / Детали: {{ ufw_service_details.stdout }}
  when: 
    - ansible_os_family == "Debian"
    - debug_mode | bool
  tags:
    - debug
    - service
    - ufw

- name: "Show UFW service logs if not active / Показать логи службы UFW если не активна"
  ansible.builtin.command: journalctl -u ufw.service --no-pager -n 20
  register: ufw_service_logs
  changed_when: false
  when: 
    - ansible_os_family == "Debian"
    - debug_mode | bool
    - ufw_service_active.stdout != "active"
  tags:
    - debug
    - service
    - ufw

- name: "Display UFW service logs / Отобразить логи службы UFW"
  ansible.builtin.debug:
    msg: "UFW service logs (last 20 lines) / Логи службы UFW (последние 20 строк):\n{{ ufw_service_logs.stdout_lines | join('\n') }}"
  when: 
    - ansible_os_family == "Debian"
    - debug_mode | bool
    - ufw_service_active.stdout != "active"
    - ufw_service_logs.stdout_lines is defined
  tags:
    - debug
    - service
    - ufw

- name: "Ensure UFW service is running / Обеспечить работу службы UFW"
  ansible.builtin.assert:
    that:
      - ufw_service_active.stdout == "active"
      - ufw_service_enabled.stdout in ["enabled", "static"]
    fail_msg: "UFW service is not properly configured. Active: {{ ufw_service_active.stdout }}, Enabled: {{ ufw_service_enabled.stdout }} / Служба UFW неправильно настроена. Активна: {{ ufw_service_active.stdout }}, Автозапуск: {{ ufw_service_enabled.stdout }}"
    success_msg: "UFW service is properly configured and running / Служба UFW правильно настроена и работает"
  when: ansible_os_family == "Debian"
  tags:
    - service
    - ufw

# Display comprehensive final configuration summary
# Отображение комплексного итогового сводного отчета конфигурации
- name: "Display comprehensive final configuration summary / Отображение комплексного итогового сводного отчета конфигурации"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "FIREWALL CONFIGURATION COMPLETED SUCCESSFULLY!"
      - "============================================================================="
      - "Operating System:          {{ ansible_distribution }} {{ ansible_distribution_version }}"
      - "OS Family:                 {{ ansible_os_family }}"
      - "Firewall Type:             {{ 'UFW' if ansible_os_family == 'Debian' else ('firewalld' if ansible_os_family == 'RedHat' else 'UFW') }}"
      - "SSH Port:                  {{ ssh_port }}"
      - "SSH Protocol:              {{ ssh_protocol }}"
      - "Default Incoming:          {{ ufw_default_incoming }}"
      - "Default Outgoing:          {{ ufw_default_outgoing }}"
      - "Logging Level:             {{ ufw_logging }}"
      - "IPv6 Support:              {{ 'enabled' if ufw_ipv6 | bool else 'disabled' }}"
      - "Rate Limiting:             {{ 'enabled' if ssh_rate_limit | bool else 'disabled' }}"
      - "Auto Reset:                {{ 'enabled' if ufw_auto_reset | bool else 'disabled' }}"
      - "Configuration Mode:        {{ 'Direct subnets' if (allowed_subnets is defined and allowed_subnets | length > 0) else 'Users-based' }}"
      - "Allowed Subnets:           {{ final_allowed_subnets | length }} configured"
      - "Denied Subnets:            {{ final_denied_subnets | length }} configured"
      - "Custom Rules:              {{ ufw_rules | length }} configured"
      - "Users Configured:          {{ users_to_add | length if (users_to_add is defined and users_to_add | length > 0) else '0' }}"
      - "Backup Enabled:            {{ ufw_backup_enabled }}"
      - "Validation Enabled:        {{ validate_configuration }}"
      - "Debug Mode:                {{ debug_mode }}"
      - "============================================================================="
      - "Operation Results Summary:"
      - "- Package Installation:    {{ 'SUCCESS' if ufw_install_result is defined and ufw_install_result.changed else 'SKIPPED' }}"
      - "- Service Configuration:   {{ 'SUCCESS' if (ansible_os_family == 'Debian' and ufw_enable_result is defined) or (ansible_os_family == 'RedHat' and firewalld_service_result is defined) else 'SKIPPED' }}"
      - "- Firewall Rules:          {{ 'SUCCESS' if (ansible_os_family == 'Debian' and custom_rules_result is defined) or (ansible_os_family == 'RedHat' and firewalld_custom_rules_result is defined) else 'SKIPPED' }}"
      - "- SSH Configuration:       {{ 'SUCCESS' if (ansible_os_family == 'Debian' and ssh_rules_result is defined) or (ansible_os_family == 'RedHat' and firewalld_ssh_allow_result is defined) else 'SKIPPED' }}"
      - "- Backup Operations:       {{ 'SUCCESS' if backup_result is defined else 'SKIPPED' }}"
      - "============================================================================="
      - "Configuration files modified:"
      - "- /etc/ufw/ufw.conf"
      - "- /etc/ufw/user.rules"
      - "- /etc/ufw/user6.rules"
      - "- /etc/default/ufw"
      - "============================================================================="
  when: debug_mode | bool
  tags:
    - summary
    - ufw
    - completion
    - final

# Display firewalld configuration files for RedHat systems
# Отображение файлов конфигурации firewalld для систем RedHat
- name: "Display firewalld configuration files / Отображение файлов конфигурации firewalld"
  ansible.builtin.debug:
    msg:
      - "============================================================================="
      - "Firewalld Configuration Files Modified:"
      - "============================================================================="
      - "- /etc/firewalld/firewalld.conf"
      - "- /etc/firewalld/zones/public.xml"
      - "- /etc/firewalld/zones/{{ firewalld_default_zone }}.xml"
      - "============================================================================="
  when: 
    - debug_mode | bool
    - ansible_os_family == "RedHat"
  tags:
    - summary
    - firewalld
    - completion
    - final