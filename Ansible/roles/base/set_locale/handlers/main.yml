---
# Locale Configuration Role - Handlers
# Handlers for restarting services after locale configuration changes

- name: reload locale
  ansible.builtin.command: "locale-gen"
  become: true
  listen: "reload locale"

- name: reload timezone
  ansible.builtin.command: "timedatectl set-timezone {{ timezone }}"
  become: true
  listen: "reload timezone"

- name: reload console
  ansible.builtin.command: "setupcon"
  become: true
  listen: "reload console"

- name: restart timesyncd
  ansible.builtin.systemd:
    name: systemd-timesyncd
    state: restarted
  listen: "restart timesyncd"

- name: restart ssh
  ansible.builtin.service:
    name: "{{ item }}"
    state: restarted
  loop:
    - ssh
    - sshd
  listen: "restart ssh"

- name: flush locale cache
  ansible.builtin.command: "localectl set-locale {{ locale_primary }}"
  become: true
  listen: "flush locale cache"
