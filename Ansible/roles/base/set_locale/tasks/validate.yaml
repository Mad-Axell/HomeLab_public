---
# Locale Configuration Role - Validation Tasks
# This file contains validation tasks for locale and timezone settings

- name: Validate locale format
  ansible.builtin.assert:
    that:
      - locale_primary is match('^[a-z]{2}_[A-Z]{2}\.[A-Z0-9-]+$')
      - locale_language is match('^[a-z]{2}_[A-Z]{2}$')
      - locale_encoding is match('^[A-Z0-9-]+$')
    fail_msg: "Invalid locale format. Expected format: ll_CC.ENCODING (e.g., en_US.UTF-8)"
    success_msg: "Locale format validation passed"

- name: Validate timezone format
  ansible.builtin.assert:
    that:
      - timezone is match('^[A-Za-z_/]+$')
    fail_msg: "Invalid timezone format. Expected format: Continent/City (e.g., Europe/London)"
    success_msg: "Timezone format validation passed"

- name: Validate keyboard layout
  ansible.builtin.assert:
    that:
      - keyboard_layout is match('^[a-z]{2}$') or keyboard_layout == ""
    fail_msg: "Invalid keyboard layout. Expected 2-letter language code (e.g., us, gb, de)"
    success_msg: "Keyboard layout validation passed"

- name: Validate NTP servers
  ansible.builtin.assert:
    that:
      - ntp_servers is list
      - ntp_servers | length > 0
      - item is match('^[a-zA-Z0-9.-]+$')
    loop: "{{ ntp_servers }}"
    fail_msg: "Invalid NTP server format. Expected valid hostname or IP address"
    success_msg: "NTP servers validation passed"
  when: ntp_enabled

- name: Validate backup settings
  ansible.builtin.assert:
    that:
      - backup_suffix is string
      - backup_suffix | length > 0
    fail_msg: "Invalid backup suffix. Must be a non-empty string"
    success_msg: "Backup settings validation passed"

- name: Validate locale variables
  ansible.builtin.assert:
    that:
      - locale_variables is mapping
      - item.key is defined
      - item.value is defined
    loop: "{{ locale_variables | dict2items }}"
    fail_msg: "Invalid locale variables configuration"
    success_msg: "Locale variables validation passed"

- name: Check if locale is available on target system
  ansible.builtin.command: "locale -a | grep -q '{{ locale_primary }}'"
  register: locale_available_check
  changed_when: false
  failed_when: false

- name: Warn if primary locale is not available
  ansible.builtin.debug:
    msg: "Warning: Primary locale {{ locale_primary }} is not available on the target system. It will be generated."
  when: locale_available_check.rc != 0

- name: Check if timezone is valid
  ansible.builtin.command: "timedatectl list-timezones | grep -q '{{ timezone }}'"
  register: timezone_available_check
  changed_when: false
  failed_when: false
  when: timezone_manage

- name: Fail if timezone is not valid
  ansible.builtin.fail:
    msg: "Timezone {{ timezone }} is not valid. Use 'timedatectl list-timezones' to see available options."
  when: timezone_manage and timezone_available_check.rc != 0
