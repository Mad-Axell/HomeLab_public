
---
# Locale Configuration Role - Default Variables
# This role configures system locale settings for internationalization

# Debug and backup settings
debug_mode: false
backup_enabled: true
backup_suffix: ".backup"

# Primary locale configuration
locale_primary: "en_US.UTF-8"
locale_language: "en_US"
locale_encoding: "UTF-8"

# Additional locales to generate (useful for multi-language environments)
locale_additional:
  - "en_US.UTF-8"
  - "en_GB.UTF-8"
  - "ru_RU.UTF-8"
  - "de_DE.UTF-8"
  - "fr_FR.UTF-8"

# System locale variables
locale_variables:
  LANG: "{{ locale_primary }}"
  LANGUAGE: "{{ locale_language }}"
  LC_ALL: "{{ locale_primary }}"
  LC_COLLATE: "{{ locale_primary }}"
  LC_CTYPE: "{{ locale_primary }}"
  LC_MESSAGES: "{{ locale_primary }}"
  LC_MONETARY: "{{ locale_primary }}"
  LC_NUMERIC: "{{ locale_primary }}"
  LC_TIME: "{{ locale_primary }}"

# Timezone configuration
timezone: "Europe/Moscow" ##"UTC"
timezone_manage: true

# Keyboard layout configuration
keyboard_layout: "us"
keyboard_variant: ""
keyboard_options: ""

# Console font configuration
console_font: "Lat2-Terminus16"
console_font_manage: false

# NTP configuration
ntp_enabled: true
ntp_servers:
  - "0.pool.ntp.org"
  - "1.pool.ntp.org"
  - "2.pool.ntp.org"

# Validation settings
validate_locale: true
validate_timezone: true

# Cleanup settings
cleanup_enabled: false
locale_cleanup_enabled: false
timezone_cleanup_enabled: false
keyboard_cleanup_enabled: false
ntp_cleanup_enabled: false
console_cleanup_enabled: false
