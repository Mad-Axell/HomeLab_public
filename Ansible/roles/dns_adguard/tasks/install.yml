---
# EN: Download AdGuard Home and register its systemd unit
# RU: Скачивание AdGuard Home и регистрация systemd-юнита

- name: "Create AdGuard directories"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ adguard_install_dir }}"
    - "{{ adguard_log_dir }}"

- name: "Select distribution URL"
  ansible.builtin.set_fact:
    adguard_download_url: "{{ adguard_latest_url if adguard_version == 'latest' else adguard_github_url }}"

# EN: Unpacks into /opt → creates /opt/AdGuardHome/AdGuardHome. `creates` guards
#     against re-download. To upgrade, remove the binary and re-run the role.
# RU: Распаковка идёт в /opt → создаётся /opt/AdGuardHome/AdGuardHome. `creates`
#     защищает от повторного скачивания. Для апгрейда снеси бинарь и прогони роль.
- name: "Download and unpack AdGuard Home"
  ansible.builtin.unarchive:
    src: "{{ adguard_download_url }}"
    dest: /opt
    remote_src: true
    creates: "{{ adguard_binary }}"

- name: "Install AdGuard Home as a systemd service"
  ansible.builtin.command:
    cmd: "./AdGuardHome -s install"
    chdir: "{{ adguard_install_dir }}"
    creates: "{{ adguard_service_unit }}"
