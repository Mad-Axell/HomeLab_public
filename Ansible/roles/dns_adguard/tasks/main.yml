---
# EN: Role entry point / RU: Точка входа роли

# EN: Guard against unsupported OS families / RU: Защита от неподдерживаемых ОС
- name: "Assert supported OS family"
  ansible.builtin.assert:
    that:
      - ansible_facts.os_family in supported_os_families
    fail_msg: >-
      EN: Unsupported OS family '{{ ansible_facts.os_family }}'. Supported: {{ supported_os_families | join(', ') }}.
      RU: Неподдерживаемое семейство ОС '{{ ansible_facts.os_family }}'. Поддерживаются: {{ supported_os_families | join(', ') }}.
  tags: ['always']

- name: "Install"
  ansible.builtin.include_tasks: install.yml
  tags: ['install']

- name: "Configure"
  ansible.builtin.include_tasks: configure.yml
  tags: ['configure']

- name: "Manage service"
  ansible.builtin.include_tasks: service.yml
  tags: ['service']

- name: "Show debug summary"
  ansible.builtin.include_tasks: debug.yml
  when: debug_mode | bool
  tags: ['debug']
