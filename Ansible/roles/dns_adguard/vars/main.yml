---
# EN: Static role variables (do not override) / RU: Статичные переменные роли

# EN: Supported OS families (role is Debian-only) / RU: Поддерживаемые семейства ОС (роль только для Debian)
supported_os_families:
  - Debian

# EN: Service identity / RU: Идентификация сервиса
adguard_service_name: "AdGuardHome"

# EN: Derived fixed paths / RU: Производные фиксированные пути
adguard_binary: "{{ adguard_install_dir }}/AdGuardHome"
adguard_config_path: "{{ adguard_install_dir }}/AdGuardHome.yaml"
adguard_service_unit: "/etc/systemd/system/AdGuardHome.service"
