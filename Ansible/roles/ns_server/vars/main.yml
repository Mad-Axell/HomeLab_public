---
# =============================================================================
# NS Server Role - Internal Variables
# Роль NS Server - Внутренние переменные
# Do not override / Не переопределять
# =============================================================================

# -----------------------------------------------------------------------------
# Unbound paths / Пути Unbound
# -----------------------------------------------------------------------------
unbound_config_dir: "/etc/unbound/unbound.conf.d"
unbound_config_file: "{{ unbound_config_dir }}/ns-server.conf"
unbound_data_dir: "/var/lib/unbound"
unbound_root_hints: "{{ unbound_data_dir }}/root.hints"
unbound_trust_anchor: "{{ unbound_data_dir }}/root.key"

# -----------------------------------------------------------------------------
# Package names / Имена пакетов
# -----------------------------------------------------------------------------
unbound_packages_debian:
  - unbound
  - unbound-anchor
  - dns-root-data
  - dnsutils

unbound_packages_redhat:
  - unbound
  - bind-utils

# -----------------------------------------------------------------------------
# AdGuard Home - Internal Variables / Внутренние переменные
# -----------------------------------------------------------------------------
adguardhome_service_name: "adguardhome"
adguardhome_bin_name: "AdGuardHome"
adguardhome_bin_dir: "/opt/{{ adguardhome_service_name }}/bin"
adguardhome_bin_file: "{{ adguardhome_bin_dir }}/{{ adguardhome_bin_name }}"
adguardhome_config_dir: "/opt/{{ adguardhome_service_name }}/config"
adguardhome_config_name: "AdGuardHome.yaml"
adguardhome_config_file: "{{ adguardhome_config_dir }}/{{ adguardhome_config_name }}"
adguardhome_data_dir: "/opt/{{ adguardhome_service_name }}"
adguardhome_tmp_dir: "/tmp"
adguardhome_unpack_dir: "{{ adguardhome_tmp_dir }}/AdGuardHome-{{ adguardhome_version }}"

# Architecture mapping / Соответствие архитектур
adguardhome_arch: >-
  {% if ansible_architecture == 'x86_64' %}amd64{% elif ansible_architecture == 'aarch64' %}arm64{% else %}arm{% endif %}
adguardhome_archive: "AdGuardHome_linux_{{ adguardhome_arch }}.tar.gz"
adguardhome_download_url_base: "https://github.com/AdguardTeam/AdGuardHome/releases/download"
