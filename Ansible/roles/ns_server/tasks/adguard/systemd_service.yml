---
# =============================================================================
# AdGuard Home - Systemd Service
# AdGuard Home - Сервис Systemd
# =============================================================================

- name: Get info about running services
  ansible.builtin.service_facts:

- name: Disable systemd-resolved DNSStubResolver
  ansible.builtin.include_tasks: adguard/disable_dnsstubresolver.yml
  when:
    - adguardhome_disable_systemd_dnsstubresolver
    - ansible_facts.services.get("systemd-resolved.service", {}).get("state") == "running"

- name: Install AdGuard Home systemd service unit
  ansible.builtin.template:
    src: adguardhome.service.j2
    dest: "/etc/systemd/system/{{ adguardhome_service_name }}.service"
    mode: "0664"
  register: adguardhome_systemd_unit
  notify:
    - reload systemd daemon
    - restart adguardhome

- name: Ensure AdGuard Home service is enabled
  ansible.builtin.service:
    name: "{{ adguardhome_service_name }}"
    enabled: true
