---
# =============================================================================
# NS Server Role - Handlers
# Роль NS Server - Обработчики
# =============================================================================

- name: reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: restart unbound
  ansible.builtin.service:
    name: unbound
    state: restarted
  when: unbound_service_started

- name: reload unbound
  ansible.builtin.command: unbound-control reload
  changed_when: true

- name: restart adguardhome
  ansible.builtin.service:
    name: "{{ adguardhome_service_name }}"
    state: restarted
  when: adguardhome_service_start | default(true)

- name: restart systemd-resolved
  ansible.builtin.systemd:
    name: systemd-resolved
    state: restarted
