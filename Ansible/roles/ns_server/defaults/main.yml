---
# =============================================================================
# NS Server Role - Default Variables
# Роль NS Server - Переменные по умолчанию
# =============================================================================

# -----------------------------------------------------------------------------
# Unbound - Network / Сеть
# -----------------------------------------------------------------------------
unbound_interface: "127.0.0.1"
unbound_port: 5335

# Protocols / Протоколы
# Note: Use quotes to prevent YAML from interpreting yes/no as boolean
# ВАЖНО: Используйте кавычки, чтобы YAML не интерпретировал yes/no как boolean
unbound_do_ip4: "yes"
unbound_do_ip6: "no"
unbound_do_udp: "yes"
unbound_do_tcp: "yes"

# -----------------------------------------------------------------------------
# Unbound - Performance / Производительность
# -----------------------------------------------------------------------------
unbound_num_threads: "{{ ansible_processor_vcpus | default(2) }}"

# Cache slabs (should be power of 2, close to num-threads)
# Количество слотов кэша (должно быть степенью 2)
unbound_msg_cache_slabs: 4
unbound_rrset_cache_slabs: 4
unbound_infra_cache_slabs: 4
unbound_key_cache_slabs: 4

# Socket buffers / Буферы сокетов
unbound_so_rcvbuf: "1m"
unbound_so_sndbuf: "1m"

# -----------------------------------------------------------------------------
# Unbound - Cache Settings / Настройки кэша
# -----------------------------------------------------------------------------
unbound_msg_cache_size: "128m"
unbound_rrset_cache_size: "256m"
unbound_cache_min_ttl: 300
unbound_cache_max_ttl: 14400

# Negative cache / Кэш отрицательных ответов
unbound_neg_cache_size: "4m"

# Cache persistence / Сохранение кэша в файл
unbound_cache_dump_enabled: true
unbound_cache_dump_file: "/var/lib/unbound/cache.dump"
unbound_cache_dump_interval: "30min"

# -----------------------------------------------------------------------------
# Unbound - DNSSEC
# -----------------------------------------------------------------------------
unbound_dnssec_enabled: true
unbound_harden_dnssec_stripped: true
unbound_harden_below_nxdomain: true
unbound_harden_glue: true

# -----------------------------------------------------------------------------
# Unbound - Security Hardening / Усиление безопасности
# -----------------------------------------------------------------------------

# Identity hiding / Скрытие идентификации
unbound_hide_identity: true
unbound_hide_version: true

# QNAME minimisation (RFC 7816) / Минимизация запросов
unbound_qname_minimisation: true

# CAPS randomization (защита от cache poisoning)
unbound_use_caps_for_id: true

# Additional hardening / Дополнительное усиление
unbound_harden_referral_path: true
unbound_harden_algo_downgrade: true
# Note: harden-short-bufsize and harden-large-queries may not be supported in Unbound < 1.18
# Set to false if you get "number expected" or "unknown keyword" errors
unbound_harden_short_bufsize: false
unbound_harden_large_queries: false
unbound_val_clean_additional: true

# Aggressive NSEC (RFC 8198) - улучшенное кеширование NXDOMAIN
unbound_aggressive_nsec: true

# Unwanted reply threshold / Порог нежелательных ответов
unbound_unwanted_reply_threshold: 10000000

# -----------------------------------------------------------------------------
# Unbound - Rate Limiting / Ограничение частоты (защита от DDoS)
# -----------------------------------------------------------------------------
# 0 = disabled, recommended: 50-100 for home, 1000 for public
# 0 = выключено, рекомендуется: 50-100 для дома, 1000 для публичного
unbound_rate_limit: 100
unbound_rate_limit_size: "4m"
unbound_rate_limit_slabs: 4

# -----------------------------------------------------------------------------
# Unbound - Optimization / Оптимизация
# -----------------------------------------------------------------------------
unbound_prefetch: true
unbound_prefetch_key: true
unbound_serve_expired: true
unbound_serve_expired_ttl: 3600

# EDNS buffer size (1232 recommended for most networks)
unbound_edns_buffer_size: 1232

# -----------------------------------------------------------------------------
# Unbound - Logging / Логирование
# -----------------------------------------------------------------------------
# Verbosity: 0=errors only, 1=operational, 2=detailed, 3-5=debug
unbound_verbosity: 1
unbound_log_queries: false
unbound_log_replies: false
unbound_log_local_actions: false
unbound_log_servfail: true

# -----------------------------------------------------------------------------
# Unbound - Access Control / Контроль доступа
# -----------------------------------------------------------------------------
unbound_access_control:
  - subnet: "127.0.0.0/8"
    action: "allow"
  - subnet: "::1/128"
    action: "allow"

# Private addresses (DNS rebinding protection)
# Приватные адреса (защита от DNS rebinding)
unbound_private_addresses:
  - "192.168.0.0/16"
  - "169.254.0.0/16"
  - "172.16.0.0/12"
  - "10.0.0.0/8"
  - "fd00::/8"
  - "fe80::/10"
  - "127.0.0.0/8"

# -----------------------------------------------------------------------------
# Unbound - Local Zones / Локальные зоны (опционально)
# -----------------------------------------------------------------------------
# unbound_local_zones:
#   - name: "home."
#     type: "static"
#   - name: "local."
#     type: "static"

# unbound_local_data:
#   - "server.home. 3600 IN A 192.168.1.100"
#   - "nas.home. 3600 IN A 192.168.1.101"

# unbound_local_data_ptr:
#   - "192.168.1.100 server.home."
#   - "192.168.1.101 nas.home."

# -----------------------------------------------------------------------------
# Unbound - Forward Zones / Зоны пересылки (опционально)
# -----------------------------------------------------------------------------
# Use forward zone instead of recursive resolution
# Использовать пересылку вместо рекурсивного разрешения
unbound_use_forward_zone: false

# Forward with TLS (DoT) / Пересылка с шифрованием
unbound_forward_tls: false

# Forward servers / Серверы пересылки
unbound_forward_servers:
  - addr: "1.1.1.1@853"
    name: "cloudflare-dns.com"
  - addr: "1.0.0.1@853"
    name: "cloudflare-dns.com"
  - addr: "9.9.9.9@853"
    name: "dns.quad9.net"

# Conditional forwarding / Условная пересылка
# Для локальных доменов через внутренний DNS
# unbound_conditional_forward:
#   - zone: "corp.local"
#     forward_addr: "192.168.1.1"
#   - zone: "10.in-addr.arpa"
#     forward_addr: "192.168.1.1"

# -----------------------------------------------------------------------------
# Unbound - Service / Сервис
# -----------------------------------------------------------------------------
unbound_service_enabled: true
unbound_service_started: true

# =============================================================================
# AdGuard Home Integration / Интеграция с AdGuard Home
# =============================================================================

# Include adguard role / Включить роль adguard
ns_server_install_adguard: true

# Deploy AdGuard config template / Развернуть шаблон конфига AdGuard
adguard_deploy_config: true

# -----------------------------------------------------------------------------
# AdGuard Home - DNS Settings / Настройки DNS
# -----------------------------------------------------------------------------

# Upstream DNS (Unbound) / Основной DNS
adguard_upstream_dns:
  - "127.0.0.1:5335"

# Bootstrap DNS (for resolving DoH/DoT hostnames)
# Bootstrap DNS (для разрешения имён DoH/DoT серверов)
adguard_bootstrap_dns:
  - "1.1.1.1"
  - "8.8.8.8"
  - "9.9.9.9"

# Fallback DNS (if upstream fails)
# Резервный DNS (при недоступности upstream)
adguard_fallback_dns: []
  # - "1.1.1.1"
  # - "8.8.8.8"

# DNS port / Порт DNS
adguard_dns_port: 53

# Blocking mode: default, refused, nxdomain, null_ip, custom_ip
# Режим блокировки
adguard_blocking_mode: "default"
adguard_blocking_ipv4: ""
adguard_blocking_ipv6: ""

# Rate limit (requests per second, 0 = unlimited)
# Ограничение запросов в секунду
adguard_ratelimit: 0

# EDNS client subnet / Подсеть клиента EDNS
adguard_edns_client_subnet: false

# -----------------------------------------------------------------------------
# AdGuard Home - Filtering / Фильтрация
# -----------------------------------------------------------------------------

# Enable filtering / Включить фильтрацию
adguard_filtering_enabled: true

# Safe browsing (blocks malware and phishing)
# Безопасный просмотр (блокирует малварь и фишинг)
adguard_safebrowsing_enabled: true

# Parental control (blocks adult content)
# Родительский контроль (блокирует взрослый контент)
adguard_parental_enabled: false

# Safe search (force safe search in search engines)
# Безопасный поиск (принудительный в поисковиках)
adguard_safesearch_enabled: false
adguard_safesearch_services:
  - bing
  - duckduckgo
  - google
  - youtube

# -----------------------------------------------------------------------------
# AdGuard Home - Blocklists / Списки блокировки
# -----------------------------------------------------------------------------

# Default blocklists / Списки блокировки по умолчанию
adguard_blocklists:
  - name: "AdGuard DNS filter"
    url: "https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt"
    enabled: true
  - name: "AdAway Default Blocklist"
    url: "https://adaway.org/hosts.txt"
    enabled: true
  - name: "Steven Black's Unified Hosts"
    url: "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
    enabled: true

# Additional blocklists (will be merged with default)
# Дополнительные списки (объединяются с основными)
adguard_extra_blocklists: []
  # - name: "OISD Big"
  #   url: "https://big.oisd.nl"
  #   enabled: true
  # - name: "Energized Protection"
  #   url: "https://block.energized.pro/basic/formats/hosts"
  #   enabled: true

# Allowlists / Списки разрешений
adguard_allowlists: []
  # - name: "My Allowlist"
  #   url: "https://example.com/allowlist.txt"

# -----------------------------------------------------------------------------
# AdGuard Home - User Rules / Пользовательские правила
# -----------------------------------------------------------------------------
adguard_user_rules: []
  # - "||ads.example.com^"           # Block domain
  # - "@@||safe.example.com^"        # Allow domain
  # - "/^ad[0-9]*\\./"               # Regex block

# -----------------------------------------------------------------------------
# AdGuard Home - DNS Rewrites / DNS перезаписи
# -----------------------------------------------------------------------------
adguard_dns_rewrites: []
  # - domain: "*.home"
  #   answer: "192.168.1.100"
  # - domain: "router.local"
  #   answer: "192.168.1.1"

# -----------------------------------------------------------------------------
# AdGuard Home - Authentication / Аутентификация
# -----------------------------------------------------------------------------
# Admin credentials (required for auto-setup)
# Учётные данные администратора (для автонастройки)

# Username / Имя пользователя
adguard_admin_username: "admin"

# Password (plain text - will be hashed with bcrypt)
# Пароль (открытый текст - будет захеширован bcrypt)
# IMPORTANT: Use ansible-vault to encrypt this variable!
# ВАЖНО: Используйте ansible-vault для шифрования!
adguard_admin_password: ""

# Or provide pre-hashed password (bcrypt)
# Или укажите готовый хеш пароля (bcrypt)
# Generate with: htpasswd -bnBC 10 "" "password" | tr -d ':\n'
# adguard_admin_password_hash: "$2y$10$..."
adguard_admin_password_hash: ""

# Session TTL / Время жизни сессии
adguard_session_ttl: "720h"

# Auth attempts before block / Попыток до блокировки
adguard_auth_attempts: 5
adguard_block_auth_min: 15

# -----------------------------------------------------------------------------
# AdGuard Home - Web Interface / Веб-интерфейс
# -----------------------------------------------------------------------------
adguard_web_port: 3000
adguard_web_bind: "0.0.0.0"

# Language (empty = browser default)
# Язык (пусто = по умолчанию браузера)
adguard_language: ""

# Theme: auto, light, dark
adguard_theme: "auto"

# -----------------------------------------------------------------------------
# AdGuard Home - Query Log / Журнал запросов
# -----------------------------------------------------------------------------
# Log retention in hours: 24h, 168h (7d), 720h (30d), 2160h (90d)
# Хранение логов в часах: 24h, 168h (7 дней), 720h (30 дней), 2160h (90 дней)
adguard_querylog_enabled: true
adguard_querylog_interval: "168h"
adguard_querylog_size_memory: 1000

# -----------------------------------------------------------------------------
# AdGuard Home - Statistics / Статистика
# -----------------------------------------------------------------------------
# Stats retention in hours: 24h, 168h (7d), 720h (30d), 2160h (90d)
# Хранение статистики в часах
adguard_stats_enabled: true
adguard_stats_interval: "168h"

# -----------------------------------------------------------------------------
# AdGuard Home - Service Settings / Настройки сервиса
# -----------------------------------------------------------------------------
adguardhome_version: "latest"
adguardhome_use_github_token: false
adguardhome_user: root
adguardhome_group: "{{ adguardhome_user }}"
adguardhome_system_user: true
adguardhome_service_enable: true
adguardhome_service_start: true
adguardhome_disable_systemd_dnsstubresolver: true

# =============================================================================
# Monitoring / Мониторинг
# =============================================================================

# Deploy health check script / Развернуть скрипт проверки здоровья
ns_server_deploy_healthcheck: true
ns_server_healthcheck_path: "/usr/local/bin/dns-health-check.sh"
