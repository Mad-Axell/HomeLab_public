---
# EN: Default, overridable variables / RU: Настраиваемые переменные по умолчанию

# Service / Сервис
unbound_service_state: started   # String. started/stopped/restarted / Состояние сервиса
unbound_service_enabled: true    # Bool.   Enable on boot / Автозапуск

# EN: Performance / cache (values from 04-lxc-dns-stack.md §2.3)
# RU: Производительность/кэш Unbound (значения из 04-lxc-dns-stack.md §2.3)
unbound_num_threads: 2
unbound_msg_cache_size: "64m"
unbound_rrset_cache_size: "128m"
unbound_verbosity: 1

# EN: DoS / ratelimit / RU: Защита от DoS / ratelimit
unbound_ratelimit: 1000
unbound_ip_ratelimit: 200

# EN: Socket buffer sizes. Use "0" to keep the kernel default — required inside
#     unprivileged LXC where net.core.rmem_max/wmem_max can't be raised, otherwise
#     unbound logs "so-rcvbuf/so-sndbuf ... was not granted" on every start.
# RU: Размеры сокет-буферов. "0" = оставить дефолт ядра — нужно в unprivileged LXC,
#     где net.core.rmem_max/wmem_max не поднять, иначе unbound на каждом старте пишет
#     "so-rcvbuf/so-sndbuf ... was not granted".
unbound_so_rcvbuf: "4m"
unbound_so_sndbuf: "4m"

# EN: Root hints URL + refresh schedule (cron.d)
# RU: URL root hints + расписание обновления (cron.d)
unbound_root_hints_url: "https://www.internic.net/domain/named.cache"
unbound_root_hints_cron: "17 4 1 * *"

# Debug / Отладка
debug_mode: false                # Bool.   Enable debug output / Включить отладочный вывод
debug_lang: 'both'               # String. english/russian/both / Язык отладки
debug_show_passwords: false      # Bool.   Show secrets in debug (INSECURE) / Показывать секреты
