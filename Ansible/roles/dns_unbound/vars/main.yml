---
# EN: Static role variables (do not override) / RU: Статичные переменные роли

# EN: Supported OS families (role is Debian-only) / RU: Поддерживаемые семейства ОС (роль только для Debian)
supported_os_families:
  - Debian

# EN: Service identity / RU: Идентификация сервиса
unbound_service_name: "unbound"

# EN: Packages to install / RU: Устанавливаемые пакеты
unbound_packages:
  - unbound
  - unbound-anchor

# EN: Fixed filesystem paths / RU: Фиксированные пути в файловой системе
unbound_config_path: "/etc/unbound/unbound.conf.d/10-server.conf"
unbound_root_key: "/var/lib/unbound/root.key"
unbound_root_hints: "/var/lib/unbound/root.hints"
